async function asystentParagon(file) {
  if (!file || trwaRozmowa) return;
  trwaRozmowa = true;
  $("m-ea").classList.add("m-ea--rozmowa");
  dodajWiadomosc("ja", "📷 Paragon");
  const mysl = dodajWiadomosc("mysli", "Czytam paragon…");
  try {
    const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
    const sciezka = `traveler/${TRAVELER.id}/${crypto.randomUUID()}.${ext}`;
    const up = await supabase.storage.from("dokumenty").upload(sciezka, file, { contentType: file.type || undefined, upsert: false });
    if (up.error) throw up.error;
    const dok = await supabase.from("dokumenty").insert({ traveler_id: TRAVELER.id, org_id: null, typ: "paragon", kontekst: "finanse", plik_url: sciezka, mime: file.type || null, zrodlo: "zdjecie", ocr_status: "oczekuje" }).select("id").single();
    if (dok.error) throw dok.error;
    const { data, error } = await supabase.functions.invoke("ocr-dokument", { body: { dokument_id: dok.data.id } });
    mysl.remove();
    if (error || !data || !data.ok) { dodajWiadomosc("asystent", "Nie udało się odczytać paragonu" + (error ? ": " + error.message : "") + "."); trwaRozmowa = false; return; }
    const d = data.dane || {};
    const poz = Array.isArray(d.pozycje) ? d.pozycje.filter((p) => p && p.nazwa) : [];
    const kwota = d.kwota_brutto != null ? d.kwota_brutto : null;
    const sprz = (d.sprzedawca || "").trim();
    const nrDok = (d.numer_dokumentu || "").trim();
    const dataDup = d.data || czesciWarszawy(new Date()).dataISO;
    let dup = null;
    if (nrDok) {
      const nipN = (d.nip || "").replace(/\D/g, "");
      const { data: byNr } = await supabase.from("transakcje").select("id, opis, nip_sprzedawcy").eq("traveler_id", TRAVELER.id).eq("typ", "koszt").eq("numer_dokumentu", nrDok);
      dup = (byNr || []).find((r) => !nipN || !r.nip_sprzedawcy || nipN === (r.nip_sprzedawcy || "").replace(/\D/g, "")) || (byNr || [])[0] || null;
    }
    if (!dup && kwota != null) {
      const { data: ist } = await supabase.from("transakcje").select("id, opis").eq("traveler_id", TRAVELER.id).eq("typ", "koszt").eq("data", dataDup).eq("kwota", kwota);
      dup = (ist || [])[0] || null;
    }
    if (dup) {
      await supabase.from("dokumenty").delete().eq("id", dok.data.id);
      await supabase.storage.from("dokumenty").remove([sciezka]);
      dodajWiadomosc("asystent", `To już masz zapisane (duplikat): ${esc(sprz || dup.opis || "paragon")}, ${fmtZl(kwota != null ? kwota : 0)}, ${esc(dataDup)}. Nie dodaję drugi raz.`);
      trwaRozmowa = false; return;
    }
    let podsum = `<div><strong>Paragon odczytany</strong></div>`;
    if (d.sprzedawca) podsum += `<div>Sprzedawca: ${esc(d.sprzedawca)}</div>`;
    if (d.data) podsum += `<div>Data: ${esc(d.data)}</div>`;
    if (kwota != null) podsum += `<div>Razem: ${fmtZl(kwota)}</div>`;
    if (poz.length) podsum += `<div style="margin-top:4px;">Pozycje:</div><ul>${poz.map((p) => `<li>${esc(p.nazwa)}${p.kwota != null ? " — " + fmtZl(p.kwota) : ""}${p.kategoria ? ` <span style="color:#8c887e;">(${esc(p.kategoria)})</span>` : ""}</li>`).join("")}</ul>`;
    const bubel = el(`<div class="m-msg m-msg--asystent">${podsum}<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;"><button class="par-zapisz" style="background:#1a7158;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;">Zapisz do Trzosu</button><button class="par-przekaz" style="background:#1a7158;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;">→ Przekaż osobie</button><button class="par-anuluj" style="background:#efece3;color:#26241f;border:none;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;">Anuluj</button></div></div>`);
    $("m-stream").appendChild(bubel); $("m-stream").scrollTop = $("m-stream").scrollHeight;
    bubel.querySelector(".par-anuluj").addEventListener("click", () => { bubel.querySelector("div:last-child").remove(); dodajWiadomosc("asystent", "Anulowane — nie zapisałem. Paragon został w dokumentach."); });
    bubel.querySelector(".par-przekaz").addEventListener("click", async () => {
      const btn = bubel.querySelector(".par-przekaz"); btn.disabled = true; btn.textContent = "Zapisuję…";
      try {
        const dzis = czesciWarszawy(new Date()).dataISO;
        const tx = await supabase.from("transakcje").insert({ traveler_id: TRAVELER.id, org_id: null, typ: "koszt", kwota: kwota != null ? kwota : 0, data: d.data || dzis, kategoria: d.kategoria || null, metoda_platnosci: d.metoda_platnosci || null, opis: d.sprzedawca || null, nip_sprzedawcy: d.nip || null, numer_dokumentu: nrDok || null, dokument_typ: d.dokument_typ || "paragon", kwota_netto: d.kwota_netto != null ? d.kwota_netto : null, kwota_vat: d.kwota_vat != null ? d.kwota_vat : null, paragon_url: sciezka }).select("id").single();
        if (tx.error) throw tx.error;
        await supabase.from("dokumenty").update({ transakcja_id: tx.data.id }).eq("id", dok.data.id);
        if (poz.length) { const rows = poz.map((p) => ({ transakcja_id: tx.data.id, typ: "zakup", nazwa: String(p.nazwa), ilosc: p.ilosc != null ? p.ilosc : 1, jednostka: p.jednostka || "szt", cena_jedn: p.cena_jedn != null ? p.cena_jedn : null, kwota: p.kwota != null ? p.kwota : null, kategoria: p.kategoria || null })); await supabase.from("transakcja_pozycje").insert(rows); }
        bubel.querySelector("div:last-child").remove();
        dodajWiadomosc("asystent", "Zapisałem paragon ✓ — wybierz komu go przekazać.");
        oknoWyslijKoszt(tx.data.id, d.sprzedawca, kwota);
      } catch (e) { btn.disabled = false; btn.textContent = "→ Przekaż osobie"; dodajWiadomosc("asystent", "Nie zapisałem: " + (e.message || e)); }
    });
    bubel.querySelector(".par-zapisz").addEventListener("click", async () => {
      const btn = bubel.querySelector(".par-zapisz"); btn.disabled = true; btn.textContent = "Zapisuję…";
      try {
        const dzis = czesciWarszawy(new Date()).dataISO;
        const tx = await supabase.from("transakcje").insert({ traveler_id: TRAVELER.id, org_id: null, typ: "koszt", kwota: kwota != null ? kwota : 0, data: d.data || dzis, kategoria: d.kategoria || null, metoda_platnosci: d.metoda_platnosci || null, opis: d.sprzedawca || null, nip_sprzedawcy: d.nip || null, numer_dokumentu: nrDok || null, dokument_typ: d.dokument_typ || "paragon", kwota_netto: d.kwota_netto != null ? d.kwota_netto : null, kwota_vat: d.kwota_vat != null ? d.kwota_vat : null, paragon_url: sciezka }).select("id").single();
        if (tx.error) throw tx.error;
        await supabase.from("dokumenty").update({ transakcja_id: tx.data.id }).eq("id", dok.data.id);
        if (poz.length) {
          const rows = poz.map((p) => ({ transakcja_id: tx.data.id, typ: "zakup", nazwa: String(p.nazwa), ilosc: p.ilosc != null ? p.ilosc : 1, jednostka: p.jednostka || "szt", cena_jedn: p.cena_jedn != null ? p.cena_jedn : null, kwota: p.kwota != null ? p.kwota : null, kategoria: p.kategoria || null }));
          await supabase.from("transakcja_pozycje").insert(rows);
        }
        bubel.querySelector("div:last-child").remove();
        dodajWiadomosc("asystent", "Zapisałem w Trzosie ✓" + (kwota != null ? " (" + fmtZl(kwota) + ")" : "") + (poz.length ? `, pozycji: ${poz.length}` : ""));
        // KONTEKST dla asystenta — żeby wiedział o paragonie w kolejnej turze (Fix A)
        try {
          const pozTekst = poz.length ? poz.map((p) => `${p.nazwa}${p.kwota != null ? " " + p.kwota + " zł" : ""}${p.kategoria ? " (" + p.kategoria + ")" : ""}`).join("; ") : "brak pozycji";
          const ktekst = `[ZDARZENIE W APCE] Użytkownik przed chwilą dodał PARAGON przez zdjęcie i zapisał go do Trzosu: sprzedawca „${d.sprzedawca || "?"}", pozycje: ${pozTekst}, razem ${kwota != null ? kwota + " zł" : "?"}, data ${d.data || dzis}, transakcja id ${tx.data.id}. TO JUŻ JEST ZAPISANE. Jeśli użytkownik o to pyta lub prosi o zmianę (np. „to dla Patrycji"), pracuj na tej transakcji — NIE pytaj ponownie o kwotę ani pozycje i NIE mów, że nie widzisz paragonu.`;
          await supabase.rpc("zapisz_kontekst_asystenta", { p_tresc: ktekst });
        } catch (e) {}
        if (typeof renderTrzos === "function" && $("m-widok-trzos") && $("m-widok-trzos").style.display !== "none") renderTrzos();
      } catch (e) { btn.disabled = false; btn.textContent = "Zapisz do Trzosu"; dodajWiadomosc("asystent", "Nie zapisałem: " + (e.message || e)); }
    });
  } catch (err) { mysl.remove(); dodajWiadomosc("asystent", "Błąd: " + (err.message || err)); }
  trwaRozmowa = false;
}

/* Wyślij OFERTĘ kosztu osobie w MANIE (paragon → Puls odbiorcy + ewentualny dług). Moja strona już zapisana; to tylko most do niej. */
async function oknoWyslijKoszt(txId, sprzedawca, kwota) {
  const { data: kon } = await supabase.from("kontakty").select("id, imie, target_traveler_id").eq("owner_traveler_id", TRAVELER.id).not("target_traveler_id", "is", null).order("imie");
  const lista = (kon || []).filter((k) => k.target_traveler_id !== TRAVELER.id);
  const opcje = lista.length ? lista.map((k) => `<label style="display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:14px;"><input type="radio" name="wk-osoba" value="${k.target_traveler_id}" style="width:18px;height:18px;"><span>${escP(k.imie || "?")}</span></label>`).join("") : `<div style="color:var(--ink-soft);font-size:13px;padding:4px 0;">Brak kontaktów w MANIE — dodaj/połącz kontakt najpierw.</div>`;
  const ov = el(`<div class="m-overlay"><div class="m-modal">
    <div class="m-modal__head"><span class="m-modal__tytul">Wyślij koszt osobie</span><button class="m-modal__x" aria-label="Zamknij">&#10005;</button></div>
    <div class="m-form">
      <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:10px;line-height:1.5;">${escP(sprzedawca || "zakup")}${kwota != null ? " · " + fmtZl(kwota) : ""}. Osoba dostanie <b>ofertę</b> — przyjmie ją u siebie (lek → jej Puls, koszt/dług wg wyboru).</div>
      <label>Dla kogo</label>
      <div style="margin:4px 0 12px;">${opcje}</div>
      <label>Koszt</label>
      <div style="display:flex;gap:8px;margin:4px 0 14px;">
        <label style="flex:1;display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;padding:9px;cursor:pointer;"><input type="radio" name="wk-koszt" value="nadawca" checked style="width:16px;height:16px;"><span style="font-size:13px;">Biorę na siebie</span></label>
        <label style="flex:1;display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;padding:9px;cursor:pointer;"><input type="radio" name="wk-koszt" value="odbiorca" style="width:16px;height:16px;"><span style="font-size:13px;">Ona/on płaci (dług)</span></label>
      </div>
      <button class="wk-wyslij" style="width:100%;border:none;background:var(--turkus,#1f9e8f);color:#fff;border-radius:12px;padding:12px;font-size:15px;cursor:pointer;">Wyślij ofertę</button>
    </div>
  </div></div>`);
  document.body.appendChild(ov);
  const zam = () => ov.remove();
  ov.addEventListener("click", (e) => { if (e.target === ov) zam(); });
  ov.querySelector(".m-modal__x").addEventListener("click", zam);
  ov.querySelector(".wk-wyslij").addEventListener("click", async () => {
    const os = ov.querySelector('input[name="wk-osoba"]:checked');
    if (!os) { trzosToast("Wybierz osobę."); return; }
    const koszt = (ov.querySelector('input[name="wk-koszt"]:checked') || {}).value || "nadawca";
    const { data, error } = await supabase.rpc("zaproponuj_koszt", { p_do_traveler: Number(os.value), p_transakcja_id: txId, p_koszt_czyj: koszt });
    if (error || (data && data.ok === false)) { trzosToast("Nie wysłano: " + ((data && data.error) || (error && error.message) || "")); return; }
    zam();
    if (typeof dodajWiadomosc === "function") dodajWiadomosc("asystent", "Wysłałem ofertę ✓ — pojawi się u odbiorcy do przyjęcia." + (koszt === "odbiorca" ? " U Ciebie zapisałem niepotwierdzone roszczenie (dług)." : ""));
  });
}

/* ════════════════════════════════════════════════════════════════════
   EGZAMIN — pokój nauki: skanujesz materiał (OCR), AI rozkłada go na
   okres (spaced repetition) i daje plan + fiszki. Reużywa kafla
   dokumenty/OCR. Backend: tabele kuznia_*, edge kuznia-skan/kuznia-plan.
   ════════════════════════════════════════════════════════════════════ */
let egzAktywny = null;
let egzZajety = false;
const EGZ_BP = "background:#1a7158;color:#fff;border:none;border-radius:8px;padding:8px 13px;font-size:13px;cursor:pointer;";
const EGZ_BG = "background:#efece3;color:#26241f;border:none;border-radius:8px;padding:8px 13px;font-size:13px;cursor:pointer;";
const EGZ_IN = "width:100%;box-sizing:border-box;padding:9px;border:1px solid #ddd6c8;border-radius:8px;margin:4px 0 8px;font-size:14px;";

function otworzEgzamin() { egzAktywny = null; pokazWidok("egzamin"); renderEgzaminLista(); }

function egzTabBarHTML(active, maDzieci) {
  const t = (id, label) => `<button class="egz-tab" data-egztab="${id}" style="background:${active === id ? "#1a7158" : "#efece3"};color:${active === id ? "#fff" : "var(--ink)"};border:none;border-radius:18px;padding:6px 14px;font-size:13px;cursor:pointer;">${label}</button>`;
  return `<div style="display:flex;gap:6px;margin-bottom:12px;">${t("moje", "Moje")}${maDzieci ? t("dzieci", "Dzieci / Plemię") : ""}</div>`;
}
function egzWirujTaby(wrap) {
  wrap.querySelectorAll(".egz-tab").forEach((b) => b.addEventListener("click", () => {
    if (b.dataset.egztab === "moje") renderEgzaminLista(); else renderPostepyDzieci();
  }));
}
async function renderEgzaminLista() {
  egzAktywny = null;
  const wrap = $("egz-tresc");
  wrap.innerHTML = `<div style="color:var(--ink-soft);font-size:14px;padding:8px 0;">Wczytuję…</div>`;
  const { data: zs = [], error } = await supabase.from("kuznia_zestawy").select("*").eq("traveler_id", TRAVELER.id).order("created_at", { ascending: false });
  if (error) { wrap.innerHTML = `<div style="color:#c4513a;">Błąd: ${esc(error.message)}</div>`; return; }
  const { data: dzieciL } = await supabase.rpc("moje_dzieci");
  let h = egzTabBarHTML("moje", dzieciL && dzieciL.length) + `<button id="egz-nowy-btn" style="${EGZ_BP}">+ Nowy zestaw</button>`;
  if (!zs.length) h += `<div style="color:var(--ink-soft);font-size:14px;padding:14px 0;">Nie masz jeszcze materiału. Dodaj zestaw, zeskanuj książkę i poproś o rozłożenie nauki na okres.</div>`;
  for (const z of zs) {
    const term = z.zakres_do || z.data_celu;
    h += `<div class="egz-karta" data-id="${z.id}" style="background:#fff;border:1px solid #e7e3d8;border-radius:12px;padding:12px;margin-top:10px;cursor:pointer;">
      <div style="font-weight:600;">${esc(z.tytul)}</div>
      <div style="font-size:12px;color:var(--ink-soft);margin-top:2px;">${esc(z.cel || "")}${term ? " · do " + esc(term) : ""}${z.plan_md ? " · plan gotowy ✓" : ""}</div>
    </div>`;
  }
  wrap.innerHTML = h;
  $("egz-nowy-btn").addEventListener("click", egzFormNowy);
  egzWirujTaby(wrap);
  wrap.querySelectorAll(".egz-karta").forEach((k) => k.addEventListener("click", () => otworzZestaw(k.dataset.id)));
}
async function renderPostepyDzieci() {
  egzAktywny = null;
  const wrap = $("egz-tresc");
  wrap.innerHTML = egzTabBarHTML("dzieci", true)
    + `<div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px;">Co dzieci mają zadane i jak im idzie. Materiał zadajesz z poziomu swojego zestawu („Zadaj dziecku").</div>
    <div id="egz-postepy-tresc">Wczytuję…</div>`;
  egzWirujTaby(wrap);
  const box = $("egz-postepy-tresc");
  const { data: dzieci } = await supabase.rpc("moje_dzieci");
  if (!dzieci || !dzieci.length) { box.innerHTML = `<div style="color:var(--ink-soft);font-size:14px;">Brak dzieci pod opieką.</div>`; return; }
  const ids = dzieci.map((d) => d.traveler_id);
  const { data: zestawy = [] } = await supabase.from("kuznia_zestawy").select("id, tytul, traveler_id, prog_zaliczenia, przypisany_przez").in("traveler_id", ids).order("created_at", { ascending: false });
  const { data: wyniki = [] } = await supabase.from("kuznia_wyniki").select("zestaw_id, wynik_proc, liczba, data_czas").in("traveler_id", ids).order("data_czas", { ascending: false });
  const { data: mojeZ = [] } = await supabase.from("kuznia_zestawy").select("id, tytul").eq("traveler_id", TRAVELER.id).order("created_at", { ascending: false });
  let html = "";
  for (const d of dzieci) {
    const zd = (zestawy || []).filter((z) => z.traveler_id === d.traveler_id);
    html += `<div style="font-weight:600;margin:14px 0 4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">${escP(d.nick)}<button class="egz-zadaj-kid" data-kid="${d.traveler_id}" style="${EGZ_BG}padding:3px 10px;font-size:12px;">➕ Zadaj materiał</button></div>
      <div class="egz-zadaj-kid-box" data-kidbox="${d.traveler_id}"></div>`;
    if (!zd.length) { html += `<div style="font-size:13px;color:var(--ink-soft);">Brak materiału do nauki.</div>`; continue; }
    for (const z of zd) {
      const w = (wyniki || []).find((x) => x.zestaw_id === z.id);
      const ost = w ? `${w.wynik_proc}% (${w.liczba} fiszek) · ${fmtData(w.data_czas, { day: "numeric", month: "short" })}` : "jeszcze nie ćwiczył";
      html += `<div style="background:#fff;border:1px solid #e7e3d8;border-radius:10px;padding:9px 11px;margin-bottom:6px;">
        <div style="font-size:14px;font-weight:600;">${escP(z.tytul)}${z.przypisany_przez ? ` <span style="font-size:11px;color:#1a7158;">· zadane</span>` : ""}</div>
        <div style="font-size:12px;color:var(--ink-soft);">Ostatnia sesja: ${ost}${z.prog_zaliczenia ? ` · próg ${z.prog_zaliczenia}%` : ""}</div>
      </div>`;
    }
  }
  box.innerHTML = html;
  box.querySelectorAll(".egz-zadaj-kid").forEach((b) => b.addEventListener("click", () => {
    const kid = Number(b.dataset.kid);
    const cont = box.querySelector(`[data-kidbox="${kid}"]`);
    if (cont.querySelector("select")) { cont.innerHTML = ""; return; }
    if (!mojeZ.length) { cont.innerHTML = `<div style="font-size:12px;color:var(--ink-soft);margin:4px 0 8px;">Nie masz zestawów — stwórz materiał w „Moje", potem zadasz.</div>`; return; }
    const opcje = mojeZ.map((z) => `<option value="${z.id}">${escP(z.tytul)}</option>`).join("");
    cont.innerHTML = `<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:4px 0 10px;">
      <select class="zk-set" style="padding:7px;border:1px solid var(--line);border-radius:8px;font-size:13px;">${opcje}</select>
      <button class="zk-ok" style="${EGZ_BP}padding:6px 12px;">Zadaj</button>
      <span class="zk-out" style="font-size:12px;"></span></div>`;
    cont.querySelector(".zk-ok").addEventListener("click", async (e) => {
      e.target.disabled = true;
      const src = cont.querySelector(".zk-set").value;
      const { data, error } = await supabase.rpc("zadaj_zestaw_dziecku", { p_dziecko: kid, p_src_zestaw: src, p_prog: null, p_bramkowanie: false });
      e.target.disabled = false;
      const out = cont.querySelector(".zk-out");
      if (error || !data || !data.ok) { out.textContent = (error && error.message) || (data && data.error) || "Nie zadano"; out.style.color = "#c4513a"; return; }
      out.textContent = "Zadane ✓"; out.style.color = "#1a7158";
      setTimeout(renderPostepyDzieci, 800);
    });
  }));
}
async function egzUsunZestaw(id, tytul) {
  if (!confirm(`Usunąć zestaw „${tytul}"? Skasuje materiał, fiszki i wyniki tego zestawu. Nieodwracalne.`)) return;
  await supabase.from("kuznia_fiszki").delete().eq("zestaw_id", id);
  await supabase.from("kuznia_materialy").delete().eq("zestaw_id", id);
  await supabase.from("kuznia_wyniki").delete().eq("zestaw_id", id);
  const { error } = await supabase.from("kuznia_zestawy").delete().eq("id", id);
  if (error) { alert("Nie usunięto: " + error.message); return; }
  renderEgzaminLista();
}
function egzZadajForm(dzieci) {
  const box = $("egz-zadaj-box"); if (!box) return;
  if (box.querySelector(".egz-zadaj-form")) { box.innerHTML = ""; return; }
  const opcje = dzieci.map((d) => `<option value="${d.traveler_id}">${escP(d.nick)}</option>`).join("");
  box.innerHTML = `<div class="egz-zadaj-form" style="background:#fff;border:1px solid #e7e3d8;border-radius:10px;padding:12px;margin:8px 0;">
    <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:8px;">Skopiuj ten zestaw (materiał + fiszki + plan) dziecku, żeby je ćwiczyło. (Próg zaliczenia dojdzie razem z trybem testu.)</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <select id="egz-zadaj-kto" style="padding:8px;border:1px solid var(--line);border-radius:8px;font-size:14px;">${opcje}</select>
      <button id="egz-zadaj-ok" style="${EGZ_BP}">Zadaj</button>
    </div>
    <div class="egz-zadaj-wynik" style="margin-top:6px;"></div>
  </div>`;
  $("egz-zadaj-ok").addEventListener("click", async (e) => {
    const kto = Number($("egz-zadaj-kto").value);
    const out = box.querySelector(".egz-zadaj-wynik");
    e.target.disabled = true;
    const { data, error } = await supabase.rpc("zadaj_zestaw_dziecku", { p_dziecko: kto, p_src_zestaw: egzAktywny.id, p_prog: null, p_bramkowanie: false });
    e.target.disabled = false;
    if (error) { out.innerHTML = `<span style="color:#c4513a;font-size:13px;">Błąd: ${escP(error.message)}</span>`; return; }
    if (!data || !data.ok) { out.innerHTML = `<span style="color:#c4513a;font-size:13px;">${escP((data && data.error) || "Nie zadano.")}</span>`; return; }
    const nick = (dzieci.find((d) => d.traveler_id === kto) || {}).nick || "dziecku";
    out.innerHTML = `<span style="color:#1a7158;font-size:13px;">Zadane „${escP(nick)}" ✓ — ma to teraz w swoim Egzaminie.</span>`;
  });
}

function egzFormNowy() {
  const wrap = $("egz-tresc");
  const dzis = czesciWarszawy(new Date()).dataISO;
  wrap.innerHTML = `<div style="background:#fff;border:1px solid #e7e3d8;border-radius:12px;padding:14px;">
    <div style="font-weight:600;margin-bottom:8px;">Nowy zestaw</div>
    <input id="egz-tytul" placeholder="Tytuł, np. Angielski – książka 5 klasa" style="${EGZ_IN}"/>
    <input id="egz-cel" value="utrwalenie i powtórka" style="${EGZ_IN}"/>
    <label style="font-size:12px;color:var(--ink-soft);">Od</label>
    <input id="egz-od" type="date" value="${dzis}" style="${EGZ_IN}"/>

function egzMd(md) {
  if (!md) return "";
  const lines = String(md).split("\n");
  let out = "", inList = false;
  for (const ln of lines) {
    let s = esc(ln).replace(/\*\*(.+?)\*\*/g, "<b>$1</b>");
    if (/^\s*###\s+/.test(ln)) { if (inList) { out += "</ul>"; inList = false; } out += `<h4 style="margin:10px 0 4px;">${s.replace(/^\s*###\s+/, "")}</h4>`; }
    else if (/^\s*##\s+/.test(ln)) { if (inList) { out += "</ul>"; inList = false; } out += `<h3 style="margin:12px 0 4px;color:#1a7158;font-size:15px;">${s.replace(/^\s*##\s+/, "")}</h3>`; }
    else if (/^\s*#\s+/.test(ln)) { if (inList) { out += "</ul>"; inList = false; } out += `<h3 style="margin:12px 0 4px;font-size:16px;">${s.replace(/^\s*#\s+/, "")}</h3>`; }
    else if (/^\s*[-*]\s+/.test(ln)) { if (!inList) { out += "<ul style='margin:4px 0 4px 18px;padding:0;'>"; inList = true; } out += `<li style="margin:2px 0;">${s.replace(/^\s*[-*]\s+/, "")}</li>`; }
    else if (!ln.trim()) { if (inList) { out += "</ul>"; inList = false; } }
    else { if (inList) { out += "</ul>"; inList = false; } out += `<div style="margin:3px 0;">${s}</div>`; }
  }
  if (inList) out += "</ul>";
  return out;
}

let egzPdfjsLib = null;
async function egzLadujPdfjs() {
  if (egzPdfjsLib) return egzPdfjsLib;
  const m = await import("https://esm.sh/pdfjs-dist@4.0.379/build/pdf.min.mjs");
  m.GlobalWorkerOptions.workerSrc = "https://esm.sh/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs";

// Wysyła JEDNĄ stronę (obraz lub wyrenderowaną stronę PDF) przez OCR → kuznia_materialy.
async function egzWyslijStrone(blob, ext, mime, zestawId, kolejnosc) {
  const sciezka = `traveler/${TRAVELER.id}/${crypto.randomUUID()}.${ext}`;
  const up = await supabase.storage.from("dokumenty").upload(sciezka, blob, { contentType: mime || undefined, upsert: false });
  if (up.error) throw up.error;
  const dok = await supabase.from("dokumenty").insert({ traveler_id: TRAVELER.id, org_id: null, typ: "material", kontekst: "nauka", plik_url: sciezka, mime: mime || null, zrodlo: "zdjecie", ocr_status: "oczekuje" }).select("id").single();
  if (dok.error) throw dok.error;
  const { data, error } = await supabase.functions.invoke("kuznia-skan", { body: { dokument_id: dok.data.id } });
  if (error || !data || !data.ok) throw new Error((error && error.message) || (data && data.error) || "OCR");
  const tekst = (data.dane && data.dane.tekst) || "";
  const ins = await supabase.from("kuznia_materialy").insert({ zestaw_id: zestawId, traveler_id: TRAVELER.id, dokument_id: dok.data.id, tekst, kolejnosc });
  if (ins.error) throw ins.error;
}

async function egzSkanuj(files) {
  if (egzZajety || !egzAktywny) return;
  const lista = Array.from(files || []);
  if (!lista.length) return;
  egzZajety = true;
  const zestawId = egzAktywny.id;
  const odswiez = () => { if (egzAktywny && egzAktywny.id === zestawId) { const lic = $("egz-licznik"); if (lic) lic.textContent = count; egzRenderStrony(zestawId); } };
  let { count } = await supabase.from("kuznia_materialy").select("id", { count: "exact", head: true }).eq("zestaw_id", zestawId);
  count = count || 0;
  let ok = 0, blad = 0, lastErr = "";
  for (const file of lista) {
    const isPdf = (file.type === "application/pdf") || /\.pdf$/i.test(file.name);
    try {
      if (isPdf) {
        trzosToast("Otwieram PDF…");
        let pdfjs = null;
        try {
          pdfjs = await Promise.race([
            egzLadujPdfjs(),
            new Promise((_, rej) => setTimeout(() => rej(new Error("pdfjs-timeout")), 9000)),
          ]);
        } catch (e) { pdfjs = null; console.warn("pdf.js niedostępny — wysyłam cały PDF", e); }
        let doc = null;
        if (pdfjs) {
          try { doc = await pdfjs.getDocument({ data: await file.arrayBuffer() }).promise; }
          catch (e) { doc = null; console.warn("pdf.js render błąd — wysyłam cały PDF", e); }
        }
        if (!doc) {
          // FALLBACK bez pdf.js: cały PDF idzie do OCR jako jeden materiał (działa dla małych plików)
          trzosToast("Czytam PDF…");
          const ext = (file.name.split(".").pop() || "pdf").toLowerCase();
          await egzWyslijStrone(file, ext, file.type || "application/pdf", zestawId, count);
          count++; ok++; odswiez();
          continue;
        }
        const n = doc.numPages;
        let od = 1, koniec = n;
        if (n > 1) {
          const odp = prompt(`PDF ma ${n} stron. Które wczytać? (np. 12-40, albo Enter = wszystkie)`, `1-${n}`);
          if (odp === null) { try { doc.destroy(); } catch (_) {} continue; }
          const z = odp.trim().match(/^(\d+)\s*[-–]\s*(\d+)$/), j = odp.trim().match(/^(\d+)$/);
          if (z) { od = Math.max(1, +z[1]); koniec = Math.min(n, +z[2]); }
          else if (j) { od = koniec = Math.min(n, Math.max(1, +j[1])); }
          if (od > koniec) { const t = od; od = koniec; koniec = t; }
        }
        for (let pageNo = od; pageNo <= koniec; pageNo++) {
          trzosToast(`Czytam stronę ${pageNo}/${koniec}…`);
          try {
            const p = await doc.getPage(pageNo);
            const viewport = p.getViewport({ scale: 2 });
            const canvas = document.createElement("canvas");
            canvas.width = Math.round(viewport.width); canvas.height = Math.round(viewport.height);
            await p.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
            const blob = await new Promise((res) => canvas.toBlob(res, "image/jpeg", 0.85));
            canvas.width = canvas.height = 0;
            if (!blob) throw new Error("render strony");
            await egzWyslijStrone(blob, "jpg", "image/jpeg", zestawId, count);
            count++; ok++;
          } catch (e) { blad++; lastErr = (e && e.message) ? e.message : String(e); console.error("egzSkanuj/pdf", e); }
          odswiez();
        }
        try { doc.destroy(); } catch (_) {}
      } else {
        trzosToast("Czytam stronę…");
        const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
        await egzWyslijStrone(file, ext, file.type, zestawId, count);
        count++; ok++;
        odswiez();
      }
    } catch (e) { blad++; lastErr = (e && e.message) ? e.message : String(e); console.error("egzSkanuj", e); }
  }
  egzZajety = false;
  trzosToast(blad ? `Wgrano: ${ok}, błąd: ${lastErr || "?"}` : `Gotowe: ${ok} stron`);
}

let egzKolejka = [], egzFiszkaIdx = 0, egzSesja = { przejrzane: 0, slabe: 0 }, egzTylkoDue = false;
const EGZ_INT = [0, 1, 3, 7, 14, 30];
function egzZgadnijJezyk(t) { return /[ąćęłńóśźż]/i.test(t || "") ? "pl-PL" : "en-US"; }
function egzJezykPrzodu() {
  const j = egzAktywny && egzAktywny.jezyk ? String(egzAktywny.jezyk).trim() : "";
  if (!j) return null;
  if (j.length === 2) return j.toLowerCase() + "-" + j.toUpperCase();
  return j;
}
function egzMow(text, lang) {
  try {
    if (!window.speechSynthesis || !text) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(String(text));
    u.lang = lang || egzZgadnijJezyk(text);
    window.speechSynthesis.speak(u);
  } catch (e) {}
}
async function egzPokazFiszki(tylkoDue) {
  if (!egzAktywny) return;
  const { data: fs = [] } = await supabase.from("kuznia_fiszki").select("*").eq("zestaw_id", egzAktywny.id).order("created_at", { ascending: true });
  if (!fs.length) { $("egz-plan").innerHTML = `<div style="color:var(--ink-soft);font-size:13px;padding:8px 0;">Brak fiszek — kliknij „Rozłóż materiał".</div>`; return; }
  const dzis = czesciWarszawy(new Date()).dataISO;
  const due = fs.filter((f) => !f.next_due || f.next_due <= dzis);
  egzTylkoDue = (tylkoDue !== false) && due.length > 0;
  egzKolejka = (egzTylkoDue ? due : fs).slice().sort((a, b) => (a.poziom || 0) - (b.poziom || 0));
  if (!egzKolejka.length) { egzKolejka = fs.slice(); egzTylkoDue = false; }
  egzSesja = { przejrzane: 0, slabe: 0 };
  egzFiszkaIdx = 0;
  egzRenderFiszka();
}
async function egzOcen(f, umiem) {
  let poziom = f.poziom || 0, lapsy = f.lapsy || 0, powt = f.powtorzenia || 0;
  if (umiem) poziom = Math.min(5, poziom + 1); else { poziom = 0; lapsy++; egzSesja.slabe++; }
  powt++;
  const d = new Date(); d.setDate(d.getDate() + EGZ_INT[Math.min(poziom, EGZ_INT.length - 1)]);
  const nextDue = `${d.getFullYear()}-${dwa(d.getMonth() + 1)}-${dwa(d.getDate())}`;
  egzSesja.przejrzane++;
  try { await supabase.from("kuznia_fiszki").update({ poziom, lapsy, powtorzenia: powt, ostatnia: new Date().toISOString(), next_due: nextDue }).eq("id", f.id); } catch (e) {}
  egzFiszkaIdx++;
  if (egzFiszkaIdx >= egzKolejka.length) egzPodsumowanieFiszek(); else egzRenderFiszka();
}
function egzPodsumowanieFiszek() {
  if (egzAktywny && egzSesja.przejrzane > 0) {
    const poprawne = Math.max(0, egzSesja.przejrzane - egzSesja.slabe);
    const proc = Math.round((poprawne / egzSesja.przejrzane) * 100);
    supabase.from("kuznia_wyniki").insert({
      zestaw_id: egzAktywny.id, traveler_id: TRAVELER.id, typ: "fiszki",
      liczba: egzSesja.przejrzane, poprawne, wynik_proc: proc,
      zaliczony: egzAktywny.prog_zaliczenia ? (proc >= egzAktywny.prog_zaliczenia) : null,
    }).then(() => {});
  }
  const box = $("egz-plan");
  box.innerHTML = `
    <div style="background:#fff;border:1px solid #e7e3d8;border-radius:14px;padding:20px 16px;text-align:center;">
      <div style="font-size:17px;font-weight:600;margin-bottom:6px;">Powtórka skończona ✓</div>
      <div style="font-size:14px;color:var(--ink-soft);">Przejrzane: ${egzSesja.przejrzane} · do poprawy: ${egzSesja.slabe}</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      ${egzSesja.slabe ? `<button id="egz-jeszcze-slabe" style="${EGZ_BP}flex:1;">↻ Powtórz słabe</button>` : ""}
      <button id="egz-do-planu" style="${EGZ_BG}flex:1;">← Plan</button>
    </div>`;
  $("egz-do-planu").addEventListener("click", () => egzRenderPlan(egzAktywny.plan_md));
  const slabe = $("egz-jeszcze-slabe"); if (slabe) slabe.addEventListener("click", () => egzPokazFiszki(true));
}
function egzRenderFiszka() {
  const box = $("egz-plan");
  const f = egzKolejka[egzFiszkaIdx];
  const total = egzKolejka.length;
  const langP = egzJezykPrzodu() || egzZgadnijJezyk(f.pytanie);
  box.innerHTML = `

function egzNorm(s) {
  return String(s == null ? "" : s).toLowerCase().trim()
    .normalize("NFD").replace(/[̀-ͯ]/g, "")
    .replace(/ł/g, "l").replace(/ø/g, "o")
    .replace(/[^a-z0-9\s]/g, " ").replace(/\s+/g, " ").trim();
}
function egzTasuj(a) { const t = a.slice(); for (let i = t.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const x = t[i]; t[i] = t[j]; t[j] = x; } return t; }
async function egzSrUpdate(f, umiem) {
  let poziom = f.poziom || 0, lapsy = f.lapsy || 0, powt = (f.powtorzenia || 0) + 1;
  if (umiem) poziom = Math.min(5, poziom + 1); else { poziom = 0; lapsy++; }
  const d = new Date(); d.setDate(d.getDate() + EGZ_INT[Math.min(poziom, EGZ_INT.length - 1)]);
  const nextDue = `${d.getFullYear()}-${dwa(d.getMonth() + 1)}-${dwa(d.getDate())}`;
  f.poziom = poziom; f.lapsy = lapsy; f.powtorzenia = powt;
  try { await supabase.from("kuznia_fiszki").update({ poziom, lapsy, powtorzenia: powt, ostatnia: new Date().toISOString(), next_due: nextDue }).eq("id", f.id); } catch (e) {}
}

/* czytanie odpowiedzi asystenta na głos (TTS) — DOMYŚLNIE WŁĄCZONE, użytkownik może wyciszyć (wybór zapamiętany) */
let czytajGlosno = true;
try { czytajGlosno = localStorage.getItem("mana_glos") !== "0"; } catch (e) {}
function powiedz(tekst) {
  if (!czytajGlosno || !window.speechSynthesis) return;
  try {
    window.speechSynthesis.cancel();
    // wycinamy markdown żeby asystent nie czytał gwiazdek i myślników
    const czyste = String(tekst).replace(/\*\*/g, "").replace(/^\s*[-*•]\s+/gm, "");
    const u = new SpeechSynthesisUtterance(czyste);
    u.lang = "pl-PL"; u.rate = 1.0; u.pitch = 1.0;
    // najlepszy dostępny polski głos (domyślny bywa najgorszy): premium/enhanced > Google/Microsoft > pierwszy pl
    const glosy = window.speechSynthesis.getVoices().filter((v) => (v.lang || "").toLowerCase().startsWith("pl"));
    const lepszy = glosy.find((v) => /premium|enhanced|natural|neural/i.test(v.name))
      || glosy.find((v) => /google|microsoft/i.test(v.name))
      || glosy.find((v) => /zosia|ewa|paulina|marek/i.test(v.name))
      || glosy[0];
    if (lepszy) u.voice = lepszy;
    window.speechSynthesis.speak(u);
  } catch (err) { console.warn("TTS:", err); }
}
$("m-glos").addEventListener("click", () => {
  czytajGlosno = !czytajGlosno;
  try { localStorage.setItem("mana_glos", czytajGlosno ? "1" : "0"); } catch (e) {}
  $("m-glos").classList.toggle("m-glos--on", czytajGlosno);
  $("m-glos").setAttribute("aria-pressed", czytajGlosno ? "true" : "false");
  if (!czytajGlosno && window.speechSynthesis) window.speechSynthesis.cancel();
  if (czytajGlosno) powiedzBrief(true); // włączyłeś głos = kliknięcie, można od razu przywitać
});
if (czytajGlosno) { $("m-glos").classList.add("m-glos--on"); $("m-glos").setAttribute("aria-pressed", "true"); }

/* Powitanie GŁOSEM przy wejściu (gdy głośnik włączony). Telefon pozwala mówić dopiero
   po pierwszej interakcji — więc czekamy na pierwsze dotknięcie i wtedy witamy. */
var _briefTekst = null, _briefPowiedziany = false;

// numer tygodnia ISO 8601 (tydzień od poniedziałku; tydzień 1 zawiera pierwszy czwartek roku)
function numerTygodniaISO(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dow = (dt.getUTCDay() + 6) % 7;
  dt.setUTCDate(dt.getUTCDate() - dow + 3); // czwartek tego tygodnia
  const pierwszyCzw = new Date(Date.UTC(dt.getUTCFullYear(), 0, 4));
  return 1 + Math.round((dt - pierwszyCzw) / (7 * 86400000));
}

function pasujeDoSzukania(e, q) {

/* --- okres bieżącego widoku --- */
// Rotacja poziomo → tydzień: ODŁOŻONA (nie udało się dopiąć zdalnie). Zwraca false, więc widok dnia
// zostaje przy 1/3 wszędzie — dokładnie stan, który działał. Do wznowienia z diagnostyką na urządzeniu.
function czySzeroki() { return false; }
function zakresOkresu() {
  const k = new Date(kotwica.getFullYear(), kotwica.getMonth(), kotwica.getDate());
  if (widokKal === "rok")
    return { od: new Date(k.getFullYear(), 0, 1), rok: true };
  if (widokKal === "miesiac")
    return { od: new Date(k.getFullYear(), k.getMonth(), 1), miesiac: true };
  if (widokKal === "tydzien") {
    const dow = (k.getDay() + 6) % 7;
    return { od: new Date(k.getFullYear(), k.getMonth(), k.getDate() - dow), dni: 7 };
  }
  // dzień / 3 dni: szeroko (poziomo / desktop) → pełny tydzień (7, od poniedziałku); wąsko → 1/3
  if (czySzeroki()) {
    const dow = (k.getDay() + 6) % 7;
    return { od: new Date(k.getFullYear(), k.getMonth(), k.getDate() - dow), dni: 7 };
  }
  return { od: k, dni: widokKal === "3dni" ? 3 : 1 };
}
function przesunOkres(kier) {
  const k = kotwica;
  if (widokKal === "rok") kotwica = new Date(k.getFullYear() + kier, k.getMonth(), 1);
  else if (widokKal === "miesiac") kotwica = new Date(k.getFullYear(), k.getMonth() + kier, 1);
  else if (widokKal === "tydzien") kotwica = new Date(k.getFullYear(), k.getMonth(), k.getDate() + 7 * kier);
  else kotwica = new Date(k.getFullYear(), k.getMonth(), k.getDate() + (czySzeroki() ? 7 : 1) * kier); // wąsko: 1 dzień; szeroko (tydzień): 7 dni
  _kalKier = kier;
  renderKalendarz();
}
// obrót telefonu / zmiana szerokości okna → przerysuj widok dnia (poziomo pokazuje pełny tydzień)
let _szerokiStan = (typeof window !== "undefined") ? czySzeroki() : false;
function _rerenderDzien() {
  const w = document.getElementById("m-widok-horyzont");
  if (w && w.style.display !== "none" && (widokKal === "dzis" || widokKal === "3dni" || widokKal === "tydzien")) renderKalendarz();
}
function _sprawdzSzer() {
  const teraz = czySzeroki();
  if (teraz === _szerokiStan) return;
  _szerokiStan = teraz;

function etykietaOkresu(z) {
  if (z.rok) return String(z.od.getFullYear());
  if (z.miesiac)
    return z.od.toLocaleDateString("pl-PL", { month: "long", year: "numeric" });
  if (z.dni === 1)
    return z.od.toLocaleDateString("pl-PL", { weekday: "long", day: "numeric", month: "long" });
  const ost = new Date(z.od.getTime() + (z.dni - 1) * 86400000);
  const a = z.od.getMonth() === ost.getMonth()
    ? String(z.od.getDate())
    : z.od.toLocaleDateString("pl-PL", { day: "numeric", month: "short" });
  const b = ost.toLocaleDateString("pl-PL", { day: "numeric", month: "short" });
  return `${a} – ${b}`;
}

  $("kal-dzis").addEventListener("click", () => {

    } else if (widokKal === "3dni") {

      const e = new Date(s); e.setDate(e.getDate() + 6);

function podepnijSwipe(box) {
  let x0 = null, y0 = null;
  box.addEventListener("pointerdown", (e) => { x0 = e.clientX; y0 = e.clientY; });
  box.addEventListener("pointerup", (e) => {
    if (x0 == null) return;
    const dx = e.clientX - x0, dy = e.clientY - y0;
    x0 = null;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.4)
      przesunOkres(dx < 0 ? 1 : -1);
  });
}

function renderMiniMiesiac() {
  const wrap = $("m-mini-mies");
  if (!wrap) return;
  const dzis = czesciWarszawy(new Date());
  const k = kotwica;
  const rok = k.getFullYear(), mies = k.getMonth();
  const dniWMies = new Date(rok, mies + 1, 0).getDate();
  const pierwszyDow = (new Date(rok, mies, 1).getDay() + 6) % 7;
  const nazwa = new Date(rok, mies, 1).toLocaleDateString("pl-PL", { month: "long", year: "numeric" });
  const stolicaNazwy = nazwa.charAt(0).toUpperCase() + nazwa.slice(1);
  let html = `<div class="m-mini-mies__bar">
    <button data-mini="prev" aria-label="Poprzedni miesiąc">&#8249;</button>
    <span>${esc(stolicaNazwy)}</span>
    <button data-mini="next" aria-label="Następny miesiąc">&#8250;</button>
  </div>
  <div class="m-mini-mies__siatka">`;
  for (const d of ["Pn","Wt","Śr","Cz","Pt","So","Nd"]) html += `<div class="m-mini-mies__dow">${d}</div>`;
  for (let i = 0; i < pierwszyDow; i++) html += `<div></div>`;
  for (let d = 1; d <= dniWMies; d++) {
    const jestDzis = d === dzis.dzien && mies === dzis.mies - 1 && rok === dzis.rok;
    const jestAkt = !jestDzis && d === k.getDate() && mies === k.getMonth() && rok === k.getFullYear();
    const kl = jestDzis ? " m-mini-mies__dzien--dzis" : (jestAkt ? " m-mini-mies__dzien--akt" : "");
    html += `<div class="m-mini-mies__dzien${kl}" data-d="${d}">${d}</div>`;
  }
  html += `</div>`;
  wrap.innerHTML = html;
  wrap.querySelector('[data-mini="prev"]').addEventListener("click", () => {
    kotwica = new Date(rok, mies - 1, 1); renderKalendarz();
  });
  wrap.querySelector('[data-mini="next"]').addEventListener("click", () => {
    kotwica = new Date(rok, mies + 1, 1); renderKalendarz();
  });
  wrap.querySelectorAll(".m-mini-mies__dzien").forEach((c) =>
    c.addEventListener("click", () => {
      kotwica = new Date(rok, mies, Number(c.dataset.d));
      widokKal = "dzis";
      renderKalendarz();
    })
  );
}

function liniaPlemie(e) {

/* rozwija REGUŁĘ cykliczną na wystąpienia w oknie [ws, we] (model regułowy — jeden wiersz = reguła) */
function rozwinCykliczne(ev, ws, we) {
  const freq = ev.powtarzalnosc;
  if (!freq || freq === "jednorazowe") return [];
  const baseMs = new Date(ev.data_czas).getTime();
  const dur = ev.koniec ? (new Date(ev.koniec).getTime() - baseMs) : 0;
  const endSeria = ev.powtarzanie_do ? (new Date(ev.powtarzanie_do).getTime() + 86400000) : Infinity; // wliczając dzień końcowy
  const wsMs = ws.getTime(), weMs = we.getTime();
  const out = [];
  const d = new Date(baseMs);
  // szybkie przewinięcie dla dziennie/tygodniowo, by nie iterować od bardzo dawnej daty
  if ((freq === "dziennie" || freq === "tygodniowo") && d.getTime() < wsMs) {
    const stepDays = freq === "dziennie" ? 1 : 7;
    const skok = Math.floor((wsMs - dur - d.getTime()) / (stepDays * 86400000));
    if (skok > 0) d.setDate(d.getDate() + skok * stepDays);
  }
  let guard = 0;
  while (d.getTime() <= weMs && d.getTime() < endSeria && guard++ < 1500) {
    const t = d.getTime();
    if (t >= baseMs && (t + dur) >= wsMs) {
      out.push({ ...ev, data_czas: new Date(t).toISOString(), koniec: dur ? new Date(t + dur).toISOString() : ev.koniec, _seria: true });
    }
    if (freq === "dziennie") d.setDate(d.getDate() + 1);
    else if (freq === "tygodniowo") d.setDate(d.getDate() + 7);
    else if (freq === "miesiecznie") d.setMonth(d.getMonth() + 1);
    else if (freq === "rocznie") d.setFullYear(d.getFullYear() + 1);
    else break;
  }
  return out;
}
async function wczytajWydarzeniaZakres(od, doData) {
  const odISO = isoZWarszawy(dataKalISO(od), "00:00");
  const doISO = isoZWarszawy(dataKalISO(doData), "00:00");
  const odT = new Date(odISO).getTime(), doT = new Date(doISO).getTime();
  await zaladujPlemionaCache();
  // CACHE szerokiego okna (±45 dni) — nawigacja w jego obrębie bez zapytań do bazy (płynność)
  const swieze = _evCache && (Date.now() - _evCacheTs < 30000) && odT >= _evCache.odT && doT <= _evCache.doT;
  if (!swieze) {
    const wideOdT = odT - 45 * 86400000, wideDoT = doT + 45 * 86400000;
    const wideOd = new Date(wideOdT).toISOString(), wideDo = new Date(wideDoT).toISOString();
    const [rJ, rC] = await Promise.all([
      supabase.from("events").select("*")
        .in("typ", ["wydarzenie", "zadanie"])
        .or("powtarzalnosc.is.null,powtarzalnosc.eq.jednorazowe")
        .lt("data_czas", wideDo)
        .or(`koniec.gt.${wideOd},and(koniec.is.null,data_czas.gte.${wideOd})`)
        .order("data_czas", { ascending: true }),
      supabase.from("events").select("*")
        .in("typ", ["wydarzenie", "zadanie"])
        .in("powtarzalnosc", ["dziennie", "tygodniowo", "miesiecznie", "rocznie"])
        .lt("data_czas", wideDo)
        .or(`powtarzanie_do.is.null,powtarzanie_do.gte.${wideOd}`),
    ]);
    _evCache = { odT: wideOdT, doT: wideDoT, jedno: rJ.data || [], cykl: rC.data || [] };
    _evCacheTs = Date.now();
  }
  // z cache dla żądanego (wąskiego) okna
  let lista = (_evCache.jedno || []).filter((e) => {
    const sT = new Date(e.data_czas).getTime();
    const kT = e.koniec ? new Date(e.koniec).getTime() : null;
    return sT < doT && (kT != null ? kT > odT : sT >= odT);
  });
  for (const rule of (_evCache.cykl || [])) {
    for (const occ of rozwinCykliczne(rule, new Date(odISO), new Date(doISO))) lista.push(occ);
  }
  const _me = TRAVELER && TRAVELER.id;
  // propozycje (wydarzenia do zatwierdzenia) NIE pojawiają się na kalendarzu, dopóki nieprzyjęte
  lista = lista.filter((e) => e.status !== "proponowane");
  // własne wpisy zawsze; cudze wpisy plemienia tylko, gdy dane plemię jest włączone jako nakładka
  // PRYWATNY kalendarz: własne wpisy zawsze; cudze wpisy plemienia tylko gdy włączone w nakładce (opt-in)
  lista = lista.filter((e) => e.traveler_id === _me || (e.plemie_id && widocznePlemiona.has(e.plemie_id)));
  // „Rocznice" chowa tylko coroczne całodniowe (urodziny), NIE zwykłe wielodniowe (np. camp, wyjazd)
  if (!pokazRocznice) lista = lista.filter((e) => !(e.caly_dzien && e.powtarzalnosc === "rocznie"));
  if (ukryteKat.size) lista = lista.filter((e) => !ukryteKat.has(kategoriaZE(e)));
  if (zapytanieSzukaj) lista = lista.filter((e) => pasujeDoSzukania(e, zapytanieSzukaj));
  lista.sort((a, b) => new Date(a.data_czas) - new Date(b.data_czas));
  return lista;
}

/* --- widok Miesiąc --- */
function miniMiesiacKal(rok, mies) {
  const pierwszy = new Date(rok, mies, 1);
  const ile = new Date(rok, mies + 1, 0).getDate();
  const startDow = (pierwszy.getDay() + 6) % 7;
  const dzis = dzisWarszawa();
  const nazwaM = pierwszy.toLocaleDateString("pl-PL", { month: "long" });
  let cells = "";
  for (let i = 0; i < startDow; i++) cells += `<span></span>`;
  for (let d = 1; d <= ile; d++) {
    const jestDzis = dzis.getFullYear() === rok && dzis.getMonth() === mies && dzis.getDate() === d;
    cells += `<span style="${jestDzis ? "background:#d23b3b;color:#fff;border-radius:50%;" : ""}display:inline-flex;align-items:center;justify-content:center;aspect-ratio:1;">${d}</span>`;
  }
  const w = el(`<div class="mm-kal" style="cursor:pointer;">
    <div style="font-size:12.5px;font-weight:600;color:#1a7158;margin-bottom:4px;text-transform:capitalize;">${escP(nazwaM)}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);font-size:9.5px;text-align:center;color:var(--ink-soft);line-height:1.3;">${cells}</div>
  </div>`);
  w.addEventListener("click", () => { kotwica = new Date(rok, mies, 1); widokKal = "miesiac"; renderKalendarz(); });
  return w;
}
async function renderRokGrid(box, rokCentr) {
  box.innerHTML = `<div style="position:relative;overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:calc(100vh - 200px);padding:4px 4px 60px;"></div>`;
  const cont = box.firstChild;
  const rokDzis = dzisWarszawa().getFullYear();
  const sekcjaRoku = (r) => {
    const sek = el(`<div data-rok="${r}" style="margin-bottom:26px;">
      <div style="font-size:22px;font-weight:700;color:${r === rokDzis ? "#1a7158" : "var(--ink)"};margin:4px 4px 12px;">${r}</div>
      <div class="rok-mies-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px 12px;"></div>
    </div>`);
    const g = sek.querySelector(".rok-mies-grid");
    for (let m = 0; m < 12; m++) g.appendChild(miniMiesiacKal(r, m));
    return sek;
  };
  // bufor ±2 lata; nieskończone dorastanie na krawędziach
  let gornaR = rokCentr - 2, dolnaR = rokCentr + 2;
  for (let r = gornaR; r <= dolnaR; r++) cont.appendChild(sekcjaRoku(r));
  function prependR(n) { const h0 = cont.scrollHeight; for (let i = 0; i < n; i++) { gornaR--; cont.insertBefore(sekcjaRoku(gornaR), cont.firstChild); } cont.scrollTop += cont.scrollHeight - h0; }
  function appendR(n) { for (let i = 0; i < n; i++) { dolnaR++; cont.appendChild(sekcjaRoku(dolnaR)); } }

  let tickR = false;
  cont.addEventListener("scroll", () => {
    if (tickR) return; tickR = true;
    requestAnimationFrame(() => {
      tickR = false;
      if (cont.scrollTop < 300) prependR(2);
      if (cont.scrollHeight - cont.scrollTop - cont.clientHeight < 300) appendR(2);
      const st = cont.scrollTop + 8;
      const secs = cont.querySelectorAll("[data-rok]");
      let akt = secs[0];
      for (const s of secs) { if (s.offsetTop <= st) akt = s; else break; }
      if (akt) { const y = Number(akt.dataset.rok); if (y !== kotwica.getFullYear()) kotwica = new Date(y, kotwica.getMonth(), 1); }
    });
  });
  requestAnimationFrame(() => {
    const t = [...cont.querySelectorAll("[data-rok]")].find((s) => Number(s.dataset.rok) === rokCentr);
    if (t) cont.scrollTop = t.offsetTop - 4;
  });
}

  // dniZWyd: dla wielodniowych całodziennych (wyjazdy) — wszystkie pokryte dni
  const dniZWyd = new Set();
  const dniPlem = {}; // dzień -> Set kolorów plemion (wydarzenia plemienne tego dnia)
  const dodajPlem = (d, e) => {

      }

  for (let i = 0; i < pierwszyDow; i++) html += `<div></div>`;
  for (let d = 1; d <= dniWMies; d++) {
    const dzisKl = d === dzisTen ? " m-mc__dzien--dzis" : "";

      kropka = `<span class="m-mc__kropki">`
        + [...dniPlem[d]].slice(0, 3).map((c) => `<span style="background:${c}"></span>`).join("")
        + `</span>`;
    } else if (dniZWyd.has(d)) {
      kropka = `<span class="m-mc__kropka"></span>`;
    }
    html += `<div class="m-mc__dzien${dzisKl}" data-d="${d}">${d}${kropka}</div>`;
  }
  html += `</div></div>`;
  box.innerHTML = html;
  box.querySelectorAll(".m-mc__dzien").forEach((cell) => {
    cell.addEventListener("click", () => {
      kotwica = new Date(rok, mies, Number(cell.dataset.d));
      widokKal = "dzis";
      renderKalendarz();
    });
  });

  const lista = document.createElement("div");
  lista.className = "m-mlist";
  // Bieżący miesiąc = wyjątek: domyślnie od DZIŚ do końca (przycisk „wszystkie"). Przeszłe i przyszłe miesiące = całość.
  const biezacyMies = dzisTen > 0;
  let doPokazania = wyd, ukryte = 0;
  if (biezacyMies && !_miesPokazPrzeszle) {
    const prog = new Date(rok, mies, dzisTen); prog.setHours(0, 0, 0, 0);
    const przeszly = (e) => new Date(e.koniec || e.data_czas) < prog;
    ukryte = wyd.filter(przeszly).length;
    doPokazania = wyd.filter((e) => !przeszly(e));
  }
  if (biezacyMies && (ukryte > 0 || _miesPokazPrzeszle)) {
    const btn = el(`<button style="border:1px solid var(--line);background:var(--surface);border-radius:9px;font-size:12px;padding:5px 11px;margin:2px 4px 8px;cursor:pointer;color:var(--ink-soft);">${_miesPokazPrzeszle ? "↑ Tylko nadchodzące" : `Pokaż wszystkie (${ukryte} minione)`}</button>`);
    btn.addEventListener("click", () => { _miesPokazPrzeszle = !_miesPokazPrzeszle; renderKalendarz(); });
    lista.appendChild(btn);
  }
  if (!doPokazania.length) {
    lista.appendChild(el(`<div class="m-pusto" style="padding:8px 4px">${biezacyMies ? "Nic już przed Tobą w tym miesiącu." : "Brak wydarzeń w tym miesiącu."}</div>`));
  } else {

      const sub = liniaPlemie(e) || obcaStrefaLinia(e);

      const wier = el(`<div class="m-poz"><span class="m-poz__czas">${esc(kiedy)}</span>`
        + `<span class="m-poz__tytul"><span class="m-kat-kropka" style="background:${kolorKategorii(e)}"></span>`
        + (plKol ? `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${plKol};margin-right:4px;vertical-align:middle;"></span>` : "")
        + `${esc(e.tytul)}${sub ? ` <span class="m-poz__obca">${esc(sub)}</span>` : ""}</span></div>`);
      wier.style.cursor = "pointer";

const MIES_PL = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];

  const scroll = box.querySelector("#mcc-scroll");
  const listaEl = box.querySelector("#mcc-lista");

  // KROPKI: ładowane raz na miesiąc (leniwie, gdy miesiąc wchodzi do DOM); mapa ISO -> Set kolorów plemion

  const zaladMies = new Set();
  const dodajDot = (iso, kol) => { if (!mapaDni.has(iso)) mapaDni.set(iso, new Set()); if (kol) mapaDni.get(iso).add(kol); };
  async function zaladujKropki(rok, mies) {
    const key = rok * 12 + mies;
    if (zaladMies.has(key)) return; zaladMies.add(key);
    const evs = await wczytajWydarzeniaZakres(new Date(rok, mies, 1), new Date(rok, mies + 1, 1));

      const sub = liniaPlemie(e) || obcaStrefaLinia(e);
      const plKol = e.plemie_id && PLEMIE_MAP[e.plemie_id] ? PLEMIE_MAP[e.plemie_id].kolor : null;
      const wier = el(`<div class="m-poz"><span class="m-poz__czas">${esc(kiedy)}</span><span class="m-poz__tytul"><span class="m-kat-kropka" style="background:${kolorKategorii(e)}"></span>${plKol ? `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${plKol};margin-right:4px;vertical-align:middle;"></span>` : ""}${esc(e.tytul)}${sub ? ` <span class="m-poz__obca">${esc(sub)}</span>` : ""}</span></div>`);
      wier.style.cursor = "pointer";
      wier.addEventListener("click", () => oknoWydarzenia({ event: e }));
      listaEl.appendChild(wier);
    }
  }

  function widoczneTygodnie() {
    const top = scroll.scrollTop, bot = top + scroll.clientHeight;
    const rows = scroll.querySelectorAll(".m-mcc__tydz");
    let first = null, last = null;
    for (const r of rows) { const t = r.offsetTop, b = t + r.offsetHeight; if (b > top + 2 && t < bot - 2) { if (!first) first = r; last = r; } }
    if (!first) return null;
    const [Y1, M1, D1] = first.dataset.mon.split("-").map(Number);
    const [Y2, M2, D2] = last.dataset.mon.split("-").map(Number);
    const start = new Date(Y1, M1 - 1, D1);
    const end = new Date(Y2, M2 - 1, D2); end.setDate(end.getDate() + 7); // koniec ostatniego widocznego tygodnia
    return { start, end };
  }

  function przelicz() {
    const st = scroll.scrollTop + 6;
    const labs = scroll.querySelectorAll(".m-mcc__mieslabel");
    let akt = labs[0];
    for (const l of labs) { if (l.offsetTop <= st) akt = l; else break; }
    if (akt) ustawPasek(Number(akt.dataset.rok), Number(akt.dataset.mies));
    const zak = widoczneTygodnie();
    if (zak) ustawListe(zak.start, zak.end);
  }

  let tick = false;
  scroll.addEventListener("scroll", () => {
    if (tick) return; tick = true;
    requestAnimationFrame(() => {
      tick = false;
      if (scroll.scrollTop < 250) prepend(6);
      if (scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 250) appendW(6);
      przelicz();
    });
  });

  ustawPasek(bazaRok, bazaMies);
  requestAnimationFrame(() => {
    const lab = [...scroll.querySelectorAll(".m-mcc__mieslabel")].find((l) => Number(l.dataset.rok) === bazaRok && Number(l.dataset.mies) === bazaMies);
    if (lab) scroll.scrollTop = lab.offsetTop;
    przelicz();
  });
}

/* --- widok Dziś / 3 dni / Tydzień: siatka czasu --- */
function ustawScrollGodziny(root) {
  const zrob = () => {
    const scr = root && root.querySelector(".m-tg__scroll");
    if (!scr || !scr.clientHeight) return false;
    const teraz = root.querySelector(".m-tg__teraz");
    const H = 44;
    const target = teraz ? ((parseFloat(teraz.style.top) || 0) - scr.clientHeight / 2) : (8 * H - scr.clientHeight / 2);
    scr.scrollTop = Math.max(0, target);
    return true;
  };
  if (zrob()) return;
  requestAnimationFrame(() => { if (!zrob()) setTimeout(zrob, 60); });
  setTimeout(zrob, 140);
}
async function renderSiatka(box, od, dni) {
  const H = 44;
  const teraz = czesciWarszawy(new Date());
  const dzisISO = dataKalISO(dzisWarszawa());
  const koniec = new Date(od.getTime() + dni * 86400000);

  }

  // PASMO CAŁODZIENNE — delikatny wiersz na płaszczyźnie godzin: etykieta dnia per kolumna
  // („śr – 8 lip", dziś czerwony) + bary całodzienne. Interaktywne: pojawia się i rośnie z wpisami
  // całodniowymi, znika całkiem gdy ich nie ma.
  let stripHtml = "";
  { // etykieta dnia ZAWSZE (1 dzień i 3 dni); pasmo rośnie o bary całodzienne
    let kolumnyStrip = `<div></div>`;
    for (let i = 0; i < dni; i++) {
      const dayISO = dniISO[i];
      const dz = new Date(od.getTime() + i * 86400000);
      const jestDzis = dayISO === dzisISO;
      const et = dz.toLocaleDateString("pl-PL", { weekday: "short" }) + " – " + dz.getDate() + " " + dz.toLocaleDateString("pl-PL", { month: "short" });
      const pasujace = calodzienne.filter((e) => dniCalodzienne(e).includes(dayISO));
      let bary = "";
      for (const e of pasujace) {
        const kKol = kolorKategorii(e);
        bary += `<div class="m-tg__caly-dzien-bar" data-id="${esc(e.id || "")}" `
          + `style="background:${kKol};border-left:3px solid ${kKol}" `
          + `title="${esc(e.tytul)}">${esc(e.tytul)}</div>`;
      }
      kolumnyStrip += `<div class="m-tg__caly-dzien-kol"><div style="text-align:center;font-size:11px;padding:2px 0 5px;${jestDzis ? "color:#d23b3b;font-weight:700;" : "color:var(--ink-soft);"}">${esc(et)}</div>${bary}</div>`;
    }
    stripHtml = `<div class="m-tg__caly-dzien-strip" style="grid-template-columns:38px repeat(${dni},1fr)">${kolumnyStrip}</div>`;
  }

  let godziny = "";
  for (let h = 0; h < 24; h++)
    godziny += `<div class="m-tg__godz" style="height:${H}px">${dwa(h)}</div>`;
  let kolumny = "";
  for (let i = 0; i < dni; i++) {
    let linie = "";
    for (let h = 1; h < 24; h++) linie += `<div class="m-tg__linia" style="top:${h * H}px"></div>`;
    kolumny += `<div class="m-tg__kol" data-i="${i}" style="height:${24 * H}px">${linie}</div>`;
  }
  const dowLit = ["P", "W", "Ś", "C", "P", "S", "N"];
  const pon = new Date(od); pon.setDate(od.getDate() - ((od.getDay() + 6) % 7));
  const odISO2 = dataKalISO(od), konISO2 = dataKalISO(new Date(od.getTime() + (dni - 1) * 86400000));
  let stripTydz = `<div class="m-kal-tydz" style="display:grid;grid-template-columns:${pokazNumeryTygodni ? "26px " : ""}repeat(7,1fr);gap:2px;padding:6px 8px 8px;border-bottom:1px solid var(--line);">`;
  if (pokazNumeryTygodni) stripTydz += `<div class="kal-wk-btn" title="Pokaż tydzień" style="font-size:10px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;cursor:pointer;">T${numerTygodniaISO(pon)}</div>`;
  for (let i = 0; i < 7; i++) {
    const d = new Date(pon.getTime() + i * 86400000);
    const iso = dataKalISO(d);
    const wZak = iso >= odISO2 && iso <= konISO2;
    const jestDzis2 = iso === dzisISO;
    // dziś: czerwone kółko TYLKO gdy w oknie; po zsunięciu zostaje sama czerwona cyfra
    const stylNum = jestDzis2
      ? (wZak ? "background:#d23b3b;color:#fff;border-radius:50%;" : "color:#d23b3b;font-weight:700;")

    stripTydz += `<button class="m-ktd" data-iso="${d.toISOString()}" style="border:none;background:${wZak ? "rgba(26,113,88,0.18)" : "transparent"};border-radius:12px;padding:3px 0 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;">

  }
  stripTydz += `</div>`;
  box.innerHTML = `${stripTydz}<div class="m-tg">
    ${stripHtml}
    <div class="m-tg__scroll"><div class="m-tg__plansza">

  // kliknięcia na bary całodzienne — otwórz edycję
  box.querySelectorAll(".m-tg__caly-dzien-bar").forEach((b) => {
    const id = b.dataset.id;
    const e = calodzienne.find((x) => x.id === id);
    if (e) b.addEventListener("click", (ev) => { ev.stopPropagation(); oknoWydarzenia({ event: e }); });
  });

  const kolEls = box.querySelectorAll(".m-tg__kol");
  for (const e of godzinowe) {
    const cz = czesciWarszawy(e.data_czas);
    let idx = -1;
    for (let i = 0; i < dni; i++) {
      const dz = new Date(od.getTime() + i * 86400000);
      if (dataKalISO(dz) === cz.dataISO) { idx = i; break; }
    }
    if (idx < 0) continue;
    let trwanie = 60;
    if (e.koniec) { const d = (new Date(e.koniec) - new Date(e.data_czas)) / 60000; if (d > 0) trwanie = d; }
    const top = (cz.godz * 60 + cz.min) / 60 * H;
    const wys = Math.max(trwanie / 60 * H, 22);
    const klasaZad = e.typ === "zadanie" ? " m-tg__event--zad" : "";
    const sub = liniaPlemie(e) || obcaStrefaLinia(e);
    const plKol = e.plemie_id && PLEMIE_MAP[e.plemie_id] ? PLEMIE_MAP[e.plemie_id].kolor : null;
    const kKol = kolorKategorii(e);
    const styl = `top:${top}px;height:${wys}px;border-left-color:${kKol};background:${kKol}1a`;
    const blok = el(`<div class="m-tg__event${klasaZad}" style="${styl}">`
      + `<span class="m-tg__event-czas" style="color:${kKol}">${fmtZakresGodz(e)}</span> `
      + (plKol ? `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${plKol};margin-right:3px;"></span>` : "")
      + `<span>${esc(e.tytul)}</span>`
      + (sub ? `<span class="m-tg__event-obca">${esc(sub)}</span>` : "")
      + `</div>`);
    blok.addEventListener("click", (ev) => { ev.stopPropagation(); oknoWydarzenia({ event: e }); });
    kolEls[idx].appendChild(blok);
  }
  for (let i = 0; i < dni; i++) {
    const dz = new Date(od.getTime() + i * 86400000);
    if (dataKalISO(dz) === dzisISO) {
      const top = (teraz.godz * 60 + teraz.min) / 60 * H;
      kolEls[i].appendChild(el(`<div class="m-tg__teraz" style="top:${top}px"><span style="position:absolute;left:2px;top:-8px;background:#d23b3b;color:#fff;font-size:10px;font-weight:700;padding:0 5px;border-radius:9px;line-height:16px;white-space:nowrap;">${dwa(teraz.godz)}:${dwa(teraz.min)}</span></div>`));
    }
    kolEls[i].addEventListener("click", (ev) => {
      const rect = kolEls[i].getBoundingClientRect();
      const godz = Math.max(0, Math.min(23, Math.floor((ev.clientY - rect.top) / H)));
      oknoWydarzenia({ data: new Date(od.getTime() + i * 86400000), godzina: godz });
    });
  }
  box.querySelectorAll(".m-tg__hdr").forEach((h) => {
    if (!h.dataset.iso) return;
    h.addEventListener("click", () => {
      kotwica = new Date(h.dataset.iso);
      widokKal = "dzis";
      renderKalendarz();
    });
  });
  const scr = box.querySelector(".m-tg__scroll");
  if (scr) scr.scrollTop = Math.max(0, (teraz.godz - 1) * H);
}

    if (typeof Intl.supportedValuesOf === "function") return Intl.supportedValuesOf("timeZone");
  } catch (e) { /* fallback niżej */ }
  return [
    "Europe/Warsaw", "Europe/London", "Europe/Paris", "Europe/Berlin", "Europe/Madrid",
    "Europe/Rome", "Europe/Athens", "Europe/Moscow", "America/New_York", "America/Chicago",
    "America/Denver", "America/Los_Angeles", "America/Sao_Paulo", "America/Mexico_City",
    "Asia/Dubai", "Asia/Kolkata", "Asia/Bangkok", "Asia/Shanghai", "Asia/Tokyo",
    "Asia/Singapore", "Australia/Sydney", "Pacific/Auckland", "UTC",
  ];
}
function wybierzStrefe(aktualna, callback) {

    <div class="m-modal__head">
      <span class="m-modal__tytul">Strefa czasowa</span>

    <div class="m-strefa-lista" id="strefa-lista"></div>
  </div></div>`);
  document.body.appendChild(overlay);
  const zamknij = () => overlay.remove();
  overlay.addEventListener("click", (e) => { if (e.target === overlay) zamknij(); });
  overlay.querySelector(".m-modal__x").addEventListener("click", zamknij);
  const lista = overlay.querySelector("#strefa-lista");
  const szukaj = overlay.querySelector("#strefa-szukaj");
  function rysuj(filtr) {
    const f = String(filtr || "").trim().toLowerCase();
    lista.innerHTML = "";
    const pasuje = strefy.filter((s) =>
      !f || miastoZeStrefy(s).toLowerCase().includes(f) || s.toLowerCase().includes(f)
    ).slice(0, 200);
    if (!pasuje.length) {
      lista.appendChild(el(`<div class="m-strefa-pusto">Brak strefy dla „${esc(filtr)}".</div>`));
      return;
    }
    for (const s of pasuje) {
      const reg = s.includes("/") ? s.split("/")[0] : "";
      const w = el(`<div class="m-strefa-poz${s === aktualna ? " m-strefa-poz--on" : ""}">

        <span class="m-strefa-poz__reg">${esc(reg)}</span></div>`);
      w.addEventListener("click", () => { zamknij(); callback(s); });
      lista.appendChild(w);
    }
  }
  szukaj.addEventListener("input", () => rysuj(szukaj.value));
  rysuj("");
  setTimeout(() => szukaj.focus(), 50);
}
