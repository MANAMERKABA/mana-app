  }).join("") : `<div style="color:var(--ink-soft);font-size:13px;padding:6px 0;">Brak kontaktów — dodaj kontakty w zakładce Kontakty.</div>`;
  const sheet = el(`<div class="m-overlay"><div class="m-modal">
    <div class="m-modal__head"><span class="m-modal__tytul">Nowa rozmowa</span><button class="m-modal__x" aria-label="Zamknij">&#10005;</button></div>
    <div class="m-form">
      <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:8px;">Wybierz osobę — rozmowa indywidualna. Rozmowy grupowe zakładasz w zakładce Plemiona.</div>
      <input class="nr-szukaj" type="search" placeholder="Szukaj kontaktu…" style="width:100%;box-sizing:border-box;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:14px;margin-bottom:8px;">
      <div class="nr-lista" style="max-height:44vh;overflow:auto;margin-bottom:10px;">${wiersze}</div>
      <button class="nr-utworz" style="width:100%;border:none;background:var(--turkus,#1f9e8f);color:#fff;border-radius:12px;padding:12px;font-size:15px;cursor:pointer;">Rozpocznij rozmowę</button>
    </div>
  </div></div>`);
  document.body.appendChild(sheet);
  const zamknij = () => sheet.remove();
  sheet.addEventListener("click", (e) => { if (e.target === sheet) zamknij(); });
  sheet.querySelector(".m-modal__x").addEventListener("click", zamknij);
  const szukaj = sheet.querySelector(".nr-szukaj");
  szukaj.addEventListener("input", () => {
    const q = szukaj.value.trim().toLowerCase();
    sheet.querySelectorAll(".nr-wiersz").forEach((w) => { w.style.display = (!q || (w.dataset.szukaj || "").includes(q)) ? "" : "none"; });
  });
  sheet.querySelector(".nr-utworz").addEventListener("click", async () => {
    const sel = sheet.querySelector(".nr-radio:checked");
    if (!sel) { alert("Wybierz osobę."); return; }
    const btn = sheet.querySelector(".nr-utworz"); btn.disabled = true; btn.textContent = "Otwieram…";
    const { data: r, error } = await supabase.rpc("rozpocznij_rozmowe", { p_kontakt_id: sel.dataset.id });
    if (error || !r || r.ok === false) {
      const msg = (r && r.error) === "nie_w_manie"
        ? "Ta osoba nie ma jeszcze konta MANA. Rozmowa 1:1 działa z osobami w MANIE — najpierw zaproś ją do MANY (w Kontaktach albo przez plemię)."
        : ("Nie udało się: " + ((r && r.error) || (error && error.message) || "błąd"));
      alert(msg); btn.disabled = false; btn.textContent = "Rozpocznij rozmowę"; return;
    }
    zamknij();
    const { data: pf } = await supabase.rpc("moje_plemiona_full");
    const pObj = (pf || []).find((x) => x.id === r.plemie_id);
    if (pObj) otworzRozmowe(pObj);
    if (typeof renderRozmowyInbox === "function") renderRozmowyInbox();
  });
}

async function renderSejf() {
  const lista = $("sejf-lista");
  lista.innerHTML = `<div style="color:var(--ink-soft);font-size:14px;padding:8px 0;">Wczytuję…</div>`;
  // bez filtra traveler_id — RLS zwraca własne + wspólne (plemię/firma)
  const [rDoc, rPl] = await Promise.all([
    supabase.from("dokumenty").select("*").eq("kontekst", "sejf").order("data_utworzenia", { ascending: false }),
    supabase.rpc("moje_plemiona_full"),
  ]);
  if (rDoc.error) { lista.innerHTML = `<div style="color:#c4513a;">Błąd: ${escP(rDoc.error.message)}</div>`; return; }
  SEJF_PLEMIE_MAP = {};
  (rPl.data || []).forEach((p) => { SEJF_PLEMIE_MAP[p.id] = p.nazwa; });
  let docs = rDoc.data || [];
  if (sejfSzukaj) {
    const q = sejfSzukaj.toLowerCase();
    docs = docs.filter((d) => [d.tytul, d.opis, d.kategoria, d.typ].some((x) => (x || "").toLowerCase().includes(q)));
  }
  lista.innerHTML = "";
  if (!docs.length) { lista.appendChild(el(`<div style="color:var(--ink-soft);font-size:14px;padding:8px 0;">${sejfSzukaj ? "Nic nie znaleziono." : "Sejf pusty — dodaj pierwszy dokument (umowa, dowód rej., polisa)."}</div>`)); return; }
  const grupy = {};
  docs.forEach((d) => { const k = d.kategoria || "Inne"; (grupy[k] = grupy[k] || []).push(d); });
  for (const k of Object.keys(grupy)) {
    lista.appendChild(el(`<div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin:12px 0 6px;">📂 ${escP(k)}</div>`));
    for (const d of grupy[k]) lista.appendChild(kartaDokSejf(d));
  }
}

function kartaDokSejf(d) {
  const dzis = new Date();
  let waznHtml = "";
  if (d.data_waznosci) {
    const w = new Date(d.data_waznosci + "T00:00");
    const dni = Math.round((w - dzis) / 86400000);
    const kolor = dni < 0 ? "#c4513a" : (dni <= 30 ? "#d98324" : "var(--ink-soft)");
    const txt = dni < 0 ? `ważność minęła · ${fmtData(d.data_waznosci, { day: "numeric", month: "short", year: "numeric" })}` : `ważne do ${fmtData(d.data_waznosci, { day: "numeric", month: "short", year: "numeric" })}`;
    waznHtml = `<div style="font-size:11.5px;color:${kolor};margin-top:2px;">⏳ ${esc(txt)}</div>`;
  }
  const pl = plikiZDok(d);
  const n = pl.length;
  const moje = d.traveler_id === (TRAVELER && TRAVELER.id);
  const zakres = d.plemie_id ? ("👥 " + escP(SEJF_PLEMIE_MAP[d.plemie_id] || "plemię")) : (d.org_id ? "🏢 firma" : "🔒 tylko ja");
  const udost = moje ? "" : " · udostępniony Tobie";
  const w = el(`<div style="border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;">
    <div style="font-size:15px;font-weight:500;">${esc(d.tytul || "(bez tytułu)")}</div>
    <div style="font-size:11.5px;color:var(--ink-soft);margin-top:1px;">${esc(d.rodzaj || "dokument")}${d.data_dokumentu ? " · " + esc(fmtData(d.data_dokumentu, { day: "numeric", month: "short", year: "numeric" })) : ""}${n ? " · 📎 " + n + (n === 1 ? " plik" : " str.") : ""}</div>
    <div style="font-size:11px;color:var(--ink-soft);margin-top:2px;">${zakres}${udost}</div>
    ${waznHtml}
    ${d.opis ? `<div style="font-size:12.5px;color:var(--ink);margin-top:4px;white-space:pre-wrap;">${esc(d.opis)}</div>` : ""}
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center;">
      <span class="sj-otw-box" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;"></span>
      ${moje ? `<button class="sj-edit" style="${BG}font-size:12px;padding:5px 10px;">Edytuj</button>
      <button class="sj-usun" style="${BG}font-size:12px;padding:5px 10px;color:#c0392b;">Usuń</button>` : ""}
    </div></div>`);
  const otwBox = w.querySelector(".sj-otw-box");
  if (n === 1) {
    const b = el(`<button style="${BG}font-size:12px;padding:5px 10px;">📄 Otwórz</button>`);
    b.addEventListener("click", () => otworzPlikiSejf(pl));
    otwBox.appendChild(b);
  } else if (n > 1) {
    otwBox.appendChild(el(`<span style="font-size:12px;color:var(--ink-soft);">📄 Strony:</span>`));
    pl.forEach((p, i) => {
      const b = el(`<button style="${BG}font-size:12px;padding:5px 9px;">${i + 1}</button>`);
      b.addEventListener("click", () => otworzPlikiSejf([p]));
      otwBox.appendChild(b);
    });
  }
  const bEdit = w.querySelector(".sj-edit"); if (bEdit) bEdit.addEventListener("click", () => kartaSejf(d));
  const bUsun = w.querySelector(".sj-usun"); if (bUsun) bUsun.addEventListener("click", () => usunSejf(d));
  return w;
}

function plikiZDok(d) {
  if (Array.isArray(d.pliki) && d.pliki.length) return d.pliki;
  if (d.plik_url) return [{ sciezka: d.plik_url, mime: d.mime || null }];
  return [];
}
function liczbaPlikow(d) { return plikiZDok(d).length; }
async function otworzPlikiSejf(pliki) {
  if (!pliki || !pliki.length) return;
  const p = pliki[0]; // jeden plik na raz (przyciski stron wołają pojedynczo)
  const { data, error } = await supabase.storage.from("dokumenty").createSignedUrl(p.sciezka, 300);
  if (error || !data) { trzosToast("Nie udało się otworzyć pliku."); return; }
  pokazPlikOverlay(data.signedUrl, p.mime);
}
/* podgląd pliku W APLIKACJI (nakładka) — działa na mobile, bez blokady wyskakujących okien */
function pokazPlikOverlay(url, mime) {
  const isImg = (mime || "").startsWith("image/") || /\.(jpe?g|png|gif|webp)$/i.test((url.split("?")[0] || ""));
  const tresc = isImg
    ? `<img src="${url}" style="max-width:100%;max-height:82vh;border-radius:8px;display:block;margin:0 auto;">`
    : `<iframe src="${url}" style="width:88vw;height:82vh;border:none;border-radius:8px;background:#fff;"></iframe>`;
  const ov = el(`<div class="m-overlay" style="z-index:10000;"><div style="position:relative;max-width:96vw;max-height:92vh;background:#1a1a1a;border-radius:12px;padding:10px;">
    <button class="pv-x" style="position:absolute;top:-12px;right:-12px;width:32px;height:32px;border-radius:50%;border:none;background:#fff;cursor:pointer;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.3);">✕</button>
    <a href="${url}" target="_blank" rel="noopener" style="position:absolute;top:-12px;left:-12px;background:#fff;border-radius:16px;padding:4px 11px;font-size:12px;text-decoration:none;color:#111;box-shadow:0 2px 8px rgba(0,0,0,.3);">otwórz ↗</a>
    ${tresc}
  </div></div>`);
  document.body.appendChild(ov);
  const zamknij = () => ov.remove();
  ov.addEventListener("click", (e) => { if (e.target === ov) zamknij(); });
  ov.querySelector(".pv-x").addEventListener("click", zamknij);
}

function kartaSejf(d) {
  const edycja = !!d;
  const opcjePrzek = SEJF_PRZEKLADKI.map((k) => `<option value="${escP(k)}"${d && d.kategoria === k ? " selected" : ""}>${escP(k)}</option>`).join("");
  const ov = el(`<div class="m-overlay"><div class="m-modal">
    <div class="m-modal__head"><span class="m-modal__tytul">${edycja ? "Dokument" : "Nowy dokument"}</span><button class="m-modal__x" aria-label="Zamknij">&#10005;</button></div>
    <div class="m-form">
      <label>Tytuł</label>
      <input type="text" id="sj-tytul" maxlength="200" value="${edycja ? esc(d.tytul || "") : ""}" placeholder="np. Dowód rejestracyjny — Mercedes GLC">
      <div class="m-form__row">
        <div><label>Przekładka</label><select id="sj-kat">${opcjePrzek}</select></div>
        <div><label>Rodzaj</label><input type="text" id="sj-typ" maxlength="60" value="${edycja ? esc(d.rodzaj || "") : ""}" placeholder="umowa / polisa / dowód"></div>
      </div>
      <div class="m-form__row">
        <div><label>Data dokumentu</label><input type="date" id="sj-data" value="${edycja && d.data_dokumentu ? d.data_dokumentu : ""}"></div>
        <div><label>Ważny do (opcjonalnie)</label><input type="date" id="sj-waznosc" value="${edycja && d.data_waznosci ? d.data_waznosci : ""}"></div>
      </div>
      <label>Kto widzi</label>
      <select id="sj-kto"><option value="">🔒 Tylko ja (prywatny)</option></select>
      <label>Notatki / kontakt (telefon, osoba, miejsce)</label>
      <textarea id="sj-opis">${edycja ? esc(d.opis || "") : ""}</textarea>
      ${edycja ? `<label>Strony dokumentu (↑↓ kolejność · 👁 podgląd · × usuń)</label><div id="sj-strony"></div>` : ""}
      <label>${edycja ? "Dodaj kolejne strony/pliki (opcjonalnie)" : "Pliki — strony dokumentu (możesz wybrać kilka, także po kolei)"}</label>
      <input type="file" id="sj-plik" accept="image/*,application/pdf" multiple>
      <div id="sj-plik-info" style="font-size:11.5px;color:#1a7158;margin-top:3px;"></div>
      ${edycja ? `<div style="font-size:11.5px;color:var(--ink-soft);margin-top:2px;">Już dołączone: ${liczbaPlikow(d)} — nowe dojdą do istniejących.</div>` : ""}
      <div style="font-size:11.5px;color:var(--ink-soft);margin-top:4px;">„Ważny do" doda przypomnienie do Horyzontu (2 tyg. wcześniej).</div>
    </div>
    <div class="m-modal__akcje"><button class="m-btn m-btn--zapisz" id="sj-zapisz">Zapisz</button></div>
  </div></div>`);
  document.body.appendChild(ov);
  const zamknij = () => ov.remove();
  ov.addEventListener("click", (e) => { if (e.target === ov) zamknij(); });
  ov.querySelector(".m-modal__x").addEventListener("click", zamknij);
  // kumulacja wybranych plików — wybory po kolei DODAJĄ się (input domyślnie nadpisuje)
  const wybranePliki = [];
  const plikInput = ov.querySelector("#sj-plik");
  const plikInfo = ov.querySelector("#sj-plik-info");
  plikInput.addEventListener("change", () => {
    for (const f of plikInput.files) wybranePliki.push(f);
    plikInput.value = "";
    plikInfo.textContent = wybranePliki.length ? `Do dodania: ${wybranePliki.length} ${wybranePliki.length === 1 ? "plik" : "plików"}` : "";
  });
  // zarządzanie istniejącymi stronami (kolejność / usuwanie pojedynczej) — tryb edycji
  const pracujPliki = edycja ? [...plikiZDok(d)] : [];
  const usunieteSciezki = [];
  function renderStrony() {
    const box = ov.querySelector("#sj-strony");
    if (!box) return;
    box.innerHTML = "";
    if (!pracujPliki.length) { box.appendChild(el(`<div style="font-size:12px;color:var(--ink-soft);">Brak stron — dodaj poniżej.</div>`)); return; }
    pracujPliki.forEach((p, i) => {
      const r = el(`<div style="display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:8px;padding:5px 7px;margin-bottom:5px;">
        <span style="flex:1;min-width:0;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${i + 1}. ${escP(p.nazwa || "plik")}</span>
        <button class="st-up" style="${BG}padding:3px 7px;font-size:12px;"${i === 0 ? " disabled" : ""}>↑</button>
        <button class="st-dn" style="${BG}padding:3px 7px;font-size:12px;"${i === pracujPliki.length - 1 ? " disabled" : ""}>↓</button>
        <button class="st-otw" style="${BG}padding:3px 7px;font-size:12px;">👁</button>
        <button class="st-del" style="${BG}padding:3px 7px;font-size:12px;color:#c0392b;">×</button>
      </div>`);
      r.querySelector(".st-up").addEventListener("click", () => { if (i > 0) { const t = pracujPliki[i - 1]; pracujPliki[i - 1] = pracujPliki[i]; pracujPliki[i] = t; renderStrony(); } });
      r.querySelector(".st-dn").addEventListener("click", () => { if (i < pracujPliki.length - 1) { const t = pracujPliki[i + 1]; pracujPliki[i + 1] = pracujPliki[i]; pracujPliki[i] = t; renderStrony(); } });
      r.querySelector(".st-otw").addEventListener("click", () => otworzPlikiSejf([p]));
      r.querySelector(".st-del").addEventListener("click", () => { if (p.sciezka) usunieteSciezki.push(p.sciezka); pracujPliki.splice(i, 1); renderStrony(); });
      box.appendChild(r);
    });
  }
  if (edycja) renderStrony();
  // "Kto widzi" — opcje plemion (rodzina/firma); domyślnie prywatny
  (async () => {
    const { data: pls } = await supabase.rpc("moje_plemiona_full");
    const sel = ov.querySelector("#sj-kto");
    (pls || []).filter((p) => p.typ !== "rozmowa").forEach((p) => { const o = document.createElement("option"); o.value = p.id; o.textContent = "👥 " + p.nazwa; sel.appendChild(o); });
    if (edycja && d.plemie_id) sel.value = d.plemie_id;
  })();
  ov.querySelector("#sj-zapisz").addEventListener("click", async () => {
    const tytul = ov.querySelector("#sj-tytul").value.trim();
    if (!tytul) { ov.querySelector("#sj-tytul").focus(); return; }
    const kategoria = ov.querySelector("#sj-kat").value;
    const rodzaj = ov.querySelector("#sj-typ").value.trim() || null;
    const dataDok = ov.querySelector("#sj-data").value || null;
    const waznosc = ov.querySelector("#sj-waznosc").value || null;
    const opis = ov.querySelector("#sj-opis").value.trim() || null;
    const plemieId = ov.querySelector("#sj-kto").value || null;
    const btn = ov.querySelector("#sj-zapisz"); btn.disabled = true; btn.textContent = "Zapisuję…";
    try {
      let docId = d && d.id;
      // wgraj WSZYSTKIE skumulowane pliki (strony dokumentu)
      const nowePliki = [];
      for (const plik of wybranePliki) {
        const ext = (plik.name.split(".").pop() || "bin").toLowerCase();
        const sciezka = `traveler/${TRAVELER.id}/${crypto.randomUUID()}.${ext}`;
        const { error: upErr } = await supabase.storage.from("dokumenty").upload(sciezka, plik, { contentType: plik.type || undefined, upsert: false });
        if (upErr) throw upErr;
        nowePliki.push({ sciezka, mime: plik.type || null, nazwa: plik.name });
      }
      if (edycja) {
        const pliki = [...pracujPliki, ...nowePliki];   // kolejność po reorderze + nowe na końcu, minus usunięte
        const patch = { tytul, kategoria, rodzaj, data_dokumentu: dataDok, data_waznosci: waznosc, opis, pliki, plemie_id: plemieId };
        patch.plik_url = pliki[0] ? pliki[0].sciezka : null;
        patch.mime = pliki[0] ? (pliki[0].mime || null) : null;
        if (pliki.length && !d.zrodlo) { patch.zrodlo = "plik"; patch.ocr_status = "oczekuje"; }
        const { error } = await supabase.from("dokumenty").update(patch).eq("id", d.id);
        if (error) throw error;
        // zasada integralności: skasowane strony znikają też ze storage
        if (usunieteSciezki.length) { try { await supabase.storage.from("dokumenty").remove(usunieteSciezki); } catch (e) {} }
      } else {
        const first = nowePliki[0] || null;
        const { data: ins, error } = await supabase.from("dokumenty").insert({
          traveler_id: TRAVELER.id, org_id: null, plemie_id: plemieId, typ: "inne", kontekst: "sejf",
          plik_url: first ? first.sciezka : null, mime: first ? first.mime : null, pliki: nowePliki,
          zrodlo: nowePliki.length ? "plik" : "reczne", ocr_status: nowePliki.length ? "oczekuje" : "pominiete",
          tytul, kategoria, rodzaj, data_dokumentu: dataDok, data_waznosci: waznosc, opis,
        }).select("id").single();
        if (error) throw error;
        docId = ins.id;
      }
      // ZASADA INTEGRALNOŚCI — synchronizacja wydarzenia-przypomnienia z dokumentem (twórz/przesuń/kasuj)
      const istnEv = (edycja && d.event_id) ? d.event_id : null;
      if (waznosc) {
        const evPayload = {
          traveler_id: TRAVELER.id, typ: "wydarzenie", caly_dzien: true,
          tytul: `Odnowić: ${tytul}`, status: "planowane",
          data_czas: isoZeStrefy(waznosc, "00:00", TZ), koniec: isoZeStrefy(nastepnyDzienISO(waznosc), "00:00", TZ),
          strefa: TZ, kategoria: "inne", uprzedz_dni: 14,
        };
        if (istnEv) {
          await supabase.from("events").update(evPayload).eq("id", istnEv);
        } else {
          const { data: evIns } = await supabase.from("events").insert(evPayload).select("id").single();
          if (evIns) await supabase.from("dokumenty").update({ event_id: evIns.id }).eq("id", docId);
        }
      } else if (istnEv) {
        // ważność usunięta → kasuj powiązane wydarzenie (i link)
        await supabase.from("events").delete().eq("id", istnEv);
        await supabase.from("dokumenty").update({ event_id: null }).eq("id", docId);
      }
      zamknij();
      trzosToast(waznosc ? "Zapisano + termin w Horyzoncie ✓" : "Zapisano do Sejfu ✓");
      renderSejf();
    } catch (e) {
      btn.disabled = false; btn.textContent = "Zapisz";
      trzosToast("Błąd: " + (e.message || e));
    }
  });
}

async function usunSejf(d) {
  if (!confirm(`Usunąć „${d.tytul || "dokument"}" z Sejfu?`)) return;
  // zasada integralności: kasujemy też powiązane wydarzenie-przypomnienie i WSZYSTKIE pliki
  if (d.event_id) { try { await supabase.from("events").delete().eq("id", d.event_id); } catch (e) {} }
  const sciezki = plikiZDok(d).map((p) => p.sciezka).filter(Boolean);
  if (sciezki.length) { try { await supabase.storage.from("dokumenty").remove(sciezki); } catch (e) {} }
  const { error } = await supabase.from("dokumenty").delete().eq("id", d.id);
  if (error) { trzosToast("Błąd: " + error.message); return; }
  trzosToast("Usunięto (z terminem).");
  renderSejf();
}

$("sejf-dodaj").addEventListener("click", () => kartaSejf(null));

function stdEmail(s) { const t = (s || "").trim().toLowerCase(); return t || null; }
function stdNazwa(s) {
  const t = (s || "").trim().replace(/\s+/g, " ");
  if (!t) return null;
  return t.split(" ").map((w) => {
    if (!w) return w;
    const mixed = /[a-ząćęłńóśżź]/.test(w) && /[A-ZĄĆĘŁŃÓŚŻŹ]/.test(w); // celowy zapis (McDonald, O'Brien) — zachowaj
    return mixed ? w : (w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
  }).join(" ");
}
function stdTel(numer, kod) {
  let t = (numer || "").trim();
  if (!t) return null;
  if (t.startsWith("+")) return t.replace(/\s+/g, " ");

  if (!t) return null;
  return (kod || "+48") + " " + t;
}

}

  </div></div>`);
  document.body.appendChild(ov);
  const zamknij = () => ov.remove();
  ov.addEventListener("click", (e) => { if (e.target === ov) zamknij(); });
  ov.querySelector(".m-modal__x").addEventListener("click", zamknij);
  (async () => {
    const { data: pls } = await supabase.rpc("moje_plemiona_full");
    const sel = ov.querySelector("#kn-kto");
    (pls || []).filter((p) => p.typ !== "rozmowa").forEach((p) => { const o = document.createElement("option"); o.value = p.id; o.textContent = "👥 " + p.nazwa; sel.appendChild(o); });
    if (edycja && k.plemie_id) sel.value = k.plemie_id;
    if (cudzy) { const wrap = sel.closest("div"); if (wrap) wrap.style.display = "none"; }
  })();
  ov.querySelector("#kn-zapisz").addEventListener("click", async () => {
    const imie = stdNazwa(ov.querySelector("#kn-imie").value);
    if (!imie) { ov.querySelector("#kn-imie").focus(); return; }
    const ktoPlemie = ov.querySelector("#kn-kto").value || null;
    const payload = {
      imie,
      telefon: stdTel(ov.querySelector("#kn-tel").value, ov.querySelector("#kn-kraj").value),
      email: stdEmail(ov.querySelector("#kn-email").value),
      typ: ov.querySelector("#kn-typ").value || "inny",
      notatka: ov.querySelector("#kn-notatka").value.trim() || null,
      plemie_id: null, // udostępnianie idzie teraz przez OFERTĘ, nie przez auto-widoczność
    };
    let error, kontaktId = edycja ? k.id : null;
    if (edycja && cudzy) {
      const { data: rd, error: re } = await supabase.rpc("edytuj_kontakt", { p_id: k.id, p_imie: payload.imie, p_telefon: payload.telefon, p_email: payload.email, p_typ: payload.typ, p_notatka: payload.notatka });
      error = re || ((rd && rd.ok === false) ? { message: rd.error || "Brak uprawnień." } : null);
    } else if (edycja) {
      ({ error } = await supabase.from("kontakty").update(payload).eq("id", k.id));
    } else {

    }
    zamknij(); trzosToast(komunikat); renderKontakty(); if (typeof onSave === "function") onSave();
  });
}
async function usunKontakt(k) {
  if (!confirm(`Usunąć kontakt „${k.imie || ""}"?`)) return;
  const { error } = await supabase.from("kontakty").delete().eq("id", k.id);
  if (error) { trzosToast("Błąd: " + error.message); return; }
  trzosToast("Usunięto."); renderKontakty();
}
async function zaprosKontakt(k) {
  const email = ((k && k.email) || "").trim();
  const { data: pls } = await supabase.rpc("moje_plemiona_full");
  const moje = pls || [];
  if (!moje.length) { alert("Najpierw załóż grupę / wyjazd (kafel Plemię), do której chcesz zaprosić."); return; }
  const lista = moje.map((p) => `<button class="m-btn zk-do" data-id="${p.id}" style="width:100%;text-align:left;margin-bottom:6px;">👥 ${escP(p.nazwa)}</button>`).join("");
  const sposob = email ? `mailem na ${escP(email)}` : (k.telefon ? `linkiem (wyślesz SMS-em / WhatsAppem)` : `linkiem`);
  const ov = el(`<div class="m-overlay"><div class="m-modal">
    <div class="m-modal__head"><span class="m-modal__tytul">Zaproś: ${escP(k.imie || email || k.telefon || "kontakt")}</span><button class="m-modal__x" aria-label="Zamknij">&#10005;</button></div>
    <div class="m-form"><label>Do której grupy?</label>${lista}<div style="font-size:11.5px;color:var(--ink-soft);margin-top:2px;">Zaproszenie ${sposob}.</div></div>
  </div></div>`);
  document.body.appendChild(ov);
  const zamknij = () => ov.remove();
  ov.addEventListener("click", (e) => { if (e.target === ov) zamknij(); });
  ov.querySelector(".m-modal__x").addEventListener("click", zamknij);
  ov.querySelectorAll(".zk-do").forEach((b) => b.addEventListener("click", async () => {
    b.disabled = true;
    let data, error;
    if (email) ({ data, error } = await supabase.rpc("zapros_do_plemienia", { p_plemie: b.dataset.id, p_email: email }));
    else ({ data, error } = await supabase.rpc("zapros_link", { p_plemie: b.dataset.id, p_dla_kogo: (k.imie || k.telefon || null), p_kontakt: (k.id || null) }));
    if (error) { trzosToast("Błąd: " + error.message); b.disabled = false; return; }
    if (!data || !data.ok) { trzosToast((data && data.error) || "Nie wysłano."); b.disabled = false; return; }
    zamknij();
    if (email && data.ma_juz_konto) {
      trzosToast("Zaproszenie wysłane ✓");
    } else {
      const link = location.origin + "/?zaproszenie=" + data.zaproszenie_id;
      const grupa = (moje.find((x) => x.id === b.dataset.id) || {}).nazwa || "grupy";
      pokazLinkZaproszenia(k, link, grupa);
    }
  }));
}
/* Link zaproszenia do ręcznego wysłania — przyciski WhatsApp / SMS / E-mail / Kopiuj (zamiast prompt, który na telefonie bywał niewidoczny). */
function pokazLinkZaproszenia(k, link, grupa) {
  const msg = `Zapraszam Cię do grupy „${grupa}" w MANA: ${link}`;
  const tel = (k.telefon || "").replace(/[^\d]/g, "");
  const B = `display:block;width:100%;text-align:center;text-decoration:none;border:none;border-radius:12px;padding:12px;font-size:15px;cursor:pointer;margin-bottom:8px;box-sizing:border-box;`;
  let akcje = "";
  if (tel) akcje += `<a href="https://wa.me/${tel}?text=${encodeURIComponent(msg)}" target="_blank" rel="noopener" style="${B}background:#1a9e5f;color:#fff;">WhatsApp</a>`;
  if (k.telefon) akcje += `<a href="sms:${escP(k.telefon)}?body=${encodeURIComponent(msg)}" style="${B}background:#1a7158;color:#fff;">SMS</a>`;
  if (k.email) akcje += `<a href="mailto:${encodeURIComponent(k.email)}?subject=${encodeURIComponent("Zaproszenie do MANA")}&body=${encodeURIComponent(msg)}" style="${B}background:var(--turkus,#1f9e8f);color:#fff;">E-mail</a>`;
  const sheet = el(`<div class="m-overlay" style="align-items:flex-end;">
    <div style="background:var(--surface);width:100%;max-width:520px;border-radius:16px 16px 0 0;padding:14px 16px 20px;box-shadow:0 -8px 30px rgba(0,0,0,.2);">
      <div style="font-size:13px;font-weight:600;margin-bottom:2px;">Wyślij zaproszenie: ${escP(k.imie || "kontakt")}</div>
      <div style="font-size:11.5px;color:var(--ink-soft);margin-bottom:10px;">Link jest jednorazowy, tylko dla tej osoby. Po rejestracji dołączy do „${escP(grupa)}".</div>
      ${akcje}
      <button class="zl-kopiuj" style="${B}background:var(--surface);border:1px solid var(--line);color:var(--ink);">Kopiuj link</button>
      <button class="zl-x" style="${B}background:none;color:var(--ink-soft);margin-bottom:0;">Zamknij</button>
    </div></div>`);
  document.body.appendChild(sheet);
  const zam = () => sheet.remove();
  sheet.addEventListener("click", (e) => { if (e.target === sheet) zam(); });
  sheet.querySelector(".zl-x").addEventListener("click", zam);
  sheet.querySelector(".zl-kopiuj").addEventListener("click", async () => {
    try { await navigator.clipboard.writeText(link); trzosToast("Link skopiowany ✓"); }
    catch (e) { prompt("Skopiuj link:", link); }
  });
}
async function dodajZPlemienia() {
  const [{ data: pls }, { data: istn = [] }] = await Promise.all([
    supabase.rpc("moje_plemiona_full"),
    supabase.from("kontakty").select("target_traveler_id").eq("owner_traveler_id", TRAVELER.id).not("target_traveler_id", "is", null),
  ]);
  const maja = new Set((istn || []).map((x) => x.target_traveler_id));
  const kandydaci = [];
  (pls || []).forEach((p) => { (p.czlonkowie || []).forEach((c) => { if (c.traveler_id !== TRAVELER.id && !maja.has(c.traveler_id) && !kandydaci.some((x) => x.traveler_id === c.traveler_id)) kandydaci.push({ traveler_id: c.traveler_id, nick: c.nick, plemie: p.nazwa }); }); });
  if (!kandydaci.length) { alert("Wszyscy członkowie Twoich plemion są już w kontaktach."); return; }
  const opcje = kandydaci.map((c, i) => `<label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:14px;"><input type="checkbox" data-i="${i}" checked style="width:16px;height:16px;"> ${escP(c.nick || "uczestnik")} <span style="color:var(--ink-soft);font-size:12px;">· ${escP(c.plemie)}</span></label>`).join("");
  const ov = el(`<div class="m-overlay"><div class="m-modal"><div class="m-modal__head"><span class="m-modal__tytul">Dodaj z plemienia</span><button class="m-modal__x" aria-label="Zamknij">&#10005;</button></div><div class="m-form">${opcje}<div style="font-size:11.5px;color:var(--ink-soft);margin-top:6px;">Dodani jako kontakty powiązane z kontem (z ID).</div></div><div class="m-modal__akcje"><button class="m-btn m-btn--zapisz" id="kp-ok">Dodaj zaznaczonych</button></div></div></div>`);
  document.body.appendChild(ov);
  const zamknij = () => ov.remove();
  ov.addEventListener("click", (e) => { if (e.target === ov) zamknij(); });
  ov.querySelector(".m-modal__x").addEventListener("click", zamknij);
  ov.querySelector("#kp-ok").addEventListener("click", async () => {
    const wybr = [...ov.querySelectorAll('input[type="checkbox"]:checked')].map((i) => kandydaci[Number(i.dataset.i)]);
    if (!wybr.length) { alert("Zaznacz kogoś."); return; }
    const rows = wybr.map((c) => ({ owner_traveler_id: TRAVELER.id, imie: stdNazwa(c.nick || "uczestnik"), target_traveler_id: c.traveler_id, polaczenie_status: "aktywne", aktywny: true }));
    const { error } = await supabase.from("kontakty").insert(rows);
    if (error) { trzosToast("Błąd: " + error.message); return; }
    zamknij(); trzosToast(`Dodano ${rows.length} ✓`); renderKontakty();
  });
}
$("kon-dodaj").addEventListener("click", () => formKontakt(null));
$("kon-z-plemienia").addEventListener("click", dodajZPlemienia);

/* klikalne nagłówki sekcji na ekranie startowym — wchodzą w Horyzont */
function wpinajKlik(elem, fn) {
  elem.addEventListener("click", fn);
  elem.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); fn(); }
  });
}
wpinajKlik($("m-glowa-wyd"), () => otworzHoryzont());
wpinajKlik($("m-glowa-zad"), () => otworzHoryzont({ skok: "zadania" }));

/* taby Kalendarz / Zadania na desktopie */
$("m-hyz-tabs").addEventListener("click", (ev) => {
  const btn = ev.target.closest(".m-tab");
  if (!btn) return;
  const t = btn.dataset.tab;
  $("m-widok-horyzont").dataset.tab = t;
  $("m-hyz-tabs").querySelectorAll(".m-tab").forEach((b) =>
    b.classList.toggle("m-tab--on", b.dataset.tab === t));

});

/* ===== PLEMIĘ (Horyzont) ===== */
const PLEMIE_KOLORY = ["#1f9e8f", "#e0a020", "#5b8def", "#c4519a", "#e0654a", "#7a9e3a"];
const POLITYKA_OPIS = { wlasciciel: "każdy edytuje tylko swoje wpisy", rowni: "każdy członek edytuje wspólne wpisy", zalozyciele: "założyciele zarządzają, członkowie tylko swoje" };
const escP = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const BT = "background:var(--turkus,#1f9e8f);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;";
const BG = "background:#efece3;color:var(--ink);border:none;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;";
let plemieKolorWybrany = PLEMIE_KOLORY[0];

async function renderPlemie() {
  const box = $("hyz-plemie"); if (!box) return;
  box.innerHTML = `<div style="color:var(--ink-soft);font-size:14px;padding:12px 16px;">Wczytuję plemiona…</div>`;
  const [rp, rz] = await Promise.all([supabase.rpc("moje_plemiona_full"), supabase.rpc("moje_zaproszenia")]);
  const plemiona = (rp.data || []).filter((p) => p.typ !== "rozmowa"), zapro = rz.data || [];
  box.innerHTML = "";
  const wrap = el(`<div style="padding:4px 16px 24px;"></div>`);

  zapro.forEach((z) => {
    const c = el(`<div style="display:flex;align-items:center;gap:10px;background:#eef7f5;border:1px solid #cfe7e2;border-radius:12px;padding:10px 12px;margin-bottom:8px;flex-wrap:wrap;">
      <span style="width:10px;height:10px;border-radius:50%;background:${z.kolor || "#1f9e8f"};flex:none;"></span>
      <div style="flex:1;font-size:14px;min-width:160px;">${z.zapraszajacy ? escP(z.zapraszajacy) + " zaprasza Cię do plemienia " : "Zaproszenie do plemienia "}<b>${escP(z.nazwa)}</b></div>
      <button class="pl-prz" style="${BT}">Przyjmij</button><button class="pl-odrz" style="${BG}">Odrzuć</button></div>`);
    c.querySelector(".pl-prz").addEventListener("click", () => odpowiedzZapro(z.id, true));
    c.querySelector(".pl-odrz").addEventListener("click", () => odpowiedzZapro(z.id, false));
    wrap.appendChild(c);
  });

  const noweBtn = el(`<button style="${BT}margin:4px 0 12px;">+ Nowe plemię</button>`);
  noweBtn.addEventListener("click", () => formNowePlemie(wrap, noweBtn));
  wrap.appendChild(noweBtn);

  let wszystkoOtwarte = false;
  try { wszystkoOtwarte = localStorage.getItem("mana_plemie_rozwin") === "1"; } catch (e) {}
  if (plemiona.length) {
    const rozwinBtn = el(`<button style="${BG}margin:0 0 10px;font-size:12.5px;padding:6px 12px;">${wszystkoOtwarte ? "Zwiń wszystko" : "Rozwiń wszystko"}</button>`);
    rozwinBtn.addEventListener("click", () => {
      wszystkoOtwarte = !wszystkoOtwarte;
      try { localStorage.setItem("mana_plemie_rozwin", wszystkoOtwarte ? "1" : "0"); } catch (e) {}
      wrap.querySelectorAll(".pl-body").forEach((b) => { b.style.display = wszystkoOtwarte ? "block" : "none"; });
      wrap.querySelectorAll(".pl-chev").forEach((c) => { c.textContent = wszystkoOtwarte ? "▾" : "▸"; });
      rozwinBtn.textContent = wszystkoOtwarte ? "Zwiń wszystko" : "Rozwiń wszystko";
    });
    wrap.appendChild(rozwinBtn);
  }

  if (!plemiona.length) wrap.appendChild(el(`<div style="color:var(--ink-soft);font-size:14px;">Nie masz jeszcze plemion. Załóż pierwsze — np. „Rodzina".</div>`));
  plemiona.forEach((p) => wrap.appendChild(kartaPlemienia(p)));
  if (wszystkoOtwarte) {
    wrap.querySelectorAll(".pl-body").forEach((b) => { b.style.display = "block"; });
    wrap.querySelectorAll(".pl-chev").forEach((c) => { c.textContent = "▾"; });
  }
  box.appendChild(wrap);
  odswiezNieprzeczytaneRozmowy();
}
async function odswiezNieprzeczytaneRozmowy() {
  try {
    const { data = [] } = await supabase.rpc("nieprzeczytane_rozmowy");
    (data || []).forEach((r) => {
      const b = document.querySelector(`.pl-rozm-btn[data-plemie="${r.plemie_id}"]`);
      if (b && !b.querySelector(".rz-kropka") && r.liczba > 0) {
        b.appendChild(el(`<span class="rz-kropka" style="display:inline-block;min-width:16px;height:16px;line-height:16px;text-align:center;background:#c0392b;color:#fff;border-radius:9px;font-size:10.5px;margin-left:5px;padding:0 4px;">${r.liczba}</span>`));
      }
      const gk = document.querySelector(`.pl-glowa[data-plemie="${r.plemie_id}"] .pl-glowa-kropka`);
      if (gk && r.liczba > 0) { gk.textContent = r.liczba; gk.style.display = "inline-block"; }
    });
  } catch (e) {}
}

function kartaPlemienia(p) {
  const mojeId = TRAVELER && TRAVELER.id;
  const owner = p.owner_traveler_id === mojeId;
  const jaZalozyciel = p.moja_rola === "zalozyciel";
  const czl = p.czlonkowie || [];
  const card = el(`<div style="background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;">
    <div class="pl-glowa" data-plemie="${p.id}" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
      <span style="width:12px;height:12px;border-radius:50%;background:${p.kolor || "#1f9e8f"};flex:none;"></span>
      <b style="font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escP(p.nazwa)}</b>
      <span class="pl-glowa-kropka" style="display:none;min-width:16px;height:16px;line-height:16px;text-align:center;background:#c0392b;color:#fff;border-radius:9px;font-size:10.5px;padding:0 4px;flex:none;"></span>
      <span style="font-size:11px;color:var(--ink-soft);white-space:nowrap;flex:none;">${czl.length} os.</span>
      <button class="pl-glowa-rozm" title="Rozmowa plemienia" style="width:32px;height:32px;border:none;border-radius:50%;background:#1a7158;color:#fff;font-size:15px;line-height:1;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;">💬</button>
      <span class="pl-chev" style="color:var(--ink-soft);font-size:15px;line-height:1;flex:none;">▸</span>
    </div>
    <div class="pl-body" style="display:none;">
      <div style="font-size:11px;color:var(--ink-soft);margin-top:8px;">${escP(POLITYKA_OPIS[p.polityka_edycji] || p.polityka_edycji)} · Członkowie (${czl.length}):</div>
      <div class="pl-czl" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;"></div>
      <div class="pl-akcje" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;"></div>
    </div>
  </div>`);
  { const _g = card.querySelector(".pl-glowa"), _b = card.querySelector(".pl-body"), _c = card.querySelector(".pl-chev");
    _g.addEventListener("click", () => { const open = _b.style.display !== "none"; _b.style.display = open ? "none" : "block"; _c.textContent = open ? "▸" : "▾"; }); }
  { const _r = card.querySelector(".pl-glowa-rozm");
    if (_r) _r.addEventListener("click", (e) => { e.stopPropagation(); otworzRozmowe(p); }); }
  const czlBox = card.querySelector(".pl-czl");
  czl.forEach((c) => {
    const dziecko = !!c.zarzadzany;
    const mojWard = c.opiekun === mojeId; // moje dziecko — z loginem lub bez
    const etkZarz = (mojWard || dziecko) ? (c.birth_year ? " · dziecko" : " · bez loginu") : "";
    const chip = el(`<span style="font-size:12px;background:#efece3;border-radius:20px;padding:3px 9px;display:inline-flex;align-items:center;gap:4px;">${escP(c.nick || "uczestnik")}${c.rola === "zalozyciel" ? " · zał." : ""}${etkZarz}</span>`);
    if (mojWard) {
      const key = el(`<button title="Nadaj login / udostępnij link" style="border:none;background:none;cursor:pointer;font-size:13px;line-height:1;padding:0;">🔑</button>`);
      key.addEventListener("click", () => panelLoginDziecka(c, card));
      chip.appendChild(key);
      if (dziecko) {
        const x = el(`<button title="Usuń profil dziecka" style="border:none;background:none;color:#c0392b;cursor:pointer;font-size:14px;line-height:1;padding:0;">×</button>`);
        x.addEventListener("click", () => usunDziecko(c.traveler_id, c.nick));
        chip.appendChild(x);
      }
    }
    if (owner && c.traveler_id !== p.owner_traveler_id && !mojWard) {
      const zal = c.rola === "zalozyciel";
      const rb = el(`<button title="${zal ? "Odbierz prawa zarządzania" : "Nadaj prawa zarządzania (współzałożyciel)"}" style="border:none;background:${zal ? "#e7f3f0" : "none"};border-radius:12px;cursor:pointer;font-size:10.5px;line-height:1;padding:2px 7px;color:${zal ? "#1a7158" : "var(--ink-soft)"};">${zal ? "⭐ zarządza" : "☆ nadaj prawa"}</button>`);
      rb.addEventListener("click", () => zmienRole(p.id, c.traveler_id, zal ? "czlonek" : "zalozyciel", c.nick));

  const akcje = card.querySelector(".pl-akcje");

  // Rząd 2 — ludzie (tylko założyciel)
  if (jaZalozyciel) {
    const r2 = rzad();
    const inv = el(`<button class="pl-zapros-btn" style="${BT}">➕ Zaproś</button>`);
    inv.addEventListener("click", () => zaprosZKontaktow(p.id, p.nazwa)); r2.appendChild(inv);
    const dz = el(`<button style="${BG}">+ Dodaj dziecko</button>`);
    dz.addEventListener("click", () => formDodajDziecko(p, card)); r2.appendChild(dz);
  }
  // Rząd 3 — rozmowa + zarządzanie
  const r3 = rzad();
  const rozmBtn = el(`<button style="${BT}" class="pl-rozm-btn">💬 Rozmowa</button>`);
  rozmBtn.dataset.plemie = p.id;
  rozmBtn.addEventListener("click", () => otworzRozmowe(p)); r3.appendChild(rozmBtn);
  if (owner) {
    const edit = el(`<button style="${BG}">Edytuj</button>`);
    edit.addEventListener("click", () => edytujPlemie(p, card)); r3.appendChild(edit);
    const del = el(`<button style="${BG}color:#c0392b;">Rozwiąż</button>`);
    del.addEventListener("click", () => rozwiazPlemie(p.id, p.nazwa)); r3.appendChild(del);
  } else {
    const leave = el(`<button style="${BG}">Opuść</button>`);
    leave.addEventListener("click", () => opuscPlemie(p.id, p.nazwa)); r3.appendChild(leave);
  }
  return card;
}

/* Zadanie plemienne — DWA TRYBY:
   ZLECENIE: propozycja dla konkretnej osoby (status=proponowane) → przyjmuje/odrzuca; dziecko bez loginu = auto-przyjęte.
   WSPÓLNE: jedna pozycja dla całego plemienia (wspolne=true, status=planowane) — kto odhaczy, widzą wszyscy (kto/kiedy). */
function formZadajZadanie(p, card) {
  const ist = card.querySelector(".pl-zadanie-form"); if (ist) { ist.remove(); return; }
  const czl = (p.czlonkowie || []).filter((c) => c.traveler_id !== (TRAVELER && TRAVELER.id));
  const maInnych = czl.length > 0;
  const opcje = czl.map((c) => `<option value="${c.traveler_id}">${escP(c.nick || "uczestnik")}</option>`).join("");
  const f = el(`<div class="pl-zadanie-form" style="border-top:1px solid var(--line);margin-top:10px;padding-top:10px;">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
      <button class="zz-tryb zz-tryb--akt" data-tryb="wspolne" style="${BG}flex:1;min-width:120px;">👥 Wspólne</button>
      <button class="zz-tryb" data-tryb="zlecenie" style="${BG}flex:1;min-width:120px;">👤 Zlecenie</button>
      <button class="zz-tryb" data-tryb="zakupy" style="${BG}flex:1;min-width:120px;">🛒 Zakupy</button>
    </div>
    <div class="zz-opis" style="font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;"></div>
    <select class="zz-kto" style="display:none;width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:14px;margin-bottom:8px;">${opcje}</select>
    <textarea class="zz-tytul" placeholder="Treść — możesz wkleić CAŁĄ listę, jedno w linii" rows="4" style="width:100%;box-sizing:border-box;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:14px;margin-bottom:8px;font-family:inherit;resize:vertical;"></textarea>
    <input class="zz-termin" type="datetime-local" style="width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:14px;margin-bottom:8px;">
    <div style="display:flex;gap:8px;"><button class="zz-ok" style="${BT}">Dodaj</button><button class="zz-anu" style="${BG}">Anuluj</button></div>
    <div class="zz-out" style="margin-top:6px;font-size:13px;"></div>
  </div>`);
  let tryb = "wspolne";
  const sel = f.querySelector(".zz-kto"), termin = f.querySelector(".zz-termin"), opis = f.querySelector(".zz-opis"), okBtn = f.querySelector(".zz-ok");
  const odswiez = () => {
    f.querySelectorAll(".zz-tryb").forEach((b) => b.style.cssText = BG + "flex:1;min-width:120px;" + (b.dataset.tryb === tryb ? "outline:2px solid var(--accent,#1f9e8f);font-weight:600;" : ""));
    if (tryb === "zlecenie") {
      if (!maInnych) { opis.innerHTML = `<span style="color:#c4513a;">Brak innych członków — zlecenie wymaga adresata.</span>`; }
      else opis.textContent = "Dla konkretnej osoby. Trafi jako propozycja — wejdzie do jej zadań po przyjęciu (dziecko bez loginu = od razu).";
      sel.style.display = maInnych ? "block" : "none";
      termin.style.display = "block"; okBtn.textContent = "Wyślij propozycję";
    } else if (tryb === "zakupy") {
      opis.textContent = "Wspólna lista zakupów — wszyscy w plemieniu widzą; kto kupi, odhacza dla wszystkich.";
      sel.style.display = "none"; termin.style.display = "none"; okBtn.textContent = "Dodaj do listy";
    } else {
      opis.textContent = "Wspólne dla całego plemienia — jedna pozycja u wszystkich; kto zrobi, odhacza dla wszystkich (widać kto i kiedy).";
      sel.style.display = "none"; termin.style.display = "block"; okBtn.textContent = "Dodaj wspólne";
    }
  };
  f.querySelectorAll(".zz-tryb").forEach((b) => b.addEventListener("click", () => { tryb = b.dataset.tryb; odswiez(); }));
  odswiez();
  f.querySelector(".zz-anu").addEventListener("click", () => f.remove());
  okBtn.addEventListener("click", () => {
    const tytul = f.querySelector(".zz-tytul").value.trim();
    if (!tytul) { alert("Wpisz treść."); return; }
    if (tryb === "zlecenie") {
      if (!maInnych) { alert("Brak innych członków, którym można zlecić zadanie."); return; }
      zaproponujZadanie(p, Number(sel.value), tytul, termin.value, f);
    } else {
      dodajWspolne(p, tytul, tryb === "wspolne" ? termin.value : "", tryb === "zakupy" ? "zakupy" : null, f);
    }
  });
  card.appendChild(f);
}
async function zaproponujZadanie(p, kto, tekst, terminStr, f) {
  const tytuly = String(tekst || "").split("\n").map((s) => s.trim()).filter(Boolean);
  if (!tytuly.length) { alert("Wpisz treść zadania."); return; }
  let dataCzas = null, strefa = null;
  if (terminStr) { const [d, g] = terminStr.split("T"); dataCzas = isoZWarszawy(d, g || "09:00"); strefa = TZ; }
  // dziecko bez loginu (zarządzane przeze mnie) nie może przyjąć — opiekun przyjmuje od razu
  const adresat = (p.czlonkowie || []).find((c) => c.traveler_id === kto);
  const auto = adresat && adresat.zarzadzany;
  const st = auto ? "planowane" : "proponowane";
  const rows = tytuly.map((tytul) => ({ traveler_id: kto, typ: "zadanie", tytul, status: st, priorytet: "normalny", plemie_id: p.id, utworzony_przez: TRAVELER.id, data_czas: dataCzas, strefa }));
  const { error } = await supabase.from("events").insert(rows);
  const out = f.querySelector(".zz-out");
  if (error) { out.innerHTML = `<span style="color:#c4513a;">Błąd: ${escP(error.message)}</span>`; return; }
  out.innerHTML = auto
    ? `<span style="color:#1a7158;">Dodano ${rows.length} ${rows.length === 1 ? "zadanie" : "zadań"} dziecku ✓ (bez loginu — od razu na jego liście).</span>`
    : `<span style="color:#1a7158;">Wysłano ${rows.length} ${rows.length === 1 ? "propozycję" : "propozycji"} ✓ — czeka(ją) na przyjęcie.</span>`;
  f.querySelector(".zz-tytul").value = "";
}
/* WSPÓLNE / lista zakupów — jedna pozycja dla całego plemienia, widoczna u wszystkich */
async function dodajWspolne(p, tekst, terminStr, kategoria, f) {
  const tytuly = String(tekst || "").split("\n").map((s) => s.trim()).filter(Boolean);
  if (!tytuly.length) { alert("Wpisz treść."); return; }
  let dataCzas = null, strefa = null;
  if (terminStr) { const [d, g] = terminStr.split("T"); dataCzas = isoZWarszawy(d, g || "09:00"); strefa = TZ; }
  const rows = tytuly.map((tytul) => ({ traveler_id: TRAVELER.id, typ: "zadanie", tytul, status: "planowane", priorytet: "normalny", plemie_id: p.id, utworzony_przez: TRAVELER.id, wspolne: true, kategoria, data_czas: dataCzas, strefa }));
  const { error } = await supabase.from("events").insert(rows);
  const out = f.querySelector(".zz-out");
  if (error) { out.innerHTML = `<span style="color:#c4513a;">Błąd: ${escP(error.message)}</span>`; return; }
  out.innerHTML = `<span style="color:#1a7158;">Dodano ${rows.length} ${kategoria === "zakupy" ? "do wspólnej listy zakupów" : (rows.length === 1 ? "wspólne zadanie" : "wspólnych zadań")} ✓ — widzą wszyscy w plemieniu.</span>`;
  f.querySelector(".zz-tytul").value = "";
}

/* PANEL „Zadania plemienia" — lista otwartych (dla kogo/wspólne/status) + ROZLICZENIE (kto zrobił i kiedy) + przypisywanie.
   Model przypisania wg rynku (Asana/DRI): jedna osoba = przeniesienie; kilka osób = kopie (każdy osobno rozliczany). „Razem" = tryb Wspólne. */
const STATUS_ETYK = { proponowane: "czeka na przyjęcie", planowane: "do zrobienia", przelozone: "przełożone", odwolane: "odwołane", odrzucone: "odrzucone", zrobione: "zrobione" };
async function otworzZadaniaPlemienia(p) {
  const czl = p.czlonkowie || [];
  const overlay = el(`<div class="m-overlay"><div class="m-modal">
    <div class="m-modal__head">
      <span class="m-modal__tytul">Zadania · ${escP(p.nazwa)}</span>
      <button class="m-modal__x" aria-label="Zamknij">&#10005;</button>
    </div>
    <div class="m-form" id="zp-tresc"><div style="color:var(--ink-soft);font-size:14px;padding:8px 0;">Wczytuję…</div></div>
  </div></div>`);
  document.body.appendChild(overlay);
  const zamknij = () => { _zadaniaModalOdswiez = null; overlay.remove(); };
  overlay.addEventListener("click", (e) => { if (e.target === overlay) zamknij(); });
  overlay.querySelector(".m-modal__x").addEventListener("click", zamknij);

  const nickOf = (id) => { const c = czl.find((x) => x.traveler_id === id); return c ? (c.nick || "uczestnik") : "ktoś"; };
  _zadaniaModalOdswiez = () => { odswiez(); };

  async function odswiez() {
    const tresc = overlay.querySelector("#zp-tresc");
    const { data: lista = [], error } = await supabase.rpc("zadania_plemienia", { p_plemie: p.id });
    if (error) { tresc.innerHTML = `<div style="color:#c4513a;">Błąd: ${escP(error.message)}</div>`; return; }
    const otwarte = (lista || []).filter((z) => z.status !== "zrobione");
    const zrobione = (lista || []).filter((z) => z.status === "zrobione");
    tresc.innerHTML = "";

    // OTWARTE
    tresc.appendChild(el(`<div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin:2px 0 6px;">OTWARTE (${otwarte.length})</div>`));
    if (!otwarte.length) tresc.appendChild(el(`<div style="color:var(--ink-soft);font-size:13px;margin-bottom:8px;">Brak otwartych zadań w tym plemieniu.</div>`));
    for (const z of otwarte) {
      const komu = z.wspolne ? "👥 wspólne" : ("dla: " + escP(z.owner_nick || nickOf(z.traveler_id)));
      const term = z.data_czas ? (" · " + escP(fmtData(z.data_czas, { day: "numeric", month: "short" })) + " " + escP(fmtGodz(z.data_czas))) : "";
      const row = el(`<div style="border:1px solid var(--line);border-radius:11px;padding:9px 11px;margin-bottom:7px;">
        <div style="font-size:14.5px;">${esc(z.tytul)}</div>
        <div style="font-size:11.5px;color:var(--ink-soft);margin-top:2px;">${komu} · ${escP(STATUS_ETYK[z.status] || z.status)}${term}</div>
        <div style="margin-top:7px;"><button class="zp-przyp" style="${BG}font-size:12px;padding:5px 10px;">Przypisz / przenieś</button></div>
        <div class="zp-form" style="display:none;margin-top:8px;border-top:1px dashed var(--line);padding-top:8px;"></div>
      </div>`);
      const form = row.querySelector(".zp-form");
      row.querySelector(".zp-przyp").addEventListener("click", () => {
        if (form.style.display === "block") { form.style.display = "none"; return; }
        const opcje = czl.map((c) => `<label style="display:flex;align-items:center;gap:7px;font-size:13.5px;padding:3px 0;"><input type="checkbox" value="${c.traveler_id}" style="width:16px;height:16px;"> ${escP(c.nick || "uczestnik")}${c.zarzadzany ? (c.birth_year ? " · dziecko" : " · bez loginu") : ""}</label>`).join("");
        form.innerHTML = `<div style="font-size:12px;color:var(--ink-soft);margin-bottom:4px;">Komu przypisać?</div>${opcje}
          <label style="display:flex;align-items:center;gap:7px;font-size:12.5px;margin-top:6px;color:var(--ink-soft);"><input type="checkbox" class="zp-kopie" style="width:16px;height:16px;"> każdemu osobno (kopie — każdy ma własne)</label>
          <div style="font-size:11px;color:var(--ink-soft);margin:4px 0 8px;">Jedna osoba = przeniesienie. Kilka osób bez „kopie" też zrobi kopie. „Razem, ktokolwiek zrobi" → użyj trybu Wspólne.</div>
          <div style="display:flex;gap:8px;"><button class="zp-ok" style="${BT}font-size:12.5px;padding:6px 12px;">Przypisz</button><button class="zp-anu" style="${BG}font-size:12.5px;padding:6px 12px;">Anuluj</button></div>
          <div class="zp-out" style="font-size:12.5px;margin-top:6px;"></div>`;
        form.style.display = "block";
        form.querySelector(".zp-anu").addEventListener("click", () => { form.style.display = "none"; });
        form.querySelector(".zp-ok").addEventListener("click", async () => {
          const osoby = [...form.querySelectorAll('input[type="checkbox"]:not(.zp-kopie):checked')].map((i) => Number(i.value));
          if (!osoby.length) { alert("Zaznacz przynajmniej jedną osobę."); return; }
          const kopie = form.querySelector(".zp-kopie").checked;
          const { data, error: e2 } = await supabase.rpc("przypisz_zadanie", { p_event: z.id, p_osoby: osoby, p_kopie: kopie });
          if (e2) { form.querySelector(".zp-out").innerHTML = `<span style="color:#c4513a;">Błąd: ${escP(e2.message)}</span>`; return; }
          await odswiez();
          if (typeof wczytajZadaniaHoryzont === "function") wczytajZadaniaHoryzont();
        });
      });
      tresc.appendChild(row);
    }

    // ROZLICZENIE
    tresc.appendChild(el(`<div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin:14px 0 6px;">ROZLICZENIE — zrobione (${zrobione.length})</div>`));
    if (!zrobione.length) tresc.appendChild(el(`<div style="color:var(--ink-soft);font-size:13px;">Jeszcze nic nie odhaczone.</div>`));
    else {
      // licznik per osoba
      const licznik = {};
      zrobione.forEach((z) => { const n = z.zrobione_przez_nick || z.owner_nick || nickOf(z.zrobione_przez || z.traveler_id); licznik[n] = (licznik[n] || 0) + 1; });
      const podsum = Object.keys(licznik).map((n) => `${escP(n)}: ${licznik[n]}`).join(" · ");
      tresc.appendChild(el(`<div style="font-size:12px;color:#1a7158;margin-bottom:6px;">Kto ile zrobił → ${podsum}</div>`));
      for (const z of zrobione) {
        const kto = z.zrobione_przez_nick || z.owner_nick || nickOf(z.zrobione_przez || z.traveler_id);
        const kiedy = z.zrobione_kiedy ? (escP(fmtData(z.zrobione_kiedy, { day: "numeric", month: "short" })) + " " + escP(fmtGodz(z.zrobione_kiedy))) : "";
        tresc.appendChild(el(`<div style="font-size:13.5px;color:var(--ink-soft);padding:3px 0;border-bottom:1px solid var(--line);">✓ ${esc(z.tytul)} — <b>${escP(kto)}</b>${kiedy ? " · " + kiedy : ""}</div>`));
      }
    }
  }
  odswiez();
}

function edytujPlemie(p, card) {
  const ist = card.querySelector(".pl-form"); if (ist) { ist.remove(); return; }
  let kol = p.kolor || PLEMIE_KOLORY[0];
  const opcje = [["zalozyciele", "Założyciele zarządzają, członkowie tylko swoje (np. Rodzina)"], ["rowni", "Każdy członek edytuje wspólne (np. para, wspólnicy)"], ["wlasciciel", "Każdy tylko swoje wpisy (luźna grupa)"]];
  const selHtml = opcje.map(([v, l]) => `<option value="${v}" ${p.polityka_edycji === v ? "selected" : ""}>${l}</option>`).join("");
  const f = el(`<div class="pl-form" style="border-top:1px solid var(--line);margin-top:10px;padding-top:10px;">
    <input class="pl-n" type="text" maxlength="60" value="${escP(p.nazwa)}" style="width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:14px;margin-bottom:8px;">

  card.appendChild(f);
}

async function utworzPlemie(nazwa, polityka, kolor) {

async function zaprosZKontaktow(plemieId, plemieNazwa) {
  const { data: kon } = await supabase.from("kontakty").select("*").eq("owner_traveler_id", TRAVELER.id).eq("aktywny", true).order("imie");
  const lista = (kon || []).filter((k) => k.owner_org_id == null);
  const wiersze = lista.length ? lista.map((k) => {
    const sub = k.email ? escP(k.email) : (k.telefon ? escP(k.telefon) : "brak e-maila i telefonu");
    return `<label class="zk-wiersz" data-szukaj="${escP(((k.imie || "") + " " + (k.email || "") + " " + (k.telefon || "")).toLowerCase())}" style="display:flex;align-items:center;gap:10px;margin-bottom:6px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#faf8f2;font-size:13px;cursor:pointer;">
      <input type="checkbox" class="zk-check" data-id="${escP(k.id)}" style="width:18px;height:18px;flex:none;">
      <span style="flex:1;min-width:0;">${esc(k.imie || "(bez imienia)")} <span style="color:var(--ink-soft);font-size:11.5px;">· ${sub}</span></span>
    </label>`;
  }).join("") : `<div style="font-size:12.5px;color:var(--ink-soft);padding:6px 0;">Brak kontaktów jeszcze.</div>`;
  const ov = el(`<div class="m-overlay"><div class="m-modal">
    <div class="m-modal__head"><span class="m-modal__tytul">Zaproś do: ${escP(plemieNazwa)}</span><button class="m-modal__x" aria-label="Zamknij">&#10005;</button></div>
    <div class="m-form" id="zk-body" style="max-height:62vh;overflow-y:auto;"><button class="zk-nowy" style="${BT}margin-bottom:10px;">+ Nowy kontakt</button><input class="zk-szukaj" type="search" placeholder="Szukaj po imieniu…" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;margin-bottom:8px;"><label>Zaznacz osoby</label>${wiersze}<button class="zk-wyslij" style="${BT}width:100%;margin-top:10px;">Zaproś zaznaczonych</button></div>
  </div></div>`);
  document.body.appendChild(ov);
  const zamknij = () => ov.remove();
  ov.addEventListener("click", (e) => { if (e.target === ov) zamknij(); });
  ov.querySelector(".m-modal__x").addEventListener("click", zamknij);
  const bnowy = ov.querySelector(".zk-nowy"); if (bnowy) bnowy.addEventListener("click", () => { zamknij(); formKontakt(null, () => zaprosZKontaktow(plemieId, plemieNazwa)); });
  const szuk = ov.querySelector(".zk-szukaj");
  if (szuk) szuk.addEventListener("input", () => { const q = szuk.value.trim().toLowerCase(); ov.querySelectorAll(".zk-wiersz").forEach((el2) => { el2.style.display = (!q || (el2.dataset.szukaj || "").includes(q)) ? "" : "none"; }); });
  const bwyslij = ov.querySelector(".zk-wyslij");
  if (bwyslij) bwyslij.addEventListener("click", async () => {
    const wybrane = [...ov.querySelectorAll(".zk-check:checked")].map((c) => c.dataset.id);
    if (!wybrane.length) { trzosToast("Zaznacz kogoś."); return; }
    bwyslij.disabled = true; bwyslij.textContent = "Wysyłam…";
    let bezp = 0; const linki = []; const bledy = [];
    for (const id of wybrane) {

function ukladDraggable(btn, wrap) {
  let dragging = false, sx = 0, sy = 0, anchorX = 0;
  function ruch(x, y, ev) {

      btn.style.boxShadow = "0 6px 18px rgba(0,0,0,0.22)"; btn.style.borderRadius = "12px";
    }
    if (ev && ev.cancelable) ev.preventDefault();
    btn.style.transform = "translateX(" + (x - anchorX) + "px) scale(1.06)";
    const els = [...wrap.querySelectorAll(".m-room")].filter((z) => z !== btn);
    const t = els.find((z) => { const r = z.getBoundingClientRect(); return x >= r.left && x <= r.right; });
    if (t) {
      const r = t.getBoundingClientRect();
      const ref = x < r.left + r.width / 2 ? t : t.nextSibling;
      if (ref !== btn && ref !== btn.nextSibling) { wrap.insertBefore(btn, ref); anchorX = x; btn.style.transform = "translateX(0px) scale(1.06)"; }
    }

    document.removeEventListener("mousemove", mm); document.removeEventListener("mouseup", uu);

    if (dragging) {
      btn._dragged = true;
      btn.style.opacity = ""; btn.style.transform = ""; btn.style.zIndex = ""; btn.style.boxShadow = ""; btn.style.transition = ""; btn.style.borderRadius = "";
      const order = [...wrap.querySelectorAll(".m-room")].map((z) => z.dataset.key).filter(Boolean);
      zapiszUklad(order);
    }
  }
  const mm = (e) => ruch(e.clientX, e.clientY, e);
  const tm = (e) => { const t = e.touches[0]; if (t) ruch(t.clientX, t.clientY, e); };
  const uu = () => koniec();
  btn.addEventListener("mousedown", (e) => {
    if (e.button !== 0) return;
    dragging = false; sx = e.clientX; sy = e.clientY;
    document.addEventListener("mousemove", mm); document.addEventListener("mouseup", uu);
  });

}

async function wczytajDzien() {
  const { s } = granceDnia(0);
  const koniecJutra = granceDnia(1).e;
  const oknoDo = new Date(s.getTime() + 8 * 86400000);

  // wydarzenia dziś + jutro
  const { data: wydOkno = [] } = await supabase
    .from("events").select("*")
    .eq("traveler_id", TRAVELER.id).eq("typ", "wydarzenie")
    .gte("data_czas", s.toISOString()).lte("data_czas", koniecJutra.toISOString())
    .order("data_czas", { ascending: true });

  const { data: zadaniaWlasne = [] } = await supabase
    .from("events").select("*")
    .eq("traveler_id", TRAVELER.id).eq("typ", "zadanie").eq("wspolne", false)
    .eq("status", "planowane")
    .order("pozycja", { ascending: true, nullsFirst: false });
  // rollup otwartych zadań plemion (nie moich) + plemiona do nazw/kolorów
  const [rollupRes, plemRes] = await Promise.all([
    supabase.rpc("zadania_plemion_rollup"),
    supabase.rpc("moje_plemiona_full"),
  ]);

  const { data: caloDniowe = [] } = await supabase
    .from("events").select("tytul, data_czas")
    .eq("traveler_id", TRAVELER.id).eq("caly_dzien", true)
    .gte("data_czas", s.toISOString()).lt("data_czas", oknoDo.toISOString())
    .order("data_czas", { ascending: true }).limit(1);

  najblizszeRaw = wydOkno || [];
  zadaniaRaw = zadaniaWlasne || [];
  zadRollup = rollupRes.data || [];
  zadPlemiona = plemRes.data || [];
  const teraz = new Date();
  const nadchodzace = najblizszeRaw.filter((w) =>
    (w.caly_dzien || new Date(w.koniec || w.data_czas) >= teraz)
    && !ukryteKat.has(kategoriaZE(w)));
  const dzisISO = czesciWarszawy(teraz).dataISO;
  const dzisNadch = nadchodzace.filter((w) => czesciWarszawy(w.data_czas).dataISO === dzisISO);

  renderBrief(dzisNadch.length, (zadaniaWlasne || []).length);
  renderNajblizsze(nadchodzace, false);
  renderZadaniaEkran(zadaniaWlasne || [], zadRollup, zadPlemiona);
  renderRocznica((caloDniowe || [])[0] || null, s);
  renderNieprzeczytaneStart();
}

/* etykieta dnia: Dziś / Jutro / „środa 27 maja" */
function etykietaDnia(iso) {
  const d = czesciWarszawy(iso).dataISO;
  const dzis = czesciWarszawy(new Date()).dataISO;
  const jutro = czesciWarszawy(new Date(Date.now() + 86400000)).dataISO;
  if (d === dzis) return "Dziś";
  if (d === jutro) return "Jutro";
  return fmtData(iso, { weekday: "long", day: "numeric", month: "long" });
}

/* ====================================================================
   ASYSTENT — call-serce (żywy EA)
   ==================================================================== */
/* render wiadomości asystenta — prosta składnia: pogrubienie **...** i listy „- " */
function formatujAsystenta(tekst) {
  const pogrub = (s) => s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  let html = "", wLiscie = false;
  for (const surowa of String(tekst).split("\n")) {
    const mList = surowa.match(/^\s*[-*•]\s+(.*)$/);
    if (mList) {
      if (!wLiscie) { html += "<ul>"; wLiscie = true; }
      html += `<li>${pogrub(esc(mList[1]))}</li>`;
    } else {
      if (wLiscie) { html += "</ul>"; wLiscie = false; }
      html += surowa.trim() === "" ? "<br>" : `<div>${pogrub(esc(surowa))}</div>`;
    }
  }
  if (wLiscie) html += "</ul>";
  return html;
}
function dodajWiadomosc(klasa, tekst) {
  const stream = $("m-stream");
  const tresc = (klasa === "asystent") ? formatujAsystenta(tekst) : esc(tekst);
  const m = el(`<div class="m-msg m-msg--${klasa}">${tresc}</div>`);
  stream.appendChild(m);
  stream.scrollTop = stream.scrollHeight;
  return m;
}
async function wyslij() {
  const pole = $("m-pole");
  const tekst = pole.value.trim();
  if (!tekst || trwaRozmowa) return;
  trwaRozmowa = true;
  pole.value = ""; pole.style.height = "auto";
  $("m-ea").classList.add("m-ea--rozmowa");
  dodajWiadomosc("ja", tekst);
  const mysl = dodajWiadomosc("mysli", "Asystent myśli…");
  try {
    let { data: { session } } = await supabase.auth.getSession();
    if (!session) { const r = await supabase.auth.refreshSession(); session = r.data ? r.data.session : null; }
    if (!session || !session.access_token) {
      mysl.remove();
      dodajWiadomosc("asystent", "Twoja sesja wygasła — zaloguj się ponownie (odśwież stronę i wejdź przez logowanie), a potem wróć do rozmowy.");
      trwaRozmowa = false;
      return;
    }
    const res = await fetch(`${SUPABASE_URL}/functions/v1/call-serce`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${session.access_token}`,
        "apikey": SUPABASE_KEY, "Content-Type": "application/json",
      },
      body: JSON.stringify({ message: tekst, duch: "duch_asystent_prywatny" }),
    });
    const dane = await res.json().catch(() => ({}));
    mysl.remove();
    if (res.ok && dane.response) {
      dodajWiadomosc("asystent", dane.response);
      powiedz(dane.response);
    } else {
      dodajWiadomosc("asystent", "Asystent chwilowo nie odpowiada (" + (dane.error || `HTTP ${res.status}`) + ").");
    }
  } catch (err) {
    mysl.remove();
    dodajWiadomosc("asystent", "Brak połączenia z asystentem: " + err.message);
  }
  trwaRozmowa = false;
}

/* ZDJĘCIE PARAGONU W ASYSTENCIE — zdjęcie → OCR → podsumowanie → zapis do Trzosu */
