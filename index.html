<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MANA — ekran startowy + Horyzont</title>
<meta name="description" content="MANA — ekran startowy z żywym EA oraz pokój Horyzont (kalendarz + zadania).">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f9e8f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MANA">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}
window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();window._instPrompt=e;});</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  /* ====================================================================
     MANA — mana-app-krok3 — 25.05.2026
     Ekran startowy (żywy EA, brief, kalendarz dziś, zadania, rocznice)
     + pokój Horyzont wg specyfikacji v2: kalendarz (4 widoki, siatka doby,
     przesuwanie palcem, menu, wejście w dzień, dodawanie/edycja wydarzeń)
     + zadania (lista, przeciąganie pointer-events, V, Zrobione, edycja).
     ==================================================================== */
  :root {
    --bg: #f3f0e8; --surface: #ffffff;
    --ink: #2c2a26; --ink-soft: #8c887e;
    --line: #e4dfd1; --turkus: #1a7158; --turkus-bg: #e8efe9;
    --rocznica-bg: #e6eef4; --rocznica-ink: #2e5a7a;
    --font-display: "Fraunces", Georgia, serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--font-body); -webkit-font-smoothing: antialiased;
    display: flex; justify-content: center;
  }
  #m-app, #m-login { width: 100%; max-width: 440px; min-height: 100%; display: flex; flex-direction: column; }

  /* ---- HEADER ---- */
  .m-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 12px; gap: 10px;
  }
  .m-logo {
    width: 56px; height: 56px; border-radius: 50%; flex: none; padding: 0;
    background: var(--turkus, #1f9e8f); border: none; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .m-logo svg { width: 38px; height: 38px; }
  .m-logo:hover { filter: brightness(1.06); }
  .m-header__prawo { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex: none; }
  .m-brand__srodek { flex: 1; min-width: 0; text-align: center; }
  .m-brand__name { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: 0.06em; line-height: 1.05; }
  .m-brand__date { font-size: 13px; color: var(--ink-soft); text-transform: lowercase; margin-top: 2px; }
  .m-logout {
    background: none; border: 1px solid var(--line); cursor: pointer;
    font-size: 12.5px; color: var(--ink-soft); line-height: 1;
    padding: 8px 14px; border-radius: 16px; font-family: var(--font-body);
  }
  .m-logout:hover { border-color: var(--turkus); color: var(--turkus); }
  .m-user { display:inline-flex; align-items:center; gap:6px; margin-left:auto; font-size:13px; color:var(--ink); background:var(--turkus-bg,#eef6f3); border:1px solid var(--line); border-radius:18px; padding:3px 11px 3px 4px; white-space:nowrap; max-width:46vw; overflow:hidden; }
  .m-user__ini { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:50%; background:var(--turkus,#1f9e8f); color:#fff; font-size:9px; font-weight:700; flex:none; }
  .m-user__nick { overflow:hidden; text-overflow:ellipsis; }

  /* ---- KAFLE POKOI ---- */
  .m-rooms { display: flex; gap: 8px; padding: 4px 16px 14px; overflow-x: auto; scrollbar-width: none; }
  .m-rooms::-webkit-scrollbar { display: none; }
  .m-room {
    background: none; border: none; cursor: pointer; flex: 0 0 auto; min-width: 64px; touch-action: none;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 6px 2px; font-family: var(--font-body);
  }
  .m-room__icon {
    width: 52px; height: 52px; border-radius: 50%; background: var(--turkus-bg);
    display: flex; align-items: center; justify-content: center;
  }
  .m-room__icon svg { width: 22px; height: 22px; }
  .m-room__name { font-size: 12px; color: var(--ink); }
  .m-room--soon { opacity: 0.4; cursor: default; }
  .m-room--soon .m-room__icon { background: #eae6da; }

  /* ---- EA — EKRAN ASYSTENTA ---- */
  .m-ea {
    margin: 0 16px 14px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 16px; padding: 16px;
    display: flex; flex-direction: column; transition: box-shadow 0.25s ease;
  }
  .m-ea--rozmowa { box-shadow: 0 6px 22px rgba(26,113,88,0.10); }
  .m-ea__head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .m-ea__spark {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--turkus-bg); color: var(--turkus);
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .m-ea__title { font-size: 15px; font-weight: 600; }
  .m-ea__stream { display: flex; flex-direction: column; gap: 10px; max-height: 46vh; overflow-y: auto; }
  .m-msg { border-radius: 12px; padding: 12px 14px; font-size: 14.5px; line-height: 1.5; }
  .m-msg--asystent { background: #faf8f2; border: 1px solid var(--line); color: var(--ink); }
  .m-msg--ja { background: var(--turkus); color: #fff; align-self: flex-end; max-width: 85%; }
  .m-msg--mysli { color: var(--ink-soft); font-style: italic; }
  .m-msg ul { margin: 5px 0; padding-left: 20px; }
  .m-msg li { margin: 3px 0; }
  .m-msg div + div { margin-top: 4px; }

  .m-wejscie { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .m-fala { display: flex; align-items: flex-end; gap: 2px; height: 18px; flex: 0 0 auto; }
  .m-fala span { width: 3px; background: var(--turkus); border-radius: 2px; opacity: 0.5; height: 6px; }
  .m-fala--zywa span { animation: fala 0.9s ease-in-out infinite; }
  .m-fala--zywa span:nth-child(2){animation-delay:.1s} .m-fala--zywa span:nth-child(3){animation-delay:.2s}
  .m-fala--zywa span:nth-child(4){animation-delay:.3s} .m-fala--zywa span:nth-child(5){animation-delay:.15s}
  @keyframes fala { 0%,100%{height:5px} 50%{height:17px} }
  .m-pole {
    flex: 1; resize: none; min-height: 42px; max-height: 120px;
    border: 1px solid var(--line); border-radius: 21px; padding: 11px 16px;
    font-size: 14px; font-family: var(--font-body); background: #faf8f2; color: var(--ink); line-height: 1.4;
  }
  .m-pole:focus { outline: none; border-color: var(--turkus); }
  .m-mik {
    flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--turkus-bg); color: var(--turkus);
    display: flex; align-items: center; justify-content: center;
  }
  .m-mik--slucha { background: var(--turkus); color: #fff; }
  .m-mik svg { width: 18px; height: 18px; }
  .m-wyslij {
    flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--turkus); color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .m-wyslij:hover { background: #155843; }
  .m-wyslij:disabled { opacity: 0.5; cursor: default; }
  .m-wyslij svg { width: 18px; height: 18px; }
  .m-glos {
    margin-left: auto; background: none; border: 1px solid var(--line); border-radius: 50%;
    cursor: pointer; color: var(--ink-soft); padding: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .m-glos svg { width: 16px; height: 16px; }
  .m-glos:hover { color: var(--turkus); border-color: var(--turkus); }
  .m-glos--on { color: var(--turkus); border-color: var(--turkus); background: var(--turkus-bg); }

  /* ---- SEKCJE EKRANU STARTOWEGO ---- */
  .m-sekcja {
    margin: 0 16px 12px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px;
  }
  .m-sekcja__head {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--ink-soft); margin-bottom: 10px;
  }
  .m-sekcja__head svg { width: 15px; height: 15px; }
  .m-sekcja__rzad { display: flex; align-items: stretch; gap: 8px; margin-bottom: 10px; }
  .m-sekcja__head--klik {
    cursor: pointer; user-select: none; flex: 3; min-width: 0;
    background: #e7f3f0; color: var(--turkus);
    border-radius: 10px; padding: 8px 12px; margin: 0;
  }
  .m-sekcja__head--klik:hover { background: #dcece8; }
  .m-sekcja__chev {
    margin-left: auto; width: 24px; height: 24px; flex: none;
    border-radius: 50%; background: var(--turkus); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 16px; line-height: 1;
  }
  .m-klodka {
    flex: 2; min-width: 0; background: #f3efe6; border: 1px solid var(--line); cursor: pointer;
    border-radius: 10px; padding: 8px 10px; display: inline-flex; align-items: center;
    justify-content: center; gap: 6px; line-height: 1;
  }
  .m-klodka:hover { background: #ece7dc; }
  #m-kal-lista { max-height: 220px; overflow-y: auto; }
  #m-zad-lista { max-height: 156px; overflow-y: auto; }
  .m-poz--klik, .m-zad--klik { cursor: pointer; border-radius: 8px; }
  .m-poz--klik:hover, .m-zad--klik:hover { background: #f3efe6; }
  .m-poz { display: flex; gap: 12px; align-items: baseline; padding: 7px 0; }
  .m-poz + .m-poz { border-top: 1px solid #f0ece0; }
  .m-poz__czas { font-variant-numeric: tabular-nums; font-size: 14px; color: var(--turkus); flex: 0 0 46px; }
  .m-poz__tytul { font-size: 14.5px; }
  .m-pusto { font-size: 14px; color: var(--ink-soft); padding: 4px 0; }
  .m-dzien-naglowek { font-size: 12px; font-weight: 600; color: var(--ink-soft); padding: 9px 0 2px; }
  .m-poz + .m-dzien-naglowek { border-top: 1px solid #f0ece0; margin-top: 4px; }
  .m-wiecej {
    display: block; width: 100%; text-align: left; background: none; border: none;
    cursor: pointer; font-family: var(--font-body); font-size: 13px; color: var(--turkus);
    padding: 10px 0 2px;
  }
  .m-wiecej:hover { text-decoration: underline; }

  .m-zad { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
  .m-zad + .m-zad { border-top: 1px solid #f0ece0; }
  .m-zad__box {
    width: 19px; height: 19px; border-radius: 5px; border: 1.6px solid var(--line);
    cursor: pointer; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; background: none;
  }
  .m-zad__box--zrobione { background: var(--turkus); border-color: var(--turkus); }
  .m-zad__box svg { width: 12px; height: 12px; color: #fff; }
  .m-zad__kropka { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
  .m-zad__tytul { font-size: 14.5px; }
  .m-zad__tytul--zrobione { text-decoration: line-through; color: var(--ink-soft); }

  /* ---- PASEK ROCZNIC ---- */
  .m-rocznica {
    margin: 2px 16px 20px; background: var(--rocznica-bg); color: var(--rocznica-ink);
    border-radius: 12px; padding: 11px 16px; font-size: 13.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .m-rocznica svg { width: 15px; height: 15px; }

  /* ---- POKÓJ HORYZONT ---- */
  .m-hyz-bar { display: flex; align-items: center; gap: 10px; padding: 16px 18px 8px; }
  .m-back { display: none !important; }
  .m-hyz-tytul { cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 4px; }
  .m-hyz-tytul::after { content: "▾"; font-size: 0.62em; color: var(--ink-soft); position: relative; top: 1px; }
  .m-nav-ovl { position: fixed; inset: 0; background: rgba(24,21,16,.34); z-index: 9998; display: flex; justify-content: center; align-items: flex-start; }
  .m-nav-panel { background: var(--surface); width: min(440px, 94vw); margin-top: 7vh; border-radius: 16px; box-shadow: 0 18px 52px rgba(0,0,0,.32); padding: 8px; max-height: 84vh; overflow-y: auto; transform: translateY(-14px); opacity: 0; transition: transform .18s ease, opacity .18s ease; }
  .m-nav-panel.on { transform: translateY(0); opacity: 1; }
  .m-nav-sekcja { font-size: 11px; letter-spacing: .05em; text-transform: uppercase; color: var(--ink-soft); padding: 12px 12px 4px; }
  .m-nav-row { display: flex; align-items: center; gap: 11px; padding: 12px; border-radius: 11px; cursor: pointer; }
  .m-nav-row:hover { background: var(--bg); }
  .m-nav-row--on { background: var(--turkus-bg); }
  .m-nav-ico { width: 26px; flex: 0 0 26px; display: flex; align-items: center; justify-content: center; }
  .m-nav-ico svg { width: 22px; height: 22px; }
  .m-nav-nazwa { font-size: 15px; font-weight: 600; color: var(--ink); }
  .m-nav-chev { margin-left: auto; color: var(--ink-soft); font-size: 12px; }
  .m-nav-locked .m-nav-nazwa { color: var(--ink-soft); }
  .m-nav-detal { padding: 0 12px 12px 49px; font-size: 13px; color: var(--ink-soft); line-height: 1.45; }
  .m-nav-detal-akcja { margin-top: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .m-nav-btn { border: none; border-radius: 8px; padding: 7px 13px; font-size: 13px; cursor: pointer; }
  .m-nav-cena { font-size: 13px; color: var(--ink); font-weight: 600; }
  .m-hyz-tytul { font-family: var(--font-display); font-size: 20px; font-weight: 600; }
  .m-warstwa { margin-bottom: 4px; }
  .m-warstwa__head { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); padding: 12px 18px 4px; }
  .m-warstwa__head svg { width: 15px; height: 15px; }
  .m-warstwa__head span { font-family: var(--font-display); font-size: 16px; color: var(--ink); }

  /* pasek nawigacji kalendarza */
  .m-kalbar { position: relative; display: flex; align-items: center; gap: 4px; margin: 4px 16px 8px; }
  .m-kalmenu { flex: 0 0 auto; background: none; border: 1px solid var(--line); border-radius: 9px; width: 34px; height: 34px; font-size: 14px; color: var(--ink); cursor: pointer; }
  .m-kaletyk { flex: 1; font-family: var(--font-display); font-size: 15px; text-transform: capitalize; padding-left: 4px; }
  .m-kalnav { flex: 0 0 auto; background: none; border: 1px solid var(--line); border-radius: 9px; width: 30px; height: 34px; font-size: 16px; color: var(--ink); cursor: pointer; }
  .m-kaldzis { flex: 0 0 auto; background: none; border: 1px solid var(--line); border-radius: 9px; height: 34px; padding: 0 10px; font-size: 12px; color: var(--ink-soft); cursor: pointer; font-family: var(--font-body); }
  .m-kaltresc { touch-action: pan-y; }
  .m-kalspacer { flex: 1 1 auto; }
  .m-kalcrumb { flex: 0 0 auto; background: none; border: none; font-family: var(--font-display); font-size: 15px; color: var(--turkus); cursor: pointer; padding: 0 3px; }
  .m-kaltyt { flex: 0 0 auto; font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--ink); text-transform: capitalize; padding-left: 6px; }
  .m-kaltyt-btn { flex: 0 0 auto; background: none; border: none; font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--ink); text-transform: capitalize; cursor: pointer; padding: 0 3px; }
  .m-mcc { display: flex; flex-direction: column; }
  .m-mcc__dow { display: grid; grid-template-columns: repeat(7,1fr); padding: 0 2px 4px; }
  .m-mcc__dow > div { text-align: center; font-size: 11px; color: var(--ink-soft); }
  .m-mcc__scroll { position: relative; max-height: 260px; overflow-y: auto; -webkit-overflow-scrolling: touch; touch-action: pan-y; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); }
  .m-mcc__mieslabel { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--turkus); padding: 14px 10px 2px; }
  .m-mcc__mieslabel:first-child { padding-top: 8px; }
  .m-mcc__tydz { display: grid; grid-template-columns: repeat(7,1fr); }
  .m-mcc__d { position: relative; min-height: 44px; display: flex; flex-direction: column; align-items: center; gap: 1px; padding-top: 5px; font-size: 14px; color: var(--ink); cursor: pointer; border-top: 1px solid var(--line); }
  .m-mcc__dnum { width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
  .m-mcc__d--dzis .m-mcc__dnum { background: #d23b3b; color: #fff; border-radius: 50%; }
  .m-mcc__kropki { display: flex; gap: 2px; min-height: 5px; }
  .m-mcc__kropki > span { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-soft); }
  #mcc-lista { max-height: 40vh; overflow-y: auto; margin-top: 6px; }
  .m-mcc__wk { display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--ink-soft); border-top: 1px solid var(--line); cursor: pointer; }
  .m-mcc__wk:hover { color: var(--turkus); background: var(--turkus-bg); }
  .m-kalmenu-panel { position: absolute; top: 40px; left: 0; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.14); padding: 6px; z-index: 40; min-width: 190px; }
  .m-kalmenu-panel button { display: block; width: 100%; text-align: left; background: none; border: none; padding: 9px 12px; font-size: 14px; font-family: var(--font-body); color: var(--ink); cursor: pointer; border-radius: 8px; }
  .m-kalmenu-panel button:hover { background: var(--turkus-bg); }
  .m-kalmenu-panel button.m-kalmenu--on { color: var(--turkus); font-weight: 600; }
  .m-kalmenu-sep { border-top: 1px solid var(--line); margin: 4px 0; }

  /* siatka miesiąca */
  .m-mc { margin: 0 16px 8px; background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 12px 12px 14px; }
  .m-mc__siatka { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .m-mc__dow { text-align: center; font-size: 11px; color: var(--ink-soft); padding-bottom: 4px; }
  .m-mc__dzien { position: relative; text-align: center; font-size: 13px; padding: 9px 0; border-radius: 8px; color: var(--ink); cursor: pointer; }
  .m-mc__dzien:hover { background: var(--turkus-bg); }
  .m-mc__dzien--dzis { background: var(--turkus); color: #fff; font-weight: 600; }
  .m-mc__dzien--dzis:hover { background: var(--turkus); }
  .m-mc__kropka { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--turkus); }
  .m-mc__dzien--dzis .m-mc__kropka { background: #fff; }
  .m-mc__kropki { position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); display: flex; gap: 2px; }
  .m-mc__kropki > span { width: 4px; height: 4px; border-radius: 50%; }
  .m-mlist { margin: 0 16px 8px; }
  .m-mlist .m-poz { padding: 7px 4px; }
  .m-mlist .m-poz__czas { flex: 0 0 96px; }

  /* siatka czasu */
  .m-tg__naglowki { display: grid; align-items: end; }
  .m-tg__hdr { text-align: center; font-size: 11px; color: var(--ink-soft); padding: 4px 2px 6px; cursor: pointer; }
  .m-tg__hdr b { display: block; font-size: 15px; color: var(--ink); font-weight: 600; }
  .m-tg__hdr--dzis b { color: #d23b3b; }
  .m-tg__scroll { max-height: 70vh; overflow-y: auto; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); touch-action: pan-y; }
  .m-tg__plansza { display: grid; grid-template-columns: 38px 1fr; }
  .m-tg__godz { font-size: 10px; color: var(--ink-soft); text-align: right; padding-right: 5px; box-sizing: border-box; }
  .m-tg__kolumny { display: grid; }
  .m-tg__kol { position: relative; border-left: 1px solid #efeadd; }
  .m-tg__linia { position: absolute; left: 0; right: 0; border-top: 1px solid #f4f1e8; }
  .m-tg__event { position: absolute; left: 2px; right: 2px; background: var(--turkus-bg); border-left: 3px solid var(--turkus); border-radius: 5px; padding: 2px 5px; font-size: 10.5px; line-height: 1.2; overflow: hidden; box-sizing: border-box; cursor: pointer; }

  .m-tg__teraz { position: absolute; left: 0; right: 0; border-top: 2px solid #d23b3b; z-index: 3; }

  /* strip całodzienny u góry siatki (wyjazdy, wakacje, konferencje) */

  /* okno / modal */
  .m-overlay { position: fixed; inset: 0; background: rgba(24,22,16,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }

  .m-btn { border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-family: var(--font-body); cursor: pointer; }
  .m-btn--zapisz { flex: 1; background: var(--turkus); color: #fff; }
  .m-btn--usun { background: #fce4e4; color: #8b1a1a; padding: 12px 16px; }

  /* zadania w Horyzoncie */
  .m-quickadd { display: flex; gap: 8px; margin: 0 16px 12px; }
  .m-quickadd input { flex: 1; border: 1px solid var(--line); border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: var(--font-body); background: var(--surface); color: var(--ink); }
  .m-quickadd input:focus { outline: none; border-color: var(--turkus); }

  .m-lista { margin: 0 16px 6px; max-height: 52vh; overflow-y: auto; }
  .m-zad-d { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--line); border-radius: 11px; padding: 11px 12px; margin-bottom: 7px; }
  .m-zad-d--ciagniety { opacity: 0.55; box-shadow: 0 5px 16px rgba(0,0,0,0.14); }
  .m-zad-d--zalegle { border-color: #e7b7b7; }
  .m-uchwyt { flex: 0 0 auto; color: #c7c1b0; font-size: 15px; line-height: 1; cursor: grab; touch-action: none; padding: 2px 3px; }
  .m-zad-d .m-zad__box { width: 21px; height: 21px; }
  .m-zad-d__tresc { flex: 1; cursor: pointer; }
  .m-zad-d__tytul { font-size: 14.5px; }
  .m-zad-d__termin { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }
  .m-zad-d__termin--zalegly { color: #d23b3b; }
  .m-zrob-naglowek { margin: 14px 16px 8px; font-size: 13px; color: var(--ink-soft); background: none; border: none; cursor: pointer; font-family: var(--font-body); }
  .m-zad-z { display: flex; align-items: center; gap: 10px; padding: 9px 12px; margin: 0 16px 6px; background: #efece3; border-radius: 10px; }
  .m-zad-z .m-zad__tytul { flex: 1; text-decoration: line-through; color: var(--ink-soft); font-size: 14px; }
  .m-restore { flex: 0 0 auto; background: none; border: 1px solid var(--line); border-radius: 14px; padding: 5px 11px; cursor: pointer; font-size: 12px; color: var(--ink-soft); font-family: var(--font-body); }
  .m-restore:hover { border-color: var(--turkus); color: var(--turkus); }

  /* ---- EKRAN LOGOWANIA ---- */
  #m-login { justify-content: center; padding: 0 24px; }
  .m-login__box { text-align: center; }
  .m-login__name {
    font-family: var(--font-display); font-size: 30px; font-weight: 600;
    letter-spacing: 0.06em; color: var(--turkus);

  .m-login__pod { font-size: 13px; color: var(--ink-soft); margin: 2px 0 22px; }
  .m-login__pole {
    width: 100%; padding: 12px 14px; margin-bottom: 10px;
    border: 1px solid var(--line); border-radius: 8px;

  }

    width: 100%; padding: 13px; margin-top: 6px;

  .m-loader { margin: auto; color: var(--ink-soft); font-size: 14px; padding: 40px; }

  /* ---- WYBÓR STREFY CZASOWEJ ---- */

    border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px;
    font-size: 14px; font-family: var(--font-body); background: #faf8f2; color: var(--ink);
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .m-strefa-btn__zmien { font-size: 12px; color: var(--turkus); flex: 0 0 auto; }
  .m-strefa-hint { font-size: 12px; color: var(--turkus); margin-top: 5px; line-height: 1.4; }
  .m-strefa-szukaj {
    width: 100%; box-sizing: border-box; border: 1px solid var(--line); border-radius: 9px;
    padding: 10px 12px; font-size: 14px; font-family: var(--font-body);
    background: #faf8f2; color: var(--ink); margin-bottom: 8px;
  }
  .m-strefa-szukaj:focus { outline: none; border-color: var(--turkus); }
  .m-strefa-lista { max-height: 54vh; overflow-y: auto; }
  .m-strefa-poz {
    display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
    padding: 10px 6px; border-bottom: 1px solid #f0ece0; cursor: pointer;
  }
  .m-strefa-poz:hover { background: var(--turkus-bg); }
  .m-strefa-poz--on { background: var(--turkus-bg); }
  .m-strefa-poz__miasto { font-size: 14px; }
  .m-strefa-poz__reg { font-size: 11px; color: var(--ink-soft); flex: 0 0 auto; }
  .m-strefa-pusto { padding: 16px 6px; font-size: 13px; color: var(--ink-soft); }

  /* ---- KATEGORIE ---- */
  .m-kat-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .m-kat-chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 7px 11px; border-radius: 16px; border: 1px solid var(--line);
    background: #faf8f2; font-size: 13px; font-family: var(--font-body);
    color: var(--ink); cursor: pointer;
  }
  .m-kat-chip__dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
  .m-kat-chip--wybr { background: var(--turkus-bg); border-color: var(--turkus); color: var(--turkus); font-weight: 600; }
  .m-kat-kropka { display: inline-block; width: 8px; height: 8px; border-radius: 50%; vertical-align: middle; margin-right: 6px; }

  /* czas obcej strefy — druga linijka */
  .m-tg__event-obca { display: block; font-size: 9px; color: var(--ink-soft); margin-top: 1px; }
  .m-poz__obca { font-size: 11px; color: var(--ink-soft); }
  .m-zad-d__obca { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }

  /* ---- WYSZUKIWARKA ---- */
  .m-szukaj {
    flex: 0 1 220px; min-width: 0; margin-left: auto;
    border: 1px solid var(--line); border-radius: 10px;
    padding: 7px 11px; font-size: 13px; font-family: var(--font-body);
    background: #faf8f2; color: var(--ink);
  }
  .m-szukaj:focus { outline: none; border-color: var(--turkus); }

  /* ---- HORYZONT: sidebar i taby (domyślnie ukryte na mobile) ---- */
  .m-hyz-side { display: none; }
  .m-hyz-tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--line); margin: 0 12px 8px; overflow-x: auto; }
  .m-tab {
    background: none; border: none; padding: 11px 14px;
    font-family: var(--font-body); font-size: 14px; color: var(--ink-soft);
    cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap;
  }
  .m-tab:hover { color: var(--turkus); }
  .m-tab--on { color: var(--turkus); font-weight: 600; border-bottom-color: var(--turkus); }

  #m-widok-horyzont[data-tab="kalendarz"] > .m-warstwa[data-typ="zadania"],
  #m-widok-horyzont[data-tab="kalendarz"] > .m-warstwa[data-typ="plemie"],
  #m-widok-horyzont[data-tab="kalendarz"] > .m-warstwa[data-typ="zakupy"],
  #m-widok-horyzont[data-tab="zadania"] > .m-warstwa[data-typ="kalendarz"],
  #m-widok-horyzont[data-tab="zadania"] > .m-warstwa[data-typ="plemie"],
  #m-widok-horyzont[data-tab="zadania"] > .m-warstwa[data-typ="zakupy"],
  #m-widok-horyzont[data-tab="plemie"] > .m-warstwa[data-typ="kalendarz"],
  #m-widok-horyzont[data-tab="plemie"] > .m-warstwa[data-typ="zadania"],
  #m-widok-horyzont[data-tab="plemie"] > .m-warstwa[data-typ="zakupy"],
  #m-widok-horyzont[data-tab="zakupy"] > .m-warstwa[data-typ="kalendarz"],
  #m-widok-horyzont[data-tab="zakupy"] > .m-warstwa[data-typ="zadania"],
  #m-widok-horyzont[data-tab="zakupy"] > .m-warstwa[data-typ="plemie"] { display: none; }
  #m-widok-horyzont > .m-warstwa > .m-warstwa__head { display: none; }
  .m-mini-mies__bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 2px 4px 8px; font-size: 13px; font-weight: 600; color: var(--ink);
  }
  .m-mini-mies__bar button {
    background: none; border: none; cursor: pointer; font-size: 18px; color: var(--ink-soft); padding: 2px 8px; line-height: 1;
  }
  .m-mini-mies__bar button:hover { color: var(--turkus); }
  .m-mini-mies__siatka { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
  .m-mini-mies__dow { font-size: 10px; color: var(--ink-soft); text-align: center; padding: 4px 0 2px; }
  .m-mini-mies__dzien { font-size: 12px; text-align: center; padding: 5px 0; border-radius: 5px; cursor: pointer; color: var(--ink); }
  .m-mini-mies__dzien:hover { background: var(--turkus-bg); }
  .m-mini-mies__dzien--dzis { background: #d23b3b; color: #fff; }
  .m-mini-mies__dzien--dzis:hover { background: #d23b3b; color: #fff; }
  .m-mini-mies__dzien--akt { outline: 1.5px solid var(--turkus); }
  .m-mini-naglowek { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-soft); padding: 14px 2px 6px; }
  .m-mini-pusto { font-size: 12.5px; color: var(--ink-soft); padding: 4px 2px; }
  .m-mini-agenda__dzien { font-size: 11px; font-weight: 600; color: var(--ink-soft); padding: 8px 2px 2px; }
  .m-mini-agenda__poz { font-size: 12.5px; padding: 4px 2px; display: flex; gap: 6px; align-items: baseline; line-height: 1.3; }
  .m-mini-agenda__poz-czas { font-weight: 600; flex: 0 0 46px; font-variant-numeric: tabular-nums; }
  .m-mini-filtr {
    display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
    background: none; border: none; padding: 6px 4px; font-family: var(--font-body);
    font-size: 13px; color: var(--ink); cursor: pointer; border-radius: 6px;
  }
  .m-mini-filtr:hover { background: var(--turkus-bg); }
  .m-mini-filtr__dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
  .m-mini-filtr__check { font-size: 13px; color: var(--ink-soft); flex: 0 0 auto; }
  .m-mini-filtr--off .m-mini-filtr__check { color: var(--line); }

  /* ---- DESKTOP — szerszy ekran ---- */
  @media (min-width: 1024px) and (min-height: 600px) {
    body { padding: 0 20px; }
    #m-app, #m-login { max-width: 1200px; }
    #m-widok-ekran { max-width: 540px; margin: 0 auto; }
    #m-widok-horyzont {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      align-items: start;
      padding: 0 4px;
    }
    #m-widok-horyzont > .m-hyz-bar { grid-column: 1 / -1; padding: 18px 4px 8px; }
    #m-widok-horyzont > .m-stopka { grid-column: 1 / -1; }
    .m-hyz-side {
      display: block; grid-column: 1; grid-row: 2 / span 5;
      background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
      padding: 12px 14px 16px; align-self: start; position: sticky; top: 12px;
    }
    .m-hyz-tabs {
      display: flex; gap: 4px; grid-column: 2;
      border-bottom: 1px solid var(--line); margin-bottom: 8px; padding-left: 4px;
    }
    #m-widok-horyzont > .m-warstwa { grid-column: 2; }
    #m-widok-horyzont[data-tab="kalendarz"] > .m-warstwa[data-typ="zadania"],
    #m-widok-horyzont[data-tab="kalendarz"] > .m-warstwa[data-typ="plemie"],
    #m-widok-horyzont[data-tab="kalendarz"] > .m-warstwa[data-typ="zakupy"],
    #m-widok-horyzont[data-tab="zadania"] > .m-warstwa[data-typ="kalendarz"],
    #m-widok-horyzont[data-tab="zadania"] > .m-warstwa[data-typ="plemie"],
    #m-widok-horyzont[data-tab="zadania"] > .m-warstwa[data-typ="zakupy"],
    #m-widok-horyzont[data-tab="plemie"] > .m-warstwa[data-typ="kalendarz"],
    #m-widok-horyzont[data-tab="plemie"] > .m-warstwa[data-typ="zadania"],
    #m-widok-horyzont[data-tab="plemie"] > .m-warstwa[data-typ="zakupy"],

    #m-widok-horyzont[data-tab="zakupy"] > .m-warstwa[data-typ="plemie"] { display: none; }
    /* taby zastępują nagłówki warstw na desktopie */
    #m-widok-horyzont > .m-warstwa > .m-warstwa__head { display: none; }
    .m-tg__scroll { max-height: 72vh; }
    .m-tg__godz { font-size: 11px; }
    .m-tg__event { font-size: 12px; padding: 3px 7px; }
    .m-poz__tytul, .m-zad-d__tytul, .m-zad__tytul { font-size: 15px; }
    .m-modal { max-width: 520px; border-radius: 18px; margin-bottom: 24px; }
    .m-overlay { align-items: center; }
  }
</style>

<!-- EKRAN WEJŚCIA — logowanie / rejestracja / odzyskiwanie hasła (wypełnia montujEkranLogowania) -->
<div id="m-login" style="display:none"></div>

<!-- APLIKACJA -->

    <section class="m-sekcja">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>

  const { data, error } = await supabase.auth.signInWithPassword({ email, password: haslo });
  let travelerId = null, authId = null;
  if (data && data.user) {
    authId = data.user.id;
    const { data: t } = await supabase.from("travels").select("id").eq("auth_user_id", authId).maybeSingle();
    if (t) travelerId = t.id;
  }
  await logujHistorie({
    traveler_id: travelerId, auth_user_id: authId, email,
    success: !error, failure_reason: error ? error.message : null,
    login_method: error ? "login_failed" : "login_email_password",
  });
  if (error) return { ok: false, error: error.message };
  return { ok: true };
}
async function zarejestruj({ email, haslo, nick, rokUrodzenia, zgodaRegulamin, zgodaRodo }) {
  const { data, error } = await supabase.auth.signUp({ email, password: haslo });
  if (error) return { ok: false, error: error.message };
  const authId = data.user.id;
  const patch = {
    nick, consent: !!zgodaRegulamin, consent_timestamp: new Date().toISOString(),
    gdpr_consent: !!zgodaRodo, gdpr_consent_at: new Date().toISOString(),
  };
  if (rokUrodzenia) {
    const r = parseInt(rokUrodzenia, 10);
    if (Number.isFinite(r)) patch.birth_year = r;
  }
  const { data: upd, error: updErr } = await supabase
    .from("travels").update(patch).eq("auth_user_id", authId).select().maybeSingle();
  if (updErr) return { ok: false, error: "Konto utworzone, ale błąd profilu: " + updErr.message };
  await logujHistorie({
    traveler_id: upd ? upd.id : null, auth_user_id: authId, email,
    success: true, login_method: "signup_email_password",
  });
  return { ok: true, potwierdzEmail: !data.session };
}
async function wyslijResetHasla(email) {
  const redirectTo = location.origin + location.pathname;
  const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });
  if (error) return { ok: false, error: error.message };
  return { ok: true };
}
async function ustawNoweHaslo(haslo) {
  const { error } = await supabase.auth.updateUser({ password: haslo });
  if (error) return { ok: false, error: error.message };
  return { ok: true };
}
function nasluchujOdzyskiwania(callback) {
  supabase.auth.onAuthStateChange((event) => {
    if (event === "PASSWORD_RECOVERY") callback();
  });
}

/* Blokada prób PIN (lokalnie, na urządzeniu): 5 prób → 15 min */
function pinLockStan(id) {
  let o = null; try { o = JSON.parse(localStorage.getItem("mana_pinlock_" + id) || "null"); } catch { o = null; }
  if (o && o.until && Date.now() < o.until) return { zablokowany: true };
  return { zablokowany: false, n: (o && o.n) || 0 };
}

      { traveler_id: TRAVELER.id, endpoint: sub.endpoint, p256dh: j.keys.p256dh, auth: j.keys.auth, user_agent: (navigator.userAgent || "").slice(0, 200) },
      { onConflict: "endpoint" });
  } catch (e) {}
}
async function pushPoWiadomosci(wiadomoscId) {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session || !session.access_token) return;
    fetch(`${SUPABASE_URL}/functions/v1/push-czat`, {
      method: "POST",
      headers: { "Authorization": `Bearer ${session.access_token}`, "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ wiadomosc_id: wiadomoscId }),
    }).catch(() => {});
  } catch (e) {}
}
function subskrybujRealtime() {
  if (_kanalRealtime) return;
  alarmPoprosZgode();
  pushZarejestruj();
  pokazBanerInstalacji();
  _kanalRealtime = supabase
    .channel("mana-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "events" }, odswiezKalendarzeLive)
    .on("postgres_changes", { event: "*", schema: "public", table: "plemie_czlonkowie" }, odswiezKalendarzeLive)
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "wiadomosci" }, (payload) => {
      odswiezRozmowyLive();
      alarmNowaWiadomosc(payload && payload.new);
    })
    .subscribe();
}

/* ════════════════════════════════════════════════════════════════════
   NAWIGATOR POKOI — mechanizm wpięty w KAŻDY nagłówek pokoju.
   Tap w tytuł (np. „Horyzont ▾") → lista: Ekran startowy + Twoje pokoje
   (w kolejności z ekranu startowego) + „Więcej w MANA" (reszta, z opisem
   i miejscem na cenę/„Odblokuj" — płatności przygotowane, nie pobierane).
   Ta sama filozofia co kontekstowy „2026" w kalendarzu: nagłówek = ster.
   ════════════════════════════════════════════════════════════════════ */
function idzDoPokoju(nazwa) {
  const p = POKOJE.find((x) => x.nazwa === nazwa);
  if (!p) return;
  if (!p.zywy) { if (typeof trzosToast === "function") trzosToast(nazwa + " — wkrótce"); return; }
  const fn = { horyzont: otworzHoryzont, trzos: otworzTrzos, sejf: otworzSejf, wiezi: otworzWiezi, egzamin: otworzEgzamin, puls: otworzPuls }[p.akcja];
  if (fn) fn();
}
function otworzNawigator() {
  const stary = $("m-nawigator"); if (stary) { stary.remove(); return; }
  const twoje = (typeof przypietePokoje === "function") ? przypietePokoje() : POKOJE.filter((p) => p.zywy).map((p) => p.nazwa);
  const twojeSet = new Set(twoje);
  const reszta = POKOJE.map((p) => p.nazwa).filter((n) => !twojeSet.has(n));
  const ovl = el(`<div id="m-nawigator" class="m-nav-ovl"></div>`);
  const panel = el(`<div class="m-nav-panel"></div>`);
  const zamknij = () => ovl.remove();
  const ikonaHtml = (p) => `<svg viewBox="0 0 24 24" fill="none" stroke="${p && p.zywy ? "#1a7158" : "#8c887e"}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p ? p.ikona : ""}</svg>`;

  const home = el(`<div class="m-nav-row${WIDOK_AKTYWNY === "ekran" ? " m-nav-row--on" : ""}"><span class="m-nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="#1a7158" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></span><span class="m-nav-nazwa">Ekran startowy</span></div>`);
  home.addEventListener("click", () => { zamknij(); pokazWidok("ekran"); });
  panel.appendChild(home);

  panel.appendChild(el(`<div class="m-nav-sekcja">Twoje pokoje</div>`));
  for (const n of twoje) {
    const p = POKOJE.find((x) => x.nazwa === n); if (!p) continue;
    const czyOn = WIDOK_AKTYWNY === p.akcja;
    const row = el(`<div class="m-nav-row${czyOn ? " m-nav-row--on" : ""}"><span class="m-nav-ico">${ikonaHtml(p)}</span><span class="m-nav-nazwa">${esc(p.nazwa)}</span></div>`);
    row.addEventListener("click", () => { zamknij(); idzDoPokoju(p.nazwa); });
    panel.appendChild(row);
  }

  if (reszta.length) {
    panel.appendChild(el(`<div class="m-nav-sekcja">Więcej w MANA</div>`));
    for (const n of reszta) {
      const p = POKOJE.find((x) => x.nazwa === n); if (!p) continue;
      const meta = (typeof POKOJE_META !== "undefined" && POKOJE_META[n]) || {};
      const row = el(`<div class="m-nav-row m-nav-locked"><span class="m-nav-ico">${ikonaHtml(p)}</span><span class="m-nav-nazwa">${esc(p.nazwa)}</span><span class="m-nav-chev">▾</span></div>`);
      const detal = el(`<div class="m-nav-detal" style="display:none;">${esc(meta.opis || "")}<div class="m-nav-detal-akcja"></div></div>`);
      const akcjaBox = detal.querySelector(".m-nav-detal-akcja");
      if (p.zywy) {
        const b = el(`<button class="m-nav-btn" style="background:#1a7158;color:#fff;">Otwórz</button>`);
        b.addEventListener("click", () => { zamknij(); idzDoPokoju(p.nazwa); });
        akcjaBox.appendChild(b);
      } else if (meta.cena) {
        akcjaBox.appendChild(el(`<span class="m-nav-cena">${esc(meta.cena)}</span>`));
        const b = el(`<button class="m-nav-btn" style="background:#1a7158;color:#fff;">Odblokuj</button>`);
        b.addEventListener("click", () => { if (typeof trzosToast === "function") trzosToast("Płatności wkrótce — przygotowujemy tę możliwość."); });
        akcjaBox.appendChild(b);
      } else {
        akcjaBox.appendChild(el(`<span class="m-nav-cena" style="color:#8c887e;font-weight:500;">Wkrótce</span>`));
      }
      row.addEventListener("click", () => {
        const pokaz = detal.style.display === "none";
        detal.style.display = pokaz ? "block" : "none";
        const ch = row.querySelector(".m-nav-chev"); if (ch) ch.textContent = pokaz ? "▴" : "▾";
      });
      panel.appendChild(row);
      panel.appendChild(detal);
    }
  }

  ovl.appendChild(panel);
  ovl.addEventListener("click", (e) => { if (e.target === ovl) zamknij(); });
  document.body.appendChild(ovl);
  requestAnimationFrame(() => panel.classList.add("on"));
}

   tą samą tabelą przez plemie_id — kolejny krok.
   ════════════════════════════════════════════════════════════════════ */
const KAT_TRZOS = ["dom", "jedzenie", "transport", "zdrowie", "rozrywka", "rachunki", "oszczędności", "inne"];
const KAT_POZ_TRZOS = ["", "paliwo", "spożywka", "jedzenie", "higiena", "kosmetyki", "suplementy", "leki", "zdrowie", "transport", "inne"];
const METODY_TRZOS = ["", "gotówka", "karta", "przelew", "BLIK"];
let TRZOS_PLEMIE_MAP = {}, TRZOS_OSOBA_MAP = {}, TRZOS_PLEMIONA = [], TRZOS_ZAKRES = null;
const fmtZl = (n) => (Number(n) || 0).toFixed(2).replace(".", ",") + " zł";

function trzosToast(t) {
  let b = $("trzos-toast");
  if (!b) { b = el(`<div id="trzos-toast" style="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1f2421;color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:88%;text-align:center;"></div>`); document.body.appendChild(b); }
  b.textContent = t; b.style.display = "block";
  clearTimeout(b._t); b._t = setTimeout(() => { b.style.display = "none"; }, 2800);
}

function otworzTrzos() { pokazWidok("trzos"); renderTrzos(); }

async function renderTrzos() {
  const lista = $("trzos-lista"), pod = $("trzos-podsum");
  lista.innerHTML = `<div style="color:var(--ink-soft);font-size:14px;padding:8px 0;">Wczytuję Trzos…</div>`;
  // org_id null = osobiste + rodzinne (RLS zwraca własne + plemienne); firmowe (org) to gospodarz
  const [rTx, rPl] = await Promise.all([
    supabase.from("transakcje")
      .select("*, dokumenty(id, plik_url, mime, ocr_status), transakcja_pozycje(id, nazwa, ilosc, cena_jedn, kwota, kategoria)")
      .is("org_id", null)
      .order("data", { ascending: false })
      .order("data_utworzenia", { ascending: false }),
    supabase.rpc("moje_plemiona_full"),
  ]);
  const { data: txy = [], error } = rTx;
  TRZOS_PLEMIE_MAP = {}; TRZOS_OSOBA_MAP = {}; TRZOS_PLEMIONA = rPl.data || [];
  TRZOS_PLEMIONA.forEach((p) => { TRZOS_PLEMIE_MAP[p.id] = p.nazwa; (p.czlonkowie || []).forEach((c) => { if (c.nick) TRZOS_OSOBA_MAP[c.traveler_id] = c.nick; }); });
  if (error) { lista.innerHTML = `<div style="color:#c4513a;font-size:14px;">Błąd: ${esc(error.message)}</div>`; return; }

  // Zakres: "moj" = prywatne (plemie_id null) + chip na każde plemię/zespół. Domyślnie tylko "moj".
  if (!TRZOS_ZAKRES) TRZOS_ZAKRES = new Set(["moj"]);
  // odsiej zakresy do nieistniejących już plemion
  [...TRZOS_ZAKRES].forEach((k) => { if (k !== "moj" && !TRZOS_PLEMIE_MAP[k]) TRZOS_ZAKRES.delete(k); });
  if (!TRZOS_ZAKRES.size) TRZOS_ZAKRES.add("moj");

  const chipStyl = (on) => `border-radius:999px;padding:6px 13px;font-size:13px;cursor:pointer;border:1px solid ${on ? "#1a7158" : "var(--line)"};background:${on ? "#1a7158" : "var(--surface)"};color:${on ? "#fff" : "var(--ink)"};`;

  function rysuj() {
    const sel = TRZOS_ZAKRES;
    const widoczne = txy.filter((t) => (t.plemie_id ? sel.has(t.plemie_id) : sel.has("moj")));
    const wybranePlem = TRZOS_PLEMIONA.filter((p) => sel.has(p.id));

    const przychod = widoczne.filter((t) => t.typ === "przychod").reduce((s, t) => s + Number(t.kwota || 0), 0);
    const koszt = widoczne.filter((t) => t.typ === "koszt").reduce((s, t) => s + Number(t.kwota || 0), 0);
    const bilans = przychod - koszt;

    // chipy
    const chipy = [`<button class="trz-chip" data-key="moj" style="${chipStyl(sel.has("moj"))}">🙋 Mój</button>`]
      .concat(TRZOS_PLEMIONA.map((p) => `<button class="trz-chip" data-key="${p.id}" style="${chipStyl(sel.has(p.id))}">👥 ${escP(p.nazwa)}</button>`))
      .join("");

    // rozbicie per osoba + per kategoria (tylko gdy w zakresie jest plemię/zespół)
    let rozbicie = "";
    if (wybranePlem.length) {
      const plemRows = widoczne.filter((t) => t.plemie_id);
      const perOsoba = {};
      plemRows.forEach((t) => {
        const k = t.traveler_id; perOsoba[k] = perOsoba[k] || { p: 0, k: 0 };
        if (t.typ === "przychod") perOsoba[k].p += Number(t.kwota || 0); else perOsoba[k].k += Number(t.kwota || 0);
      });
      const perKat = {};
      plemRows.filter((t) => t.typ === "koszt").forEach((t) => { const k = t.kategoria || "bez kategorii"; perKat[k] = (perKat[k] || 0) + Number(t.kwota || 0); });
      const osobaHtml = Object.entries(perOsoba).sort((a, b) => (b[1].k + b[1].p) - (a[1].k + a[1].p)).map(([tid, v]) =>
        `<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;"><span>${escP(TRZOS_OSOBA_MAP[tid] || (tid === (TRAVELER && TRAVELER.id) ? "Ja" : "—"))}</span><span style="color:var(--ink-soft);">${v.p ? `<span style='color:#1a7158;'>+${fmtZl(v.p)}</span> ` : ""}<span style="color:#c4513a;">−${fmtZl(v.k)}</span></span></div>`).join("");
      const katHtml = Object.entries(perKat).sort((a, b) => b[1] - a[1]).map(([k, v]) =>
        `<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;"><span>${escP(k)}</span><span style="color:#c4513a;">−${fmtZl(v)}</span></div>`).join("");
      rozbicie = `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
        <div style="flex:1;min-width:150px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:8px 12px;"><div style="font-size:11px;color:var(--ink-soft);margin-bottom:3px;">Kto ile dołożył</div>${osobaHtml || '<div style="font-size:12px;color:var(--ink-soft);">—</div>'}</div>
        <div style="flex:1;min-width:150px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:8px 12px;"><div style="font-size:11px;color:var(--ink-soft);margin-bottom:3px;">Koszty wg kategorii</div>${katHtml || '<div style="font-size:12px;color:var(--ink-soft);">—</div>'}</div>
      </div>`;
    }

    pod.innerHTML = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">${chipy}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <div style="flex:1;min-width:90px;background:#eef7f3;border:1px solid #cfe7df;border-radius:12px;padding:10px 12px;"><div style="font-size:11px;color:#1a7158;">Przychód</div><div style="font-size:16px;font-weight:600;color:#1a7158;">${fmtZl(przychod)}</div></div>
        <div style="flex:1;min-width:90px;background:#fbeeea;border:1px solid #f0d3ca;border-radius:12px;padding:10px 12px;"><div style="font-size:11px;color:#c4513a;">Koszt</div><div style="font-size:16px;font-weight:600;color:#c4513a;">${fmtZl(koszt)}</div></div>
        <div style="flex:1;min-width:90px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 12px;"><div style="font-size:11px;color:var(--ink-soft);">Bilans</div><div style="font-size:16px;font-weight:600;color:${bilans >= 0 ? "#1a7158" : "#c4513a"};">${fmtZl(bilans)}</div></div>
      </div>${rozbicie}`;

    pod.querySelectorAll(".trz-chip").forEach((b) => b.addEventListener("click", () => {
      const k = b.dataset.key;
      if (TRZOS_ZAKRES.has(k)) TRZOS_ZAKRES.delete(k); else TRZOS_ZAKRES.add(k);
      if (!TRZOS_ZAKRES.size) TRZOS_ZAKRES.add("moj"); // nigdy pusto
      rysuj();
    }));

    if (!widoczne.length) { lista.innerHTML = `<div style="color:var(--ink-soft);font-size:14px;padding:14px 0;">${txy.length ? "Brak wpisów w tym zakresie." : "Pusto. Dodaj pierwszy przychód lub koszt — paragon zrobisz zdjęciem (na telefonie) albo wybierzesz plik."}</div>`; return; }
    lista.innerHTML = "";
    widoczne.forEach((t) => lista.appendChild(wierszTrzos(t)));
  }
  rysuj();
}

function wierszPozTrzos(p) {
  const cur = p.kategoria || "";
  const lista = KAT_POZ_TRZOS.slice();
  if (cur && !lista.includes(cur)) lista.splice(1, 0, cur); // wartość z OCR spoza listy — pokaż, nie gub
  const katOpts = lista.map((k) => `<option value="${k}"${cur === k ? " selected" : ""}>${k || "— kategoria? —"}</option>`).join("");
  const brak = !cur;
  const JEDN_TRZOS = ["szt", "l", "kg", "opak", "godz"];
  const jmOpts = JEDN_TRZOS.map((j) => `<option value="${j}">${j}</option>`).join("");
  const r = el(`<div style="display:flex;gap:6px;align-items:center;margin:5px 0;flex-wrap:wrap;${brak ? "background:#fff7e6;border-radius:8px;padding:3px 5px;" : ""}">
    <input class="pz-nazwa" value="${esc(p.nazwa || "")}" style="flex:2;min-width:110px;padding:6px;border:1px solid var(--line);border-radius:7px;font-size:13px;background:#fff;">
    <input class="pz-ilosc" type="text" inputmode="decimal" placeholder="ile" value="${p.ilosc != null ? esc(p.ilosc) : ""}" style="width:40px;padding:6px;border:1px solid var(--line);border-radius:7px;font-size:13px;background:#fff;">
    <select class="pz-jm" title="jednostka" style="padding:6px;border:1px solid var(--line);border-radius:7px;font-size:12px;background:#fff;">${jmOpts}</select>
    <select class="pz-kat" style="padding:6px;border:1px solid ${brak ? "#e0a020" : "var(--line)"};border-radius:7px;font-size:12px;background:#fff;${brak ? "color:#b8842a;font-weight:600;" : ""}">${katOpts}</select>
    <span style="font-size:12px;color:var(--ink-soft);white-space:nowrap;">${p.kwota != null ? fmtZl(p.kwota) : ""}</span>
  </div>`);
  r.querySelector(".pz-jm").value = p.jednostka || "szt";
  const zapisz = async (patch) => { const { error } = await supabase.from("transakcja_pozycje").update(patch).eq("id", p.id); trzosToast(error ? "Błąd zapisu" : "Zapisano ✓"); };
  r.querySelector(".pz-kat").addEventListener("change", (e) => zapisz({ kategoria: e.target.value || null }));
  r.querySelector(".pz-jm").addEventListener("change", (e) => zapisz({ jednostka: e.target.value || "szt" }));
  const ilEl = r.querySelector(".pz-ilosc");
  ilEl.addEventListener("change", () => { const v = String(ilEl.value || "").replace(",", ".").trim(); const n = v === "" ? 1 : Number(v); zapisz({ ilosc: isFinite(n) ? n : 1 }); });
  const nz = r.querySelector(".pz-nazwa");
  nz.addEventListener("change", () => { const v = nz.value.trim(); if (v && v !== (p.nazwa || "")) zapisz({ nazwa: v }); });
  return r;
}
async function dodajPozTrzos(transakcja_id, kwota, nazwa, kategoria) {
  const { error } = await supabase.from("transakcja_pozycje").insert({ transakcja_id, nazwa: nazwa || "Nowa pozycja", kwota: kwota != null ? kwota : null, kategoria: kategoria || null, typ: "inne" });
  if (error) { trzosToast("Błąd: " + error.message); return; }
  trzosToast("Dodano pozycję ✓"); renderTrzos();
}
function wierszTrzos(t) {
  const dok = (t.dokumenty && t.dokumenty[0]) || null;
  const poz = t.transakcja_pozycje || [];
  const bezKat = poz.filter((p) => !p.kategoria).length;
  // Uzgodnienie: suma pozycji musi = kwota paragonu (kwota całości jest pewna; pozycje z OCR bywają dziurawe)
  const sumPoz = poz.reduce((s, p) => s + Number(p.kwota || 0), 0);
  const rozjazd = poz.length ? Math.round((Number(t.kwota || 0) - sumPoz) * 100) / 100 : 0;
  const niezgodne = Math.abs(rozjazd) > 0.02;
  const dodatnia = t.typ === "przychod";
  const kolor = dodatnia ? "#1a7158" : "#c4513a";
  const znak = dodatnia ? "+" : "−";
  const wrap = el(`<div style="margin-bottom:8px;"></div>`);
  const row = el(`<div style="display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);${niezgodne ? "border-left:4px solid #c4513a;" : bezKat ? "border-left:4px solid #e0a020;" : ""}border-radius:12px;padding:10px 12px;flex-wrap:wrap;">
    <div style="flex:1;min-width:150px;">
      <div style="font-size:14px;">${esc(t.opis || t.kategoria || (dodatnia ? "Przychód" : "Koszt"))}</div>
      <div style="font-size:11px;color:var(--ink-soft);">${esc(t.data)}${t.kategoria ? " · " + esc(t.kategoria) : ""}${t.metoda_platnosci ? " · " + esc(t.metoda_platnosci) : ""}${dok ? " · 📎" : ""}${poz.length ? " · " + poz.length + " poz." : ""}${t.plemie_id ? ` · <span style="color:#1a7158;">👥 ${escP(TRZOS_PLEMIE_MAP[t.plemie_id] || "rodzina")}</span>` : ""}${(t.plemie_id && t.traveler_id !== (TRAVELER && TRAVELER.id)) ? " · od " + escP(TRZOS_OSOBA_MAP[t.traveler_id] || "kogoś") : ""}${niezgodne ? ` · <span style="color:#c4513a;font-weight:600;">⚠ pozycje nie sumują się do kwoty (${rozjazd > 0 ? "brakuje " : "nadwyżka "}${fmtZl(Math.abs(rozjazd))})</span>` : bezKat ? ` · <span style="color:#b8842a;font-weight:600;">⚠ ${bezKat} bez kategorii</span>` : ""}</div>
    </div>
    <div style="font-size:15px;font-weight:600;color:${kolor};white-space:nowrap;">${znak} ${fmtZl(t.kwota)}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;width:100%;justify-content:flex-end;"></div>
  </div>`);
  const akcje = row.lastElementChild;
  const pozBox = el(`<div style="display:none;background:#faf8f2;border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;padding:6px 12px 10px;"></div>`);
  if (poz.length) {
    const sumBox = el(`<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0 6px;border-bottom:1px dashed var(--line);margin-bottom:6px;color:${niezgodne ? "#c4513a" : "var(--ink-soft)"};"><span>Suma pozycji: <b>${fmtZl(sumPoz)}</b> / paragon <b>${fmtZl(t.kwota)}</b></span><span>${niezgodne ? (rozjazd > 0 ? "brakuje " : "nadwyżka ") + fmtZl(Math.abs(rozjazd)) : "zgadza się ✓"}</span></div>`);
    pozBox.appendChild(sumBox);
  }
  poz.forEach((p) => pozBox.appendChild(wierszPozTrzos(p)));
  const dolBtny = el(`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;"></div>`);
  if (niezgodne && rozjazd > 0) {
    const bMiss = el(`<button style="background:#c4513a;color:#fff;border:none;border-radius:7px;padding:6px 11px;font-size:12px;cursor:pointer;">+ Dodaj brakującą pozycję (${fmtZl(rozjazd)})</button>`);
    bMiss.addEventListener("click", () => dodajPozTrzos(t.id, rozjazd, "", ""));
    dolBtny.appendChild(bMiss);
  }
  const bAdd = el(`<button style="background:#8c887e;color:#fff;border:none;border-radius:7px;padding:6px 11px;font-size:12px;cursor:pointer;">+ Pozycja</button>`);
  bAdd.addEventListener("click", () => dodajPozTrzos(t.id, null, "", ""));
  dolBtny.appendChild(bAdd);
  pozBox.appendChild(dolBtny);
  const mkBtn = (txt, bg, fn) => { const b = el(`<button style="background:${bg};color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;">${txt}</button>`); b.addEventListener("click", fn); return b; };
  if (poz.length || niezgodne) akcje.appendChild(mkBtn(niezgodne ? "⚠ Pozycje" : "Pozycje", niezgodne ? "#c4513a" : "#1f9e8f", () => { pozBox.style.display = pozBox.style.display === "none" ? "block" : "none"; }));
  if (dok) {
    if (dok.ocr_status !== "gotowe") akcje.appendChild(mkBtn("OCR", "#5b8def", () => wykonajOcrTrzos(t)));
    akcje.appendChild(mkBtn("📎 Podgląd", "#8c887e", () => otworzDokTrzos(dok.plik_url)));
  }
  if (t.typ === "koszt") akcje.appendChild(mkBtn(t.rozrachunek_id ? "✓ Wysłane" : "→ Osobie", t.rozrachunek_id ? "#8c887e" : "#1a7158", () => oknoWyslijKoszt(t.id, t.opis, t.kwota)));
  akcje.appendChild(mkBtn("Edytuj", "#8c887e", () => kartaTrzos(t.typ, t)));
  akcje.appendChild(mkBtn("Usuń", "#c4513a", () => usunTrzos(t)));
  wrap.appendChild(row);
  wrap.appendChild(pozBox);
  return wrap;
}

function kartaTrzos(typ, t) {
  const edycja = !!t;
  const dziś = czesciWarszawy(new Date()).dataISO;
  const katOpts = KAT_TRZOS.map((k) => `<option value="${k}"${t && t.kategoria === k ? " selected" : ""}>${k}</option>`).join("");
  const metOpts = METODY_TRZOS.map((m) => `<option value="${m}"${t && (t.metoda_platnosci || "") === m ? " selected" : ""}>${m || "— metoda —"}</option>`).join("");
  const ov = el(`<div class="m-overlay"><div class="m-modal">
    <div class="m-modal__head">
      <span class="m-modal__tytul">${edycja ? "Edytuj" : (typ === "przychod" ? "Nowy przychód" : "Nowy koszt")}</span>
      <button class="m-modal__x" aria-label="Zamknij">&#10005;</button>
    </div>
    <div class="m-form">
      <label>Kwota (zł)</label>
      <input type="number" id="tx-kwota" min="0" step="0.01" inputmode="decimal" value="${t ? esc(t.kwota) : ""}">
      <label>Data</label>
      <input type="date" id="tx-data" value="${t ? esc(t.data) : dziś}">
      <label>Kategoria</label>
      <select id="tx-kat">${katOpts}</select>
      <label>Metoda płatności</label>
      <select id="tx-metoda">${metOpts}</select>
      <label>Opis</label>
      <input type="text" id="tx-opis" maxlength="200" value="${t ? esc(t.opis || "") : ""}">
      <label>Kto widzi (wspólny budżet rodziny)</label>
      <select id="tx-kto"><option value="">🔒 Tylko ja (prywatne)</option></select>
      <label>📷 Paragon / faktura — na telefonie „Zrób zdjęcie", na komputerze wybierz plik / PDF</label>
      <input id="tx-plik" type="file" accept="image/*,application/pdf" style="font-size:13px;">
      ${t && t.paragon_url ? `<div style="font-size:11px;color:#1a7158;">Załączono dokument ✓ — po zapisie kliknij OCR, by odczytać.</div>` : ""}
    </div>
    <div class="m-modal__akcje">
      <button class="m-btn m-btn--zapisz" id="tx-zapisz">Zapisz</button>
    </div>
  </div></div>`);
  document.body.appendChild(ov);
  const zamknij = () => ov.remove();
  ov.addEventListener("click", (e) => { if (e.target === ov) zamknij(); });
  ov.querySelector(".m-modal__x").addEventListener("click", zamknij);
  (async () => {
    const { data: pls } = await supabase.rpc("moje_plemiona_full");
    const sel = ov.querySelector("#tx-kto");
    (pls || []).filter((p) => p.typ !== "rozmowa").forEach((p) => { const o = document.createElement("option"); o.value = p.id; o.textContent = "👥 " + p.nazwa; sel.appendChild(o); });
    if (t && t.plemie_id) sel.value = t.plemie_id;
  })();

  ov.querySelector("#tx-zapisz").addEventListener("click", async () => {
    const kwota = Number(ov.querySelector("#tx-kwota").value);
    if (!(kwota > 0)) { trzosToast("Podaj kwotę większą od zera."); return; }
    const dataVal = ov.querySelector("#tx-data").value || dziś;
    const kategoria = ov.querySelector("#tx-kat").value || null;
    const metoda = ov.querySelector("#tx-metoda").value || null;
    const opis = ov.querySelector("#tx-opis").value.trim() || null;
    const plemieId = ov.querySelector("#tx-kto").value || null;
    const plik = ov.querySelector("#tx-plik").files[0] || null;
    const btn = ov.querySelector("#tx-zapisz");
    btn.disabled = true; btn.textContent = "Zapisuję…";

    const payload = { typ, kwota, data: dataVal, kategoria, metoda_platnosci: metoda, opis, traveler_id: TRAVELER.id, org_id: null, plemie_id: plemieId };
    let txId = t && t.id;
    try {
      if (edycja) {
        const { error } = await supabase.from("transakcje").update(payload).eq("id", txId);
        if (error) throw error;
      } else {
        const { data, error } = await supabase.from("transakcje").insert(payload).select("id").single();
        if (error) throw error;
        txId = data.id;
      }
      if (plik) {
        const ext = (plik.name.split(".").pop() || "bin").toLowerCase();
        const sciezka = `traveler/${TRAVELER.id}/${crypto.randomUUID()}.${ext}`;
        const { error: upErr } = await supabase.storage.from("dokumenty").upload(sciezka, plik, { contentType: plik.type || undefined, upsert: false });
        if (upErr) throw upErr;
        await supabase.from("transakcje").update({ paragon_url: sciezka }).eq("id", txId);
        const { error: dErr } = await supabase.from("dokumenty").insert({
          traveler_id: TRAVELER.id, org_id: null, plemie_id: plemieId, typ: "paragon", kontekst: "trzos",
          plik_url: sciezka, mime: plik.type || null, zrodlo: "plik", ocr_status: "oczekuje",
          transakcja_id: txId, data_dokumentu: dataVal,
        });
        if (dErr) throw dErr;
      }
      zamknij();
      trzosToast(plik ? "Zapisano. Kliknij OCR, by odczytać paragon." : "Zapisano.");
      renderTrzos();
    } catch (e) {
      btn.disabled = false; btn.textContent = "Zapisz";
      trzosToast("Błąd: " + (e.message || e));
    }
  });
}

async function wykonajOcrTrzos(t) {
  trzosToast("Czytam paragon…");
  const { data, error } = await supabase.functions.invoke("ocr-dokument", { body: { transakcja_id: t.id } });
  if (error) { trzosToast("OCR błąd: " + error.message); return; }
  const d = (data && data.dane) || {};
  const kwota = d.kwota_brutto ?? d.kwota ?? null;
  const dataDok = d.data || null;
  const sprzedawca = d.sprzedawca || d.nazwa || "";
  const podsum = [sprzedawca, kwota != null ? fmtZl(kwota) : "", dataDok].filter(Boolean).join(" · ");
  if (!confirm(`Odczytano: ${podsum || "(brak danych)"}\n\nUzupełnić tę transakcję tymi danymi?`)) { renderTrzos(); return; }
  const upd = {};
  if (kwota != null && kwota > 0) upd.kwota = kwota;
  if (dataDok) upd.data = dataDok;
  if (d.metoda_platnosci) upd.metoda_platnosci = d.metoda_platnosci;
  if (d.kategoria) upd.kategoria = d.kategoria;
  if (sprzedawca && !t.opis) upd.opis = sprzedawca;
  if (Object.keys(upd).length) { await supabase.from("transakcje").update(upd).eq("id", t.id); }
  trzosToast("Uzupełniono z paragonu.");
  renderTrzos();
}

async function otworzDokTrzos(sciezka) {
  if (!sciezka) return;
  const { data, error } = await supabase.storage.from("dokumenty").createSignedUrl(sciezka, 300);
  if (error || !data) { trzosToast("Nie udało się otworzyć dokumentu."); return; }
  window.open(data.signedUrl, "_blank");
}

async function usunTrzos(t) {
  if (!confirm("Usunąć tę pozycję z Trzosu?")) return;
  const { error } = await supabase.from("transakcje").delete().eq("id", t.id);
  if (error) { trzosToast("Błąd: " + error.message); return; }
  trzosToast("Usunięto.");
  renderTrzos();
}

$("trzos-dodaj-przychod").addEventListener("click", () => kartaTrzos("przychod", null));
$("trzos-dodaj-koszt").addEventListener("click", () => kartaTrzos("koszt", null));

/* ====================================================================
   SEJF — pokój dokumentów (reużywa tabeli `dokumenty` + bucket `dokumenty`, jak Trzos).
