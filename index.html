<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MANA — ekran startowy + Horyzont</title>
<meta name="description" content="MANA — ekran startowy z żywym EA oraz pokój Horyzont (kalendarz + zadania).">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f9e8f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MANA">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  /* ====================================================================
     MANA — mana-app-krok3 — 25.05.2026
     Ekran startowy (żywy EA, brief, kalendarz dziś, zadania, rocznice)
     + pokój Horyzont wg specyfikacji v2: kalendarz (4 widoki, siatka doby,
     przesuwanie palcem, menu, wejście w dzień, dodawanie/edycja wydarzeń)
     + zadania (lista, przeciąganie pointer-events, V, Zrobione, edycja).
     ==================================================================== */
  :root {
    --bg: #f3f0e8; --surface: #ffffff;
    --ink: #2c2a26; --ink-soft: #8c887e;
    --line: #e4dfd1; --turkus: #1a7158; --turkus-bg: #e8efe9;
    --rocznica-bg: #e6eef4; --rocznica-ink: #2e5a7a;
    --font-display: "Fraunces", Georgia, serif;
    --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--font-body); -webkit-font-smoothing: antialiased;
    display: flex; justify-content: center;
  }
  #m-app, #m-login { width: 100%; max-width: 440px; min-height: 100%; display: flex; flex-direction: column; }

  /* ---- HEADER ---- */
  .m-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 18px 20px 14px;
  }
  .m-brand__name { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: 0.06em; }
  .m-brand__date { font-size: 13px; color: var(--ink-soft); margin-top: 2px; text-transform: lowercase; }
  .m-logout {
    background: none; border: 1px solid var(--line); cursor: pointer;
    font-size: 12.5px; color: var(--ink-soft); line-height: 1;
    padding: 8px 14px; border-radius: 16px; font-family: var(--font-body);
  }
  .m-logout:hover { border-color: var(--turkus); color: var(--turkus); }

  /* ---- KAFLE POKOI ---- */
  .m-rooms { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 4px 16px 14px; }
  .m-room {
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 6px 2px; font-family: var(--font-body);
  }
  .m-room__icon {
    width: 52px; height: 52px; border-radius: 50%; background: var(--turkus-bg);
    display: flex; align-items: center; justify-content: center;
  }
  .m-room__icon svg { width: 22px; height: 22px; }
  .m-room__name { font-size: 12px; color: var(--ink); }
  .m-room--soon { opacity: 0.4; cursor: default; }
  .m-room--soon .m-room__icon { background: #eae6da; }

  /* ---- EA — EKRAN ASYSTENTA ---- */
  .m-ea {
    margin: 0 16px 14px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 16px; padding: 16px;
    display: flex; flex-direction: column; transition: box-shadow 0.25s ease;
  }
  .m-ea--rozmowa { box-shadow: 0 6px 22px rgba(26,113,88,0.10); }
  .m-ea__head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .m-ea__spark {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--turkus-bg); color: var(--turkus);
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .m-ea__title { font-size: 15px; font-weight: 600; }
  .m-ea__stream { display: flex; flex-direction: column; gap: 10px; max-height: 46vh; overflow-y: auto; }
  .m-msg { border-radius: 12px; padding: 12px 14px; font-size: 14.5px; line-height: 1.5; }
  .m-msg--asystent { background: #faf8f2; border: 1px solid var(--line); color: var(--ink); }
  .m-msg--ja { background: var(--turkus); color: #fff; align-self: flex-end; max-width: 85%; }
  .m-msg--mysli { color: var(--ink-soft); font-style: italic; }
  .m-msg ul { margin: 5px 0; padding-left: 20px; }
  .m-msg li { margin: 3px 0; }
  .m-msg div + div { margin-top: 4px; }

  .m-wejscie { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .m-fala { display: flex; align-items: flex-end; gap: 2px; height: 18px; flex: 0 0 auto; }
  .m-fala span { width: 3px; background: var(--turkus); border-radius: 2px; opacity: 0.5; height: 6px; }
  .m-fala--zywa span { animation: fala 0.9s ease-in-out infinite; }
  .m-fala--zywa span:nth-child(2){animation-delay:.1s} .m-fala--zywa span:nth-child(3){animation-delay:.2s}
  .m-fala--zywa span:nth-child(4){animation-delay:.3s} .m-fala--zywa span:nth-child(5){animation-delay:.15s}
  @keyframes fala { 0%,100%{height:5px} 50%{height:17px} }
  .m-pole {
    flex: 1; resize: none; min-height: 42px; max-height: 120px;
    border: 1px solid var(--line); border-radius: 21px; padding: 11px 16px;
    font-size: 14px; font-family: var(--font-body); background: #faf8f2; color: var(--ink); line-height: 1.4;
  }
  .m-pole:focus { outline: none; border-color: var(--turkus); }
  .m-mik {
    flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--turkus-bg); color: var(--turkus);
    display: flex; align-items: center; justify-content: center;
  }
  .m-mik--slucha { background: var(--turkus); color: #fff; }
  .m-mik svg { width: 18px; height: 18px; }
  .m-wyslij {
    flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--turkus); color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .m-wyslij:hover { background: #155843; }
  .m-wyslij:disabled { opacity: 0.5; cursor: default; }
  .m-wyslij svg { width: 18px; height: 18px; }
  .m-glos {
    margin-left: auto; background: none; border: 1px solid var(--line); border-radius: 50%;
    cursor: pointer; color: var(--ink-soft); padding: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .m-glos svg { width: 16px; height: 16px; }
  .m-glos:hover { color: var(--turkus); border-color: var(--turkus); }
  .m-glos--on { color: var(--turkus); border-color: var(--turkus); background: var(--turkus-bg); }

  /* ---- SEKCJE EKRANU STARTOWEGO ---- */
  .m-sekcja {
    margin: 0 16px 12px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px;
  }
  .m-sekcja__head {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--ink-soft); margin-bottom: 10px;
  }
  .m-sekcja__head svg { width: 15px; height: 15px; }
  .m-sekcja__head--klik { cursor: pointer; user-select: none; }
  .m-sekcja__head--klik:hover { color: var(--turkus); }
  .m-sekcja__chev { margin-left: auto; font-size: 18px; line-height: 1; color: var(--ink-soft); }
  .m-sekcja__head--klik:hover .m-sekcja__chev { color: var(--turkus); }
  .m-poz { display: flex; gap: 12px; align-items: baseline; padding: 7px 0; }
  .m-poz + .m-poz { border-top: 1px solid #f0ece0; }
  .m-poz__czas { font-variant-numeric: tabular-nums; font-size: 14px; color: var(--turkus); flex: 0 0 46px; }
  .m-poz__tytul { font-size: 14.5px; }
  .m-pusto { font-size: 14px; color: var(--ink-soft); padding: 4px 0; }
  .m-dzien-naglowek { font-size: 12px; font-weight: 600; color: var(--ink-soft); padding: 9px 0 2px; }
  .m-poz + .m-dzien-naglowek { border-top: 1px solid #f0ece0; margin-top: 4px; }
  .m-wiecej {
    display: block; width: 100%; text-align: left; background: none; border: none;
    cursor: pointer; font-family: var(--font-body); font-size: 13px; color: var(--turkus);
    padding: 10px 0 2px;
  }
  .m-wiecej:hover { text-decoration: underline; }

  .m-zad { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
  .m-zad + .m-zad { border-top: 1px solid #f0ece0; }
  .m-zad__box {
    width: 19px; height: 19px; border-radius: 5px; border: 1.6px solid var(--line);
    cursor: pointer; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; background: none;
  }
  .m-zad__box--zrobione { background: var(--turkus); border-color: var(--turkus); }
  .m-zad__box svg { width: 12px; height: 12px; color: #fff; }
  .m-zad__kropka { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
  .m-zad__tytul { font-size: 14.5px; }
  .m-zad__tytul--zrobione { text-decoration: line-through; color: var(--ink-soft); }

  /* ---- PASEK ROCZNIC ---- */
  .m-rocznica {
    margin: 2px 16px 20px; background: var(--rocznica-bg); color: var(--rocznica-ink);
    border-radius: 12px; padding: 11px 16px; font-size: 13.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .m-rocznica svg { width: 15px; height: 15px; }

  /* ---- POKÓJ HORYZONT ---- */
  .m-hyz-bar { display: flex; align-items: center; gap: 10px; padding: 16px 18px 8px; }
  .m-back { background: none; border: none; cursor: pointer; font-family: var(--font-body); font-size: 13px; color: var(--ink-soft); padding: 6px 8px 6px 0; }
  .m-back:hover { color: var(--turkus); }
  .m-hyz-tytul { font-family: var(--font-display); font-size: 20px; font-weight: 600; }
  .m-warstwa { margin-bottom: 4px; }
  .m-warstwa__head { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); padding: 12px 18px 4px; }
  .m-warstwa__head svg { width: 15px; height: 15px; }
  .m-warstwa__head span { font-family: var(--font-display); font-size: 16px; color: var(--ink); }

  /* pasek nawigacji kalendarza */
  .m-kalbar { position: relative; display: flex; align-items: center; gap: 4px; margin: 4px 16px 8px; }
  .m-kalmenu { flex: 0 0 auto; background: none; border: 1px solid var(--line); border-radius: 9px; width: 34px; height: 34px; font-size: 14px; color: var(--ink); cursor: pointer; }
  .m-kaletyk { flex: 1; font-family: var(--font-display); font-size: 15px; text-transform: capitalize; padding-left: 4px; }
  .m-kalnav { flex: 0 0 auto; background: none; border: 1px solid var(--line); border-radius: 9px; width: 30px; height: 34px; font-size: 16px; color: var(--ink); cursor: pointer; }
  .m-kaldzis { flex: 0 0 auto; background: none; border: 1px solid var(--line); border-radius: 9px; height: 34px; padding: 0 10px; font-size: 12px; color: var(--ink-soft); cursor: pointer; font-family: var(--font-body); }
  .m-kaltresc { touch-action: pan-y; }
  .m-kalmenu-panel { position: absolute; top: 40px; left: 0; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.14); padding: 6px; z-index: 40; min-width: 190px; }
  .m-kalmenu-panel button { display: block; width: 100%; text-align: left; background: none; border: none; padding: 9px 12px; font-size: 14px; font-family: var(--font-body); color: var(--ink); cursor: pointer; border-radius: 8px; }
  .m-kalmenu-panel button:hover { background: var(--turkus-bg); }
  .m-kalmenu-panel button.m-kalmenu--on { color: var(--turkus); font-weight: 600; }
  .m-kalmenu-sep { border-top: 1px solid var(--line); margin: 4px 0; }

  /* siatka miesiąca */
  .m-mc { margin: 0 16px 8px; background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 12px 12px 14px; }
  .m-mc__siatka { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .m-mc__dow { text-align: center; font-size: 11px; color: var(--ink-soft); padding-bottom: 4px; }
  .m-mc__dzien { position: relative; text-align: center; font-size: 13px; padding: 9px 0; border-radius: 8px; color: var(--ink); cursor: pointer; }
  .m-mc__dzien:hover { background: var(--turkus-bg); }
  .m-mc__dzien--dzis { background: var(--turkus); color: #fff; font-weight: 600; }
  .m-mc__dzien--dzis:hover { background: var(--turkus); }
  .m-mc__kropka { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--turkus); }
  .m-mc__dzien--dzis .m-mc__kropka { background: #fff; }
  .m-mlist { margin: 0 16px 8px; }
  .m-mlist .m-poz { padding: 7px 4px; }
  .m-mlist .m-poz__czas { flex: 0 0 96px; }

  /* siatka czasu */
  .m-tg__naglowki { display: grid; align-items: end; }
  .m-tg__hdr { text-align: center; font-size: 11px; color: var(--ink-soft); padding: 4px 2px 6px; cursor: pointer; }
  .m-tg__hdr b { display: block; font-size: 15px; color: var(--ink); font-weight: 600; }
  .m-tg__hdr--dzis b { color: #fff; background: var(--turkus); border-radius: 50%; width: 26px; height: 26px; line-height: 26px; margin: 2px auto 0; }
  .m-tg__scroll { max-height: 54vh; overflow-y: auto; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); touch-action: pan-y; }
  .m-tg__plansza { display: grid; grid-template-columns: 38px 1fr; }
  .m-tg__godz { font-size: 10px; color: var(--ink-soft); text-align: right; padding-right: 5px; box-sizing: border-box; }
  .m-tg__kolumny { display: grid; }
  .m-tg__kol { position: relative; border-left: 1px solid #efeadd; }
  .m-tg__linia { position: absolute; left: 0; right: 0; border-top: 1px solid #f4f1e8; }
  .m-tg__event { position: absolute; left: 2px; right: 2px; background: var(--turkus-bg); border-left: 3px solid var(--turkus); border-radius: 5px; padding: 2px 5px; font-size: 10.5px; line-height: 1.2; overflow: hidden; box-sizing: border-box; cursor: pointer; }
  .m-tg__event--zad { background: #f6ecd6; border-left-color: #e0a020; }
  .m-tg__event-czas { color: var(--turkus); font-weight: 600; }
  .m-tg__event--zad .m-tg__event-czas { color: #b97e10; }
  .m-tg__teraz { position: absolute; left: 0; right: 0; border-top: 2px solid #d23b3b; z-index: 3; }

  /* strip całodzienny u góry siatki (wyjazdy, wakacje, konferencje) */
  .m-tg__caly-dzien-strip {
    display: grid; gap: 2px; padding: 4px 2px;
    background: #faf8f2; border-bottom: 1px solid var(--line);
  }
  .m-tg__caly-dzien-kol { display: flex; flex-direction: column; gap: 2px; min-height: 22px; padding: 0 2px; }
  .m-tg__caly-dzien-bar {
    color: #fff; border-radius: 4px; padding: 3px 7px; font-size: 11px; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
  }

  /* okno / modal */
  .m-overlay { position: fixed; inset: 0; background: rgba(24,22,16,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
  .m-modal { background: var(--surface); width: 100%; max-width: 440px; border-radius: 18px 18px 0 0; padding: 18px 18px 24px; max-height: 86vh; overflow-y: auto; }
  .m-modal__head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .m-modal__tytul { font-family: var(--font-display); font-size: 19px; }
  .m-modal__x { background: none; border: none; font-size: 20px; color: var(--ink-soft); cursor: pointer; padding: 4px 6px; }
  .m-form label { display: block; font-size: 12px; color: var(--ink-soft); margin: 10px 0 3px; }
  .m-form input[type=text], .m-form input[type=date], .m-form input[type=time],
  .m-form input[type=number], .m-form input[type=datetime-local], .m-form textarea, .m-form select {
    width: 100%; box-sizing: border-box; border: 1px solid var(--line); border-radius: 9px;
    padding: 10px 12px; font-size: 14px; font-family: var(--font-body); background: #faf8f2; color: var(--ink);
  }
  .m-form input:focus, .m-form textarea:focus, .m-form select:focus { outline: none; border-color: var(--turkus); }
  .m-form textarea { resize: vertical; min-height: 54px; }
  .m-form__row { display: flex; gap: 8px; }
  .m-form__row > div { flex: 1; }
  .m-form__check { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 14px; }
  .m-form__check input { width: 18px; height: 18px; }
  .m-modal__akcje { display: flex; gap: 8px; margin-top: 18px; }
  .m-btn { border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-family: var(--font-body); cursor: pointer; }
  .m-btn--zapisz { flex: 1; background: var(--turkus); color: #fff; }
  .m-btn--usun { background: #fce4e4; color: #8b1a1a; padding: 12px 16px; }

  /* zadania w Horyzoncie */
  .m-quickadd { display: flex; gap: 8px; margin: 0 16px 12px; }
  .m-quickadd input { flex: 1; border: 1px solid var(--line); border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: var(--font-body); background: var(--surface); color: var(--ink); }
  .m-quickadd input:focus { outline: none; border-color: var(--turkus); }
  .m-quickadd button { flex: 0 0 auto; border: none; background: var(--turkus); color: #fff; border-radius: 10px; padding: 0 16px; font-size: 20px; cursor: pointer; }
  .m-lista { margin: 0 16px 6px; max-height: 52vh; overflow-y: auto; }
  .m-zad-d { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--line); border-radius: 11px; padding: 11px 12px; margin-bottom: 7px; }
  .m-zad-d--ciagniety { opacity: 0.55; box-shadow: 0 5px 16px rgba(0,0,0,0.14); }
  .m-zad-d--zalegle { border-color: #e7b7b7; }
  .m-uchwyt { flex: 0 0 auto; color: #c7c1b0; font-size: 15px; line-height: 1; cursor: grab; touch-action: none; padding: 2px 3px; }
  .m-zad-d .m-zad__box { width: 21px; height: 21px; }
  .m-zad-d__tresc { flex: 1; cursor: pointer; }
  .m-zad-d__tytul { font-size: 14.5px; }
  .m-zad-d__termin { font-size: 11px; color: var(--ink-soft); margin-top: 1px; }
  .m-zad-d__termin--zalegly { color: #d23b3b; }
  .m-zrob-naglowek { margin: 14px 16px 8px; font-size: 13px; color: var(--ink-soft); background: none; border: none; cursor: pointer; font-family: var(--font-body); }
  .m-zad-z { display: flex; align-items: center; gap: 10px; padding: 9px 12px; margin: 0 16px 6px; background: #efece3; border-radius: 10px; }
  .m-zad-z .m-zad__tytul { flex: 1; text-decoration: line-through; color: var(--ink-soft); font-size: 14px; }
  .m-restore { flex: 0 0 auto; background: none; border: 1px solid var(--line); border-radius: 14px; padding: 5px 11px; cursor: pointer; font-size: 12px; color: var(--ink-soft); font-family: var(--font-body); }
  .m-restore:hover { border-color: var(--turkus); color: var(--turkus); }

  /* ---- EKRAN LOGOWANIA ---- */
  #m-login { justify-content: center; padding: 0 24px; }
  .m-login__box { text-align: center; }
  .m-login__name {
    font-family: var(--font-display); font-size: 30px; font-weight: 600;
    letter-spacing: 0.06em; color: var(--turkus);
  }
  .m-login__pod { font-size: 13px; color: var(--ink-soft); margin: 2px 0 22px; }
  .m-login__pole {
    width: 100%; padding: 12px 14px; margin-bottom: 10px;
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 15px; font-family: var(--font-body); background: var(--surface);
  }
  .m-login__pole:focus { outline: none; border-color: var(--turkus); }
  .m-login__btn {
    width: 100%; padding: 13px; margin-top: 6px;
    background: var(--turkus); color: #fff; border: none; border-radius: 8px;
    font-size: 15px; cursor: pointer; font-family: var(--font-body);
  }
  .m-login__btn:disabled { opacity: 0.6; }
  .m-login__msg { margin-top: 14px; font-size: 13px; min-height: 18px; }
  .m-login__msg--err { color: #8b1a1a; }

  .m-loader { margin: auto; color: var(--ink-soft); font-size: 14px; padding: 40px; }
  .m-stopka { padding: 10px 16px 24px; }

  /* ---- WYBÓR STREFY CZASOWEJ ---- */

function czesciWStrefie(wejscie, strefa) {
  const d = (wejscie instanceof Date) ? wejscie : new Date(wejscie);
  const cz = {};
  for (const p of new Intl.DateTimeFormat("en-GB", {
    timeZone: strefa, year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", hour12: false,
  }).formatToParts(d)) cz[p.type] = p.value;
  const hh = (cz.hour === "24") ? "00" : cz.hour;
  return {
    rok: +cz.year, mies: +cz.month, dzien: +cz.day,
    godz: +hh, min: +cz.minute,
    dataISO: `${cz.year}-${cz.month}-${cz.day}`,   // "YYYY-MM-DD" w tej strefie
    godzISO: `${hh}:${cz.minute}`,                  // "HH:MM" w tej strefie
  };
}
/* nazwa miasta ze strefy IANA: "America/New_York" → "New York" */
function miastoZeStrefy(strefa) {
  if (!strefa) return "";
  return String(strefa).split("/").pop().replace(/_/g, " ");
}
/* skróty dla strefy bazowej (Warszawa) — używane w całym kalendarzu */
function offsetWarszawyMin(dataStr) { return offsetStrefyMin(dataStr, TZ); }
function isoZWarszawy(dataStr, godzStr) { return isoZeStrefy(dataStr, godzStr, TZ); }
function czesciWarszawy(wejscie) { return czesciWStrefie(wejscie, TZ); }
/* dzisiejsza data warszawska jako Date-etykieta (lokalna północ) */
function dzisWarszawa() {
  const t = czesciWarszawy(new Date());
  return new Date(t.rok, t.mies - 1, t.dzien);
}
/* Date-etykieta kalendarza → "YYYY-MM-DD" (pola lokalne, bez strefy) */
function dataKalISO(d) {
  return `${d.getFullYear()}-${dwa(d.getMonth() + 1)}-${dwa(d.getDate())}`;
}
/* formatery wyświetlania — zawsze strefa warszawska */
function fmtData(iso, opcje) {
  return new Date(iso).toLocaleDateString("pl-PL", { ...opcje, timeZone: TZ });
}
function fmtGodz(iso) {
  return new Date(iso).toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit", timeZone: TZ });
}
/* granice dnia warszawskiego (dziś + przesunięcie) jako momenty UTC */
function granceDnia(przesuniecieDni = 0) {
  const t = czesciWarszawy(new Date());
  const baza = new Date(Date.UTC(t.rok, t.mies - 1, t.dzien + przesuniecieDni, 12));
  const cz = czesciWarszawy(baza);
  const s = new Date(isoZWarszawy(cz.dataISO, "00:00"));
  const e = new Date(isoZWarszawy(cz.dataISO, "23:59"));
  return { s, e };
}
/* druga linijka: czas wydarzenia w jego własnej strefie — gdy obca i ma godzinę.
   Główny czas pokazuje strefę bazową, ta linijka — strefę wydarzenia. */
function obcaStrefaLinia(e) {
  if (!e || !e.strefa || e.strefa === TZ || !e.data_czas || e.caly_dzien) return "";
  const cz = czesciWStrefie(e.data_czas, e.strefa);
  return `${cz.godzISO} ${miastoZeStrefy(e.strefa)}`;
}

/* ── wydarzenia całodzienne wielodniowe (wyjazdy, wakacje) ──
   Konwencja: data_czas = początek pierwszego dnia 00:00 Warszawy,
   koniec = początek dnia PO ostatnim dniu (eksluzywny). Single-day całodzienne
   stare (koniec=null) traktujemy jak jeden dzień. */
function nastepnyDzienISO(dataStr) {
  const [Y, M, D] = String(dataStr).split("-").map(Number);
  const d = new Date(Date.UTC(Y, M - 1, D + 1));
  return `${d.getUTCFullYear()}-${dwa(d.getUTCMonth() + 1)}-${dwa(d.getUTCDate())}`;
}
function poprzedniDzienISO(dataStr) {
  const [Y, M, D] = String(dataStr).split("-").map(Number);
  const d = new Date(Date.UTC(Y, M - 1, D - 1));
  return `${d.getUTCFullYear()}-${dwa(d.getUTCMonth() + 1)}-${dwa(d.getUTCDate())}`;
}
function dniCalodzienne(e) {
  if (!e || !e.caly_dzien || !e.data_czas) return [];
  const startISO = czesciWarszawy(e.data_czas).dataISO;
  if (!e.koniec) return [startISO];
  const koniecISO = czesciWarszawy(e.koniec).dataISO;  // start dnia eksluzywnego
  const dni = [];
  let curr = startISO;
  while (curr < koniecISO) {
    dni.push(curr);
    curr = nastepnyDzienISO(curr);
    if (dni.length > 366) break; // bezpiecznik
  }
  return dni.length ? dni : [startISO];
}
function zakresCalodzienny(e) {
  const dni = dniCalodzienne(e);
  if (dni.length <= 1) return null;
  return { start: dni[0], last: dni[dni.length - 1] };
}
function etykietaZakresuCalodziennego(e) {
  const z = zakresCalodzienny(e);
  if (!z) return "";
  const isoStart = isoZWarszawy(z.start, "00:00");
  const isoLast = isoZWarszawy(z.last, "00:00");
  const a = fmtData(isoStart, { day: "numeric", month: "short" });
  const b = fmtData(isoLast, { day: "numeric", month: "short" });
  return `${a} – ${b}`;
}

/* ---- API logowania (port z shared/auth.js) ---- */
async function logujHistorie(payload) {
  try {
    await supabase.from("login_history").insert({
      ...payload, user_agent: navigator.userAgent, app_context: "mana.app — logowanie",
    });
  } catch (e) { console.warn("auth: login_history:", e); }
}
async function zaloguj({ email, haslo }) {
  const { data, error } = await supabase.auth.signInWithPassword({ email, password: haslo });
  let travelerId = null, authId = null;
  if (data && data.user) {
    authId = data.user.id;
    const { data: t } = await supabase.from("travels").select("id").eq("auth_user_id", authId).maybeSingle();
    if (t) travelerId = t.id;
  }
  await logujHistorie({
    traveler_id: travelerId, auth_user_id: authId, email,
    success: !error, failure_reason: error ? error.message : null,
    login_method: error ? "login_failed" : "login_email_password",
  });
  if (error) return { ok: false, error: error.message };
  return { ok: true };
}
async function zarejestruj({ email, haslo, nick, rokUrodzenia, zgodaRegulamin, zgodaRodo }) {
  const { data, error } = await supabase.auth.signUp({ email, password: haslo });
  if (error) return { ok: false, error: error.message };
  const authId = data.user.id;
  const patch = {
    nick, consent: !!zgodaRegulamin, consent_timestamp: new Date().toISOString(),
    gdpr_consent: !!zgodaRodo, gdpr_consent_at: new Date().toISOString(),
  };
  if (rokUrodzenia) {
    const r = parseInt(rokUrodzenia, 10);
    if (Number.isFinite(r)) patch.birth_year = r;
  }
  const { data: upd, error: updErr } = await supabase
    .from("travels").update(patch).eq("auth_user_id", authId).select().maybeSingle();
  if (updErr) return { ok: false, error: "Konto utworzone, ale błąd profilu: " + updErr.message };
  await logujHistorie({
    traveler_id: upd ? upd.id : null, auth_user_id: authId, email,
    success: true, login_method: "signup_email_password",
  });
  return { ok: true, potwierdzEmail: !data.session };
}
async function wyslijResetHasla(email) {
  const redirectTo = location.origin + location.pathname;
  const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });
  if (error) return { ok: false, error: error.message };
  return { ok: true };
}
async function ustawNoweHaslo(haslo) {
  const { error } = await supabase.auth.updateUser({ password: haslo });
  if (error) return { ok: false, error: error.message };
  return { ok: true };
}
function nasluchujOdzyskiwania(callback) {
  supabase.auth.onAuthStateChange((event) => {
    if (event === "PASSWORD_RECOVERY") callback();
  });
}

async function start() {
  let recovery = false;
  nasluchujOdzyskiwania(() => {
    recovery = true;
    $("m-loader").style.display = "none";
    $("m-app").style.display = "none";
    $("m-login").style.display = "block";
    montujEkranLogowania($("m-login"), { startowy: "nowehaslo", onZalogowano: () => location.reload() });
  });
  await new Promise((r) => setTimeout(r, 250));
  if (recovery) return;
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { pokazLogowanie(); return; }
  await wejdz();
}
function pokazLogowanie() {
  $("m-loader").style.display = "none";
  $("m-app").style.display = "none";
  $("m-login").style.display = "block";
  montujEkranLogowania($("m-login"), { onZalogowano: () => location.reload() });
}
async function wejdz() {
  const { data: { session } } = await supabase.auth.getSession();
  const { data: trav } = await supabase
    .from("travels").select("id, nick").eq("auth_user_id", session.user.id).maybeSingle();
  if (!trav) { $("m-loader").textContent = "Nie znaleziono profilu podróżnika."; return; }
  TRAVELER = trav;
  $("m-loader").style.display = "none";
  $("m-app").style.display = "flex";
  renderHeader();
  renderPokoje();
  subskrybujRealtime();
  await wczytajDzien();
}

/* ════════════════════════════════════════════════════════════════════
   TRZOS — osobiste finanse: przychody + koszty + paragony/OCR.
   Reużywa kafla `dokumenty` i edge `ocr-dokument` (te same co gospodarz).
   Oś: transakcje.traveler_id (org_id puste). Wspólny budżet rodziny pójdzie
   tą samą tabelą przez plemie_id — kolejny krok.
   ════════════════════════════════════════════════════════════════════ */
const KAT_TRZOS = ["dom", "jedzenie", "transport", "zdrowie", "rozrywka", "rachunki", "oszczędności", "inne"];
const KAT_POZ_TRZOS = ["", "spożywka", "higiena", "kosmetyki", "suplementy", "leki", "zdrowie", "inne"];
const METODY_TRZOS = ["", "gotówka", "karta", "przelew", "BLIK"];
const fmtZl = (n) => (Number(n) || 0).toFixed(2).replace(".", ",") + " zł";

function trzosToast(t) {
  let b = $("trzos-toast");
  if (!b) { b = el(`<div id="trzos-toast" style="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1f2421;color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:88%;text-align:center;"></div>`); document.body.appendChild(b); }
  b.textContent = t; b.style.display = "block";
  clearTimeout(b._t); b._t = setTimeout(() => { b.style.display = "none"; }, 2800);
}

function otworzTrzos() { pokazWidok("trzos"); renderTrzos(); }

async function renderTrzos() {
  const lista = $("trzos-lista"), pod = $("trzos-podsum");
  lista.innerHTML = `<div style="color:var(--ink-soft);font-size:14px;padding:8px 0;">Wczytuję Trzos…</div>`;
  const { data: txy = [], error } = await supabase
    .from("transakcje")
    .select("*, dokumenty(id, plik_url, mime, ocr_status), transakcja_pozycje(id, nazwa, ilosc, cena_jedn, kwota, kategoria)")
    .eq("traveler_id", TRAVELER.id)
    .order("data", { ascending: false })
    .order("data_utworzenia", { ascending: false });
  if (error) { lista.innerHTML = `<div style="color:#c4513a;font-size:14px;">Błąd: ${esc(error.message)}</div>`; return; }

  const przychod = txy.filter((t) => t.typ === "przychod").reduce((s, t) => s + Number(t.kwota || 0), 0);
  const koszt = txy.filter((t) => t.typ === "koszt").reduce((s, t) => s + Number(t.kwota || 0), 0);
  const bilans = przychod - koszt;
  pod.innerHTML = `<div style="display:flex;gap:8px;flex-wrap:wrap;">
    <div style="flex:1;min-width:90px;background:#eef7f3;border:1px solid #cfe7df;border-radius:12px;padding:10px 12px;"><div style="font-size:11px;color:#1a7158;">Przychód</div><div style="font-size:16px;font-weight:600;color:#1a7158;">${fmtZl(przychod)}</div></div>
    <div style="flex:1;min-width:90px;background:#fbeeea;border:1px solid #f0d3ca;border-radius:12px;padding:10px 12px;"><div style="font-size:11px;color:#c4513a;">Koszt</div><div style="font-size:16px;font-weight:600;color:#c4513a;">${fmtZl(koszt)}</div></div>
    <div style="flex:1;min-width:90px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 12px;"><div style="font-size:11px;color:var(--ink-soft);">Bilans</div><div style="font-size:16px;font-weight:600;color:${bilans >= 0 ? "#1a7158" : "#c4513a"};">${fmtZl(bilans)}</div></div>
  </div>`;

  if (!txy.length) { lista.innerHTML = `<div style="color:var(--ink-soft);font-size:14px;padding:14px 0;">Pusto. Dodaj pierwszy przychód lub koszt — paragon zrobisz zdjęciem (na telefonie) albo wybierzesz plik.</div>`; return; }
  lista.innerHTML = "";
  txy.forEach((t) => lista.appendChild(wierszTrzos(t)));
}

function wierszPozTrzos(p) {
  const katOpts = KAT_POZ_TRZOS.map((k) => `<option value="${k}"${(p.kategoria || "") === k ? " selected" : ""}>${k || "— kategoria —"}</option>`).join("");
  const r = el(`<div style="display:flex;gap:6px;align-items:center;margin:5px 0;flex-wrap:wrap;">
    <input class="pz-nazwa" value="${esc(p.nazwa || "")}" style="flex:2;min-width:120px;padding:6px;border:1px solid var(--line);border-radius:7px;font-size:13px;background:#fff;">
    <select class="pz-kat" style="padding:6px;border:1px solid var(--line);border-radius:7px;font-size:12px;background:#fff;">${katOpts}</select>
    <span style="font-size:12px;color:var(--ink-soft);white-space:nowrap;">${p.kwota != null ? fmtZl(p.kwota) : ""}</span>
  </div>`);
  const zapisz = async (patch) => { const { error } = await supabase.from("transakcja_pozycje").update(patch).eq("id", p.id); trzosToast(error ? "Błąd zapisu" : "Zapisano ✓"); };
  r.querySelector(".pz-kat").addEventListener("change", (e) => zapisz({ kategoria: e.target.value || null }));
  const nz = r.querySelector(".pz-nazwa");
  nz.addEventListener("change", () => { const v = nz.value.trim(); if (v && v !== (p.nazwa || "")) zapisz({ nazwa: v }); });
  return r;
}
function wierszTrzos(t) {
  const dok = (t.dokumenty && t.dokumenty[0]) || null;
  const poz = t.transakcja_pozycje || [];
  const dodatnia = t.typ === "przychod";
  const kolor = dodatnia ? "#1a7158" : "#c4513a";
  const znak = dodatnia ? "+" : "−";
  const wrap = el(`<div style="margin-bottom:8px;"></div>`);
  const row = el(`<div style="display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 12px;flex-wrap:wrap;">
    <div style="flex:1;min-width:150px;">
      <div style="font-size:14px;">${esc(t.opis || t.kategoria || (dodatnia ? "Przychód" : "Koszt"))}</div>
      <div style="font-size:11px;color:var(--ink-soft);">${esc(t.data)}${t.kategoria ? " · " + esc(t.kategoria) : ""}${t.metoda_platnosci ? " · " + esc(t.metoda_platnosci) : ""}${dok ? " · 📎" : ""}${poz.length ? " · " + poz.length + " poz." : ""}</div>
    </div>
    <div style="font-size:15px;font-weight:600;color:${kolor};white-space:nowrap;">${znak} ${fmtZl(t.kwota)}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;width:100%;justify-content:flex-end;"></div>
  </div>`);
  const akcje = row.lastElementChild;
  const pozBox = el(`<div style="display:none;background:#faf8f2;border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;padding:6px 12px 10px;"></div>`);
  poz.forEach((p) => pozBox.appendChild(wierszPozTrzos(p)));
  const mkBtn = (txt, bg, fn) => { const b = el(`<button style="background:${bg};color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;">${txt}</button>`); b.addEventListener("click", fn); return b; };
  if (poz.length) akcje.appendChild(mkBtn("Pozycje", "#1f9e8f", () => { pozBox.style.display = pozBox.style.display === "none" ? "block" : "none"; }));
  if (dok) {
    if (dok.ocr_status !== "gotowe") akcje.appendChild(mkBtn("OCR", "#5b8def", () => wykonajOcrTrzos(t)));
    akcje.appendChild(mkBtn("📎 Podgląd", "#8c887e", () => otworzDokTrzos(dok.plik_url)));
  }
  akcje.appendChild(mkBtn("Edytuj", "#8c887e", () => kartaTrzos(t.typ, t)));
  akcje.appendChild(mkBtn("Usuń", "#c4513a", () => usunTrzos(t)));
  wrap.appendChild(row);
  wrap.appendChild(pozBox);
  return wrap;
}

function kartaTrzos(typ, t) {
  const edycja = !!t;
  const dziś = czesciWarszawy(new Date()).dataISO;
  const katOpts = KAT_TRZOS.map((k) => `<option value="${k}"${t && t.kategoria === k ? " selected" : ""}>${k}</option>`).join("");
  const metOpts = METODY_TRZOS.map((m) => `<option value="${m}"${t && (t.metoda_platnosci || "") === m ? " selected" : ""}>${m || "— metoda —"}</option>`).join("");
  const ov = el(`<div class="m-overlay"><div class="m-modal">
    <div class="m-modal__head">
      <span class="m-modal__tytul">${edycja ? "Edytuj" : (typ === "przychod" ? "Nowy przychód" : "Nowy koszt")}</span>
      <button class="m-modal__x" aria-label="Zamknij">&#10005;</button>
    </div>
    <div class="m-form">
      <label>Kwota (zł)</label>
      <input type="number" id="tx-kwota" min="0" step="0.01" inputmode="decimal" value="${t ? esc(t.kwota) : ""}">
      <label>Data</label>
      <input type="date" id="tx-data" value="${t ? esc(t.data) : dziś}">
      <label>Kategoria</label>
      <select id="tx-kat">${katOpts}</select>
      <label>Metoda płatności</label>
      <select id="tx-metoda">${metOpts}</select>
      <label>Opis</label>
      <input type="text" id="tx-opis" maxlength="200" value="${t ? esc(t.opis || "") : ""}">
      <label>📷 Paragon / faktura — na telefonie „Zrób zdjęcie", na komputerze wybierz plik / PDF</label>
      <input id="tx-plik" type="file" accept="image/*,application/pdf" style="font-size:13px;">
      ${t && t.paragon_url ? `<div style="font-size:11px;color:#1a7158;">Załączono dokument ✓ — po zapisie kliknij OCR, by odczytać.</div>` : ""}
    </div>
    <div class="m-modal__akcje">
      <button class="m-btn m-btn--zapisz" id="tx-zapisz">Zapisz</button>
    </div>
  </div></div>`);
  document.body.appendChild(ov);
  const zamknij = () => ov.remove();
  ov.addEventListener("click", (e) => { if (e.target === ov) zamknij(); });
  ov.querySelector(".m-modal__x").addEventListener("click", zamknij);

  ov.querySelector("#tx-zapisz").addEventListener("click", async () => {
    const kwota = Number(ov.querySelector("#tx-kwota").value);
    if (!(kwota > 0)) { trzosToast("Podaj kwotę większą od zera."); return; }
    const dataVal = ov.querySelector("#tx-data").value || dziś;
    const kategoria = ov.querySelector("#tx-kat").value || null;
    const metoda = ov.querySelector("#tx-metoda").value || null;
    const opis = ov.querySelector("#tx-opis").value.trim() || null;
    const plik = ov.querySelector("#tx-plik").files[0] || null;
    const btn = ov.querySelector("#tx-zapisz");
    btn.disabled = true; btn.textContent = "Zapisuję…";

    const payload = { typ, kwota, data: dataVal, kategoria, metoda_platnosci: metoda, opis, traveler_id: TRAVELER.id, org_id: null };
    let txId = t && t.id;
    try {
      if (edycja) {
        const { error } = await supabase.from("transakcje").update(payload).eq("id", txId);
        if (error) throw error;
      } else {
        const { data, error } = await supabase.from("transakcje").insert(payload).select("id").single();
        if (error) throw error;
        txId = data.id;
      }
      if (plik) {
        const ext = (plik.name.split(".").pop() || "bin").toLowerCase();
        const sciezka = `traveler/${TRAVELER.id}/${crypto.randomUUID()}.${ext}`;
        const { error: upErr } = await supabase.storage.from("dokumenty").upload(sciezka, plik, { contentType: plik.type || undefined, upsert: false });
        if (upErr) throw upErr;
        await supabase.from("transakcje").update({ paragon_url: sciezka }).eq("id", txId);
        const { error: dErr } = await supabase.from("dokumenty").insert({
          traveler_id: TRAVELER.id, org_id: null, typ: "paragon", kontekst: "trzos",
          plik_url: sciezka, mime: plik.type || null, zrodlo: "plik", ocr_status: "oczekuje",
          transakcja_id: txId, data_dokumentu: dataVal,
        });
        if (dErr) throw dErr;
      }
      zamknij();
      trzosToast(plik ? "Zapisano. Kliknij OCR, by odczytać paragon." : "Zapisano.");
      renderTrzos();
    } catch (e) {
      btn.disabled = false; btn.textContent = "Zapisz";
      trzosToast("Błąd: " + (e.message || e));
    }
  });
}

async function wykonajOcrTrzos(t) {
  trzosToast("Czytam paragon…");
  const { data, error } = await supabase.functions.invoke("ocr-dokument", { body: { transakcja_id: t.id } });
  if (error) { trzosToast("OCR błąd: " + error.message); return; }
  const d = (data && data.dane) || {};
  const kwota = d.kwota_brutto ?? d.kwota ?? null;
  const dataDok = d.data || null;
  const sprzedawca = d.sprzedawca || d.nazwa || "";
  const podsum = [sprzedawca, kwota != null ? fmtZl(kwota) : "", dataDok].filter(Boolean).join(" · ");
  if (!confirm(`Odczytano: ${podsum || "(brak danych)"}\n\nUzupełnić tę transakcję tymi danymi?`)) { renderTrzos(); return; }
  const upd = {};
  if (kwota != null && kwota > 0) upd.kwota = kwota;
  if (dataDok) upd.data = dataDok;
  if (d.metoda_platnosci) upd.metoda_platnosci = d.metoda_platnosci;
  if (d.kategoria) upd.kategoria = d.kategoria;
  if (sprzedawca && !t.opis) upd.opis = sprzedawca;
  if (Object.keys(upd).length) { await supabase.from("transakcje").update(upd).eq("id", t.id); }
  trzosToast("Uzupełniono z paragonu.");
  renderTrzos();
}

async function otworzDokTrzos(sciezka) {
  if (!sciezka) return;
  const { data, error } = await supabase.storage.from("dokumenty").createSignedUrl(sciezka, 300);
  if (error || !data) { trzosToast("Nie udało się otworzyć dokumentu."); return; }
  window.open(data.signedUrl, "_blank");
}

async function usunTrzos(t) {
  if (!confirm("Usunąć tę pozycję z Trzosu?")) return;
  const { error } = await supabase.from("transakcje").delete().eq("id", t.id);
  if (error) { trzosToast("Błąd: " + error.message); return; }
  trzosToast("Usunięto.");
  renderTrzos();
}

/* ===== PLEMIĘ (Horyzont) ===== */
const PLEMIE_KOLORY = ["#1f9e8f", "#e0a020", "#5b8def", "#c4519a", "#e0654a", "#7a9e3a"];
const POLITYKA_OPIS = { wlasciciel: "każdy edytuje tylko swoje wpisy", rowni: "każdy członek edytuje wspólne wpisy", zalozyciele: "założyciele zarządzają, członkowie tylko swoje" };
const escP = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const BT = "background:var(--turkus,#1f9e8f);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;";

function kartaPlemienia(p) {
  const mojeId = TRAVELER && TRAVELER.id;
  const owner = p.owner_traveler_id === mojeId;
  const jaZalozyciel = p.moja_rola === "zalozyciel";
  const czl = p.czlonkowie || [];
  const card = el(`<div style="background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span style="width:12px;height:12px;border-radius:50%;background:${p.kolor || "#1f9e8f"};flex:none;"></span>
      <b style="font-size:15px;">${escP(p.nazwa)}</b>
      <span style="font-size:11px;color:var(--ink-soft);">· ${escP(POLITYKA_OPIS[p.polityka_edycji] || p.polityka_edycji)}</span>
    </div>
    <div style="font-size:12px;color:var(--ink-soft);margin-top:6px;">Członkowie (${czl.length}):</div>

  </div>`);
  const czlBox = card.querySelector(".pl-czl");
  czl.forEach((c) => {
    const dziecko = !!c.zarzadzany;
    const chip = el(`<span style="font-size:12px;background:#efece3;border-radius:20px;padding:3px 9px;display:inline-flex;align-items:center;gap:4px;">${escP(c.nick || "uczestnik")}${c.rola === "zalozyciel" ? " · zał." : ""}${dziecko ? " · dziecko" : ""}</span>`);
    if (dziecko && c.opiekun === mojeId) {
      const x = el(`<button title="Usuń profil dziecka" style="border:none;background:none;color:#c0392b;cursor:pointer;font-size:14px;line-height:1;padding:0;">×</button>`);
      x.addEventListener("click", () => usunDziecko(c.traveler_id, c.nick));
      chip.appendChild(x);
    }
    czlBox.appendChild(chip);
  });
  const akcje = card.querySelector(".pl-akcje");
  const kalBtn = el(`<button style="${BT}">Kalendarz</button>`);
  kalBtn.addEventListener("click", () => otworzKalendarzPlemienia(p));
  akcje.appendChild(kalBtn);
  if (jaZalozyciel) {
    const inv = el(`<div style="display:flex;gap:6px;flex:1;min-width:200px;"><input class="pl-mail" type="email" placeholder="e-mail osoby z MANY" style="flex:1;padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:13px;"><button class="pl-zapros" style="${BT}">Zaproś</button></div>`);

/* ===== KALENDARZ PLEMIENIA (kolumny = członkowie) ===== */
let PLEMIE_KAL = null;
const inicjalyPl = (n) => { const cz = String(n || "").trim().split(/\s+/).filter(Boolean); return (((cz[0] || "")[0] || "") + ((cz[1] || "")[0] || "")).toUpperCase() || "?"; };
function otworzKalendarzPlemienia(p) { PLEMIE_KAL = { p, dzien: new Date(), dni: 1 }; renderPlemieKalendarz(); }
async function renderPlemieKalendarz() {
  const box = $("hyz-plemie"); if (!box || !PLEMIE_KAL) return;

  if (dni === 7) baza = new Date(baza.getTime() - ((baza.getDay() + 6) % 7) * 86400000);

  const ostatni = daty[daty.length - 1];

    <button class="pk-prev" style="${BG}">‹</button>

    <button class="pk-next" style="${BG}">›</button>
  </div>`);
  const tg = head.querySelector(".pk-tog");
  [["1 dzień", 1], ["3 dni", 3], ["Tydzień", 7]].forEach(([lab, n]) => {
    const b = el(`<button style="border:none;border-radius:0;padding:7px 10px;font-size:13px;cursor:pointer;${dni === n ? "background:var(--turkus,#1f9e8f);color:#fff;" : "background:#efece3;color:var(--ink);"}">${lab}</button>`);
    b.addEventListener("click", () => { PLEMIE_KAL.dni = n; renderPlemieKalendarz(); });
    tg.appendChild(b);
  });
  head.querySelector(".pk-back").addEventListener("click", () => { PLEMIE_KAL = null; renderPlemie(); });
  head.querySelector(".pk-prev").addEventListener("click", () => { PLEMIE_KAL.dzien = new Date(PLEMIE_KAL.dzien.getTime() - dni * 86400000); renderPlemieKalendarz(); });
  head.querySelector(".pk-next").addEventListener("click", () => { PLEMIE_KAL.dzien = new Date(PLEMIE_KAL.dzien.getTime() + dni * 86400000); renderPlemieKalendarz(); });
  head.querySelector(".pk-dzis").addEventListener("click", () => { PLEMIE_KAL.dzien = new Date(); renderPlemieKalendarz(); });
  wrap.appendChild(head);

  const START = 7, END = 22, PX = 0.7, H = (END - START) * 60 * PX;
  const wielo = dni > 1, dayRowH = wielo ? 18 : 0, memRowH = 30, headH = dayRowH + memRowH;
  const grid = el(`<div style="display:flex;border:1px solid var(--line);border-radius:12px;overflow:auto;background:var(--surface);"></div>`);
  const axis = el(`<div style="width:36px;flex:none;border-right:1px solid var(--line);"></div>`);
  axis.appendChild(el(`<div style="height:${headH}px;border-bottom:1px solid var(--line);"></div>`));
  const axB = el(`<div style="position:relative;height:${H}px;"></div>`);
  for (let h = START; h <= END; h++) axB.appendChild(el(`<div style="position:absolute;top:${(h - START) * 60 * PX}px;right:3px;font-size:10px;color:var(--ink-soft);transform:translateY(-50%);">${String(h).padStart(2, "0")}</div>`));
  axis.appendChild(axB); grid.appendChild(axis); wrap.appendChild(grid); box.appendChild(wrap);

  const d0 = isoZWarszawy(dataKalISO(daty[0]), "00:00");
  const koniecZakr = new Date(ostatni.getTime() + 86400000), d1 = isoZWarszawy(dataKalISO(koniecZakr), "00:00");
  const { data } = await supabase.from("events").select("*").gte("data_czas", d0).lt("data_czas", d1).eq("typ", "wydarzenie");
  const evs = data || [];
  let zajete = [];

      col.appendChild(el(`<div style="height:${memRowH}px;display:flex;align-items:center;justify-content:center;gap:4px;border-bottom:1px solid var(--line);font-size:11px;font-weight:600;overflow:hidden;"><span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:${p.kolor || "#1f9e8f"};color:#fff;font-size:8px;flex:none;">${escP(inicjalyPl(c.nick))}</span>${escP(c.nick || "uczestnik")}</div>`));
      const body = el(`<div style="position:relative;height:${H}px;cursor:${(ja || mogeDlaInnych) ? "pointer" : "default"};"></div>`);
      for (let h = START + 1; h < END; h++) body.appendChild(el(`<div style="position:absolute;left:0;right:0;top:${(h - START) * 60 * PX}px;border-top:1px solid #f0ece0;pointer-events:none;"></div>`));
      if (!ja) zajete.filter((z) => z.traveler_id === c.traveler_id && czesciWarszawy(z.data_czas).dataISO === dISO).forEach((z) => {
        const cz = czesciWarszawy(z.data_czas), a = cz.godz * 60 + cz.min;

        body.appendChild(el(`<div title="Zajęte" style="position:absolute;left:2px;right:2px;top:${(a - START * 60) * PX}px;height:${Math.max(14, dur * PX)}px;background:repeating-linear-gradient(45deg,#e8e4da,#e8e4da 5px,#f1eee7 5px,#f1eee7 10px);border-radius:4px;font-size:9px;color:#9a958a;padding:1px 3px;overflow:hidden;pointer-events:none;">Zajęte</div>`));

      if (isToday) { const tn = czesciWarszawy(new Date()), tMin = tn.godz * 60 + tn.min; body.appendChild(el(`<div title="Teraz" class="pk-now" style="position:absolute;left:0;right:0;top:${(tMin - START * 60) * PX}px;height:0;border-top:2px solid #e0395a;pointer-events:none;z-index:6;display:${tMin >= START * 60 && tMin <= END * 60 ? "" : "none"};"><span style="position:absolute;left:-3px;top:-4px;width:7px;height:7px;border-radius:50%;background:#e0395a;"></span></div>`)); }

/* skróty klawiszowe w Horyzoncie: N = nowe, T = dziś, ←/→ = okres, / = szukaj */
document.addEventListener("keydown", (ev) => {
  if ($("m-widok-horyzont").style.display === "none") return;
  const tag = (document.activeElement && document.activeElement.tagName) || "";
  const wInpucie = tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT";
  if (ev.key === "/" && !wInpucie) { ev.preventDefault(); $("hyz-szukaj").focus(); return; }
  if (ev.key === "Escape" && document.activeElement === $("hyz-szukaj")) {
    $("hyz-szukaj").value = ""; zapytanieSzukaj = "";
    renderKalendarz(); wczytajZadaniaHoryzont(); $("hyz-szukaj").blur(); return;
  }
  if (wInpucie) return;
  if (ev.key === "n" || ev.key === "N") { ev.preventDefault(); oknoWydarzenia({ data: kotwica }); }
  else if (ev.key === "t" || ev.key === "T") { ev.preventDefault(); kotwica = dzisWarszawa(); renderKalendarz(); }
  else if (ev.key === "ArrowLeft") { ev.preventDefault(); przesunOkres(-1); }
  else if (ev.key === "ArrowRight") { ev.preventDefault(); przesunOkres(1); }
});

  const wrap = $("m-rooms");

      </span><span class="m-room__name">${esc(p.nazwa)}</span></button>`);

    wrap.appendChild(btn);
  }
}

/* ====================================================================
   EKRAN STARTOWY — dane dnia
   ==================================================================== */
async function wczytajDzien() {
  const { s } = granceDnia(0);
  const koniecJutra = granceDnia(1).e;
  const oknoDo = new Date(s.getTime() + 8 * 86400000);

  // wydarzenia dziś + jutro
  const { data: wydOkno = [] } = await supabase
    .from("events").select("*")
    .eq("traveler_id", TRAVELER.id).eq("typ", "wydarzenie")
    .gte("data_czas", s.toISOString()).lte("data_czas", koniecJutra.toISOString())
    .order("data_czas", { ascending: true });

  const { data: zadania = [] } = await supabase
    .from("events").select("*")
    .eq("traveler_id", TRAVELER.id).eq("typ", "zadanie")
    .neq("status", "zrobione")
    .order("pozycja", { ascending: true, nullsFirst: false });

  const { data: caloDniowe = [] } = await supabase
    .from("events").select("tytul, data_czas")
    .eq("traveler_id", TRAVELER.id).eq("caly_dzien", true)
    .gte("data_czas", s.toISOString()).lt("data_czas", oknoDo.toISOString())
    .order("data_czas", { ascending: true }).limit(1);

  const teraz = new Date();
  const nadchodzace = (wydOkno || []).filter((w) =>
    (w.caly_dzien || new Date(w.koniec || w.data_czas) >= teraz)
    && !ukryteKat.has(kategoriaZE(w)));
  const dzisISO = czesciWarszawy(teraz).dataISO;
  const dzisNadch = nadchodzace.filter((w) => czesciWarszawy(w.data_czas).dataISO === dzisISO);

  renderBrief(dzisNadch.length, (zadania || []).length);
  renderNajblizsze(nadchodzace.slice(0, 6), nadchodzace.length > 6);
  renderZadaniaEkran(zadania || []);
  renderRocznica((caloDniowe || [])[0] || null, s);
}

function renderBrief(ileWyd, ileZad) {
  const nick = TRAVELER.nick || "podróżniku";
  let tekst;
  if (ileWyd === 0 && ileZad === 0) {
    tekst = `Dzień dobry, ${nick}. Dziś kalendarz i lista zadań są puste — spokojny dzień. Od czego zaczynamy?`;
  } else {
    const cz = [];
    if (ileWyd) cz.push(`${ileWyd} ${odmiana(ileWyd, "wydarzenie", "wydarzenia", "wydarzeń")}`);
    if (ileZad) cz.push(`${ileZad} ${odmiana(ileZad, "zadanie", "zadania", "zadań")}`);
    tekst = `Dzień dobry, ${nick}. Masz dziś ${cz.join(" i ")}. Od czego zaczynamy?`;
  }
  const stream = $("m-stream");
  stream.innerHTML = "";
  stream.appendChild(el(`<div class="m-msg m-msg--asystent">${esc(tekst)}</div>`));
}

/* etykieta dnia: Dziś / Jutro / „środa 27 maja" */
function etykietaDnia(iso) {
  const d = czesciWarszawy(iso).dataISO;
  const dzis = czesciWarszawy(new Date()).dataISO;
  const jutro = czesciWarszawy(new Date(Date.now() + 86400000)).dataISO;
  if (d === dzis) return "Dziś";
  if (d === jutro) return "Jutro";
  return fmtData(iso, { weekday: "long", day: "numeric", month: "long" });
}
/* najbliższe wydarzenia — dziś + jutro, pogrupowane nagłówkami dni */
function renderNajblizsze(wyd, jestWiecej) {
  $("m-kal-naglowek").textContent = "Najbliższe wydarzenia";
  const lista = $("m-kal-lista");
  lista.innerHTML = "";
  if (!wyd.length) {
    lista.appendChild(el(`<div class="m-pusto">Dziś i jutro w kalendarzu pusto — wolny czas. Zaplanuj coś w Horyzoncie.</div>`));
    return;
  }
  let ostatniDzien = "";
  for (const e of wyd) {
    const dzienKl = czesciWarszawy(e.data_czas).dataISO;
    if (dzienKl !== ostatniDzien) {
      ostatniDzien = dzienKl;
      lista.appendChild(el(`<div class="m-dzien-naglowek">${esc(etykietaDnia(e.data_czas))}</div>`));
    }
    const czas = e.caly_dzien ? "cały dzień" : fmtGodz(e.data_czas);
    const obca = obcaStrefaLinia(e);
    lista.appendChild(el(`<div class="m-poz"><span class="m-poz__czas">${esc(czas)}</span>`
      + `<span class="m-poz__tytul"><span class="m-kat-kropka" style="background:${kolorKategorii(e)}"></span>${esc(e.tytul)}${obca ? ` <span class="m-poz__obca">${esc(obca)}</span>` : ""}</span></div>`));
  }
  if (jestWiecej) {
    const link = el(`<button class="m-wiecej">więcej w Horyzoncie →</button>`);
    link.addEventListener("click", () => otworzHoryzont());
    lista.appendChild(link);
  }
}

/* Ekran startowy: lista zadań jest INFORMACYJNA — bez checkboxów.
   Operacje (oznacz zrobione, usuń, dodaj) idą przez asystenta albo pokój Horyzont. */
function renderZadaniaEkran(zad) {
  const lista = $("m-zad-lista");
  lista.innerHTML = "";
  if (!zad.length) {
    lista.appendChild(el(`<div class="m-pusto">Lista zadań pusta — powiedz asystentowi co dodać, albo zrób to w Horyzoncie.</div>`));
    return;
  }
  const teraz = new Date();
  const posortowane = [...zad].sort((a, b) => {
    const za = (a.data_czas && new Date(a.data_czas) < teraz) ? 0 : 1;
    const zb = (b.data_czas && new Date(b.data_czas) < teraz) ? 0 : 1;
    return za - zb;
  });
  for (const z of posortowane.slice(0, 3)) {
    lista.appendChild(el(`<div class="m-zad">
      <span class="m-zad__kropka" style="background:${KOLOR_PRIO[z.priorytet] || "#e0a020"}"></span>
      <span class="m-zad__tytul">${esc(z.tytul)}</span></div>`));
  }
  if (zad.length > 3) {
    const link = el(`<button class="m-wiecej">więcej w Horyzoncie →</button>`);
    link.addEventListener("click", () => otworzHoryzont({ skok: "zadania" }));
    lista.appendChild(link);
  }
}

function renderRocznica(wpis, startDnia) {
  const pasek = $("m-rocznica");
  if (!wpis) { pasek.style.display = "none"; return; }
  const data = new Date(wpis.data_czas);
  const dzis = data >= startDnia && data < new Date(startDnia.getTime() + 86400000);
  const kiedy = dzis ? "Dziś" : fmtData(wpis.data_czas, { day: "numeric", month: "long" });
  pasek.innerHTML = "";
  pasek.appendChild(el(`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7C12 7 12 2 8.5 2 6 2 6 7 12 7zM12 7C12 7 12 2 15.5 2 18 2 18 7 12 7z"/></svg>`));
  pasek.appendChild(el(`<span><strong>${esc(kiedy)}</strong> · ${esc(wpis.tytul)}</span>`));
  pasek.style.display = "flex";
}

/* wspólna zmiana statusu — kafel EVENT (RLS pilnuje własności) */
async function ustawStatus(id, status) {
  const { error } = await supabase.from("events").update({ status }).eq("id", id);

/* ====================================================================
   ASYSTENT — call-serce (żywy EA)
   ==================================================================== */
/* render wiadomości asystenta — prosta składnia: pogrubienie **...** i listy „- " */
function formatujAsystenta(tekst) {
  const pogrub = (s) => s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  let html = "", wLiscie = false;
  for (const surowa of String(tekst).split("\n")) {
    const mList = surowa.match(/^\s*[-*•]\s+(.*)$/);
    if (mList) {
      if (!wLiscie) { html += "<ul>"; wLiscie = true; }
      html += `<li>${pogrub(esc(mList[1]))}</li>`;
    } else {
      if (wLiscie) { html += "</ul>"; wLiscie = false; }
      html += surowa.trim() === "" ? "<br>" : `<div>${pogrub(esc(surowa))}</div>`;
    }
  }
  if (wLiscie) html += "</ul>";
  return html;
}
function dodajWiadomosc(klasa, tekst) {
  const stream = $("m-stream");
  const tresc = (klasa === "asystent") ? formatujAsystenta(tekst) : esc(tekst);
  const m = el(`<div class="m-msg m-msg--${klasa}">${tresc}</div>`);
  stream.appendChild(m);
  stream.scrollTop = stream.scrollHeight;
  return m;
}
async function wyslij() {
  const pole = $("m-pole");
  const tekst = pole.value.trim();
  if (!tekst || trwaRozmowa) return;
  trwaRozmowa = true;
  pole.value = ""; pole.style.height = "auto";
  $("m-ea").classList.add("m-ea--rozmowa");
  dodajWiadomosc("ja", tekst);
  const mysl = dodajWiadomosc("mysli", "Asystent myśli…");
  try {
    const { data: { session } } = await supabase.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/call-serce`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${session.access_token}`,
        "apikey": SUPABASE_KEY, "Content-Type": "application/json",
      },
      body: JSON.stringify({ message: tekst, duch: "duch_asystent_prywatny" }),
    });
    const dane = await res.json().catch(() => ({}));
    mysl.remove();
    if (res.ok && dane.response) {
      dodajWiadomosc("asystent", dane.response);
      powiedz(dane.response);
    } else {
      dodajWiadomosc("asystent", "Asystent chwilowo nie odpowiada (" + (dane.error || `HTTP ${res.status}`) + ").");
    }
  } catch (err) {
    mysl.remove();
    dodajWiadomosc("asystent", "Brak połączenia z asystentem: " + err.message);
  }
  trwaRozmowa = false;
}
const pole = $("m-pole");
pole.addEventListener("input", () => {
  pole.style.height = "auto";
  pole.style.height = Math.min(pole.scrollHeight, 120) + "px";
});
pole.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); wyslij(); }
});
/* przycisk wyślij — strzałka obok mikrofonu */
$("m-wyslij").addEventListener("click", () => wyslij());

/* ZDJĘCIE PARAGONU W ASYSTENCIE — zdjęcie → OCR → podsumowanie → zapis do Trzosu */
$("m-foto").addEventListener("click", () => $("m-foto-plik").click());
$("m-foto-plik").addEventListener("change", (e) => { const f = e.target.files[0]; e.target.value = ""; if (f) asystentParagon(f); });
async function asystentParagon(file) {
  if (!file || trwaRozmowa) return;
  trwaRozmowa = true;
  $("m-ea").classList.add("m-ea--rozmowa");
  dodajWiadomosc("ja", "📷 Paragon");
  const mysl = dodajWiadomosc("mysli", "Czytam paragon…");
  try {
    const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
    const sciezka = `traveler/${TRAVELER.id}/${crypto.randomUUID()}.${ext}`;
    const up = await supabase.storage.from("dokumenty").upload(sciezka, file, { contentType: file.type || undefined, upsert: false });
    if (up.error) throw up.error;
    const dok = await supabase.from("dokumenty").insert({ traveler_id: TRAVELER.id, org_id: null, typ: "paragon", kontekst: "finanse", plik_url: sciezka, mime: file.type || null, zrodlo: "zdjecie", ocr_status: "oczekuje" }).select("id").single();
    if (dok.error) throw dok.error;
    const { data, error } = await supabase.functions.invoke("ocr-dokument", { body: { dokument_id: dok.data.id } });
    mysl.remove();
    if (error || !data || !data.ok) { dodajWiadomosc("asystent", "Nie udało się odczytać paragonu" + (error ? ": " + error.message : "") + "."); trwaRozmowa = false; return; }
    const d = data.dane || {};
    const poz = Array.isArray(d.pozycje) ? d.pozycje.filter((p) => p && p.nazwa) : [];
    const kwota = d.kwota_brutto != null ? d.kwota_brutto : null;
    const sprz = (d.sprzedawca || "").trim();
    if (kwota != null && sprz) {
      const dataDup = d.data || czesciWarszawy(new Date()).dataISO;
      const { data: ist } = await supabase.from("transakcje").select("id, opis").eq("traveler_id", TRAVELER.id).eq("typ", "koszt").eq("data", dataDup).eq("kwota", kwota);
      const dup = (ist || []).find((r) => (r.opis || "").trim().toLowerCase() === sprz.toLowerCase());
      if (dup) {
        await supabase.from("dokumenty").delete().eq("id", dok.data.id);
        await supabase.storage.from("dokumenty").remove([sciezka]);
        dodajWiadomosc("asystent", `To już masz zapisane (duplikat): ${esc(sprz)}, ${fmtZl(kwota)}, ${esc(dataDup)}. Nie dodaję drugi raz.`);
        trwaRozmowa = false; return;
      }
    }
    let podsum = `<div><strong>Paragon odczytany</strong></div>`;
    if (d.sprzedawca) podsum += `<div>Sprzedawca: ${esc(d.sprzedawca)}</div>`;
    if (d.data) podsum += `<div>Data: ${esc(d.data)}</div>`;
    if (kwota != null) podsum += `<div>Razem: ${fmtZl(kwota)}</div>`;
    if (poz.length) podsum += `<div style="margin-top:4px;">Pozycje:</div><ul>${poz.map((p) => `<li>${esc(p.nazwa)}${p.kwota != null ? " — " + fmtZl(p.kwota) : ""}${p.kategoria ? ` <span style="color:#8c887e;">(${esc(p.kategoria)})</span>` : ""}</li>`).join("")}</ul>`;
    const bubel = el(`<div class="m-msg m-msg--asystent">${podsum}<div style="display:flex;gap:8px;margin-top:8px;"><button class="par-zapisz" style="background:#1a7158;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;">Zapisz do Trzosu</button><button class="par-anuluj" style="background:#efece3;color:#26241f;border:none;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;">Anuluj</button></div></div>`);
    $("m-stream").appendChild(bubel); $("m-stream").scrollTop = $("m-stream").scrollHeight;
    bubel.querySelector(".par-anuluj").addEventListener("click", () => { bubel.querySelector("div:last-child").remove(); dodajWiadomosc("asystent", "Anulowane — nie zapisałem. Paragon został w dokumentach."); });
    bubel.querySelector(".par-zapisz").addEventListener("click", async () => {
      const btn = bubel.querySelector(".par-zapisz"); btn.disabled = true; btn.textContent = "Zapisuję…";
      try {
        const dzis = czesciWarszawy(new Date()).dataISO;
        const tx = await supabase.from("transakcje").insert({ traveler_id: TRAVELER.id, org_id: null, typ: "koszt", kwota: kwota != null ? kwota : 0, data: d.data || dzis, kategoria: d.kategoria || null, metoda_platnosci: d.metoda_platnosci || null, opis: d.sprzedawca || null, paragon_url: sciezka }).select("id").single();
        if (tx.error) throw tx.error;
        await supabase.from("dokumenty").update({ transakcja_id: tx.data.id }).eq("id", dok.data.id);
        if (poz.length) {
          const rows = poz.map((p) => ({ transakcja_id: tx.data.id, typ: "zakup", nazwa: String(p.nazwa), ilosc: p.ilosc != null ? p.ilosc : 1, cena_jedn: p.cena_jedn != null ? p.cena_jedn : null, kwota: p.kwota != null ? p.kwota : null, kategoria: p.kategoria || null }));
          await supabase.from("transakcja_pozycje").insert(rows);
        }
        bubel.querySelector("div:last-child").remove();
        dodajWiadomosc("asystent", "Zapisałem w Trzosie ✓" + (kwota != null ? " (" + fmtZl(kwota) + ")" : "") + (poz.length ? `, pozycji: ${poz.length}` : ""));
        if (typeof renderTrzos === "function" && $("m-widok-trzos") && $("m-widok-trzos").style.display !== "none") renderTrzos();
      } catch (e) { btn.disabled = false; btn.textContent = "Zapisz do Trzosu"; dodajWiadomosc("asystent", "Nie zapisałem: " + (e.message || e)); }
    });
  } catch (err) { mysl.remove(); dodajWiadomosc("asystent", "Błąd: " + (err.message || err)); }
  trwaRozmowa = false;
}

/* czytanie odpowiedzi asystenta na głos (TTS) */
let czytajGlosno = false;
function powiedz(tekst) {
  if (!czytajGlosno || !window.speechSynthesis) return;
  try {
    window.speechSynthesis.cancel();
    // wycinamy markdown żeby asystent nie czytał gwiazdek i myślników
    const czyste = String(tekst).replace(/\*\*/g, "").replace(/^\s*[-*•]\s+/gm, "");
    const u = new SpeechSynthesisUtterance(czyste);
    u.lang = "pl-PL"; u.rate = 1.0; u.pitch = 1.0;
    window.speechSynthesis.speak(u);
  } catch (err) { console.warn("TTS:", err); }
}
$("m-glos").addEventListener("click", () => {
  czytajGlosno = !czytajGlosno;
  $("m-glos").classList.toggle("m-glos--on", czytajGlosno);
  $("m-glos").setAttribute("aria-pressed", czytajGlosno ? "true" : "false");
  if (!czytajGlosno && window.speechSynthesis) window.speechSynthesis.cancel();
});
const Rozpoznanie = window.SpeechRecognition || window.webkitSpeechRecognition;
const mik = $("m-mik");
if (Rozpoznanie) {
  const rozp = new Rozpoznanie();
  rozp.lang = "pl-PL"; rozp.interimResults = false;
  let slucha = false;
  mik.addEventListener("click", () => { slucha ? rozp.stop() : rozp.start(); });
  rozp.onstart = () => { slucha = true; mik.classList.add("m-mik--slucha"); $("m-fala").classList.add("m-fala--zywa"); };
  rozp.onend = () => { slucha = false; mik.classList.remove("m-mik--slucha"); $("m-fala").classList.remove("m-fala--zywa"); };
  rozp.onresult = (e) => {
    pole.value = (pole.value ? pole.value + " " : "") + e.results[0][0].transcript;
    pole.dispatchEvent(new Event("input")); pole.focus();
  };
} else {
  mik.title = "Mowa niedostępna w tej przeglądarce — pisz w polu";
}

/* ====================================================================
   POKÓJ HORYZONT — kalendarz (4 widoki, swipe, menu) + zadania
   ==================================================================== */
let widokKal = "3dni";
let kotwica = dzisWarszawa();
let pokazRocznice = true;
let zapytanieSzukaj = "";

function pasujeDoSzukania(e, q) {
  if (!q) return true;
  const t = q.toLowerCase();
  return (e.tytul && e.tytul.toLowerCase().includes(t))
      || (e.opis && e.opis.toLowerCase().includes(t))
      || (e.lokalizacja && e.lokalizacja.toLowerCase().includes(t));
}

async function otworzHoryzont(opcje) {
  pokazWidok("horyzont");
  kotwica = dzisWarszawa();
  widokKal = "3dni";
  await Promise.all([renderKalendarz(), wczytajZadaniaHoryzont()]);
  if (opcje && opcje.skok === "zadania") {
    setTimeout(() => {
      const el = document.getElementById("hyz-zad-aktywne");
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 60);
  }
}

/* --- okres bieżącego widoku --- */
function zakresOkresu() {
  const k = new Date(kotwica.getFullYear(), kotwica.getMonth(), kotwica.getDate());
  if (widokKal === "miesiac")
    return { od: new Date(k.getFullYear(), k.getMonth(), 1), miesiac: true };
  if (widokKal === "tydzien") {
    const dow = (k.getDay() + 6) % 7;
    return { od: new Date(k.getFullYear(), k.getMonth(), k.getDate() - dow), dni: 7 };
  }
  return { od: k, dni: widokKal === "3dni" ? 3 : 1 };
}
function przesunOkres(kier) {
  const k = kotwica;
  if (widokKal === "miesiac") kotwica = new Date(k.getFullYear(), k.getMonth() + kier, 1);
  else if (widokKal === "tydzien") kotwica = new Date(k.getFullYear(), k.getMonth(), k.getDate() + 7 * kier);
  else if (widokKal === "3dni") kotwica = new Date(k.getFullYear(), k.getMonth(), k.getDate() + 3 * kier);
  else kotwica = new Date(k.getFullYear(), k.getMonth(), k.getDate() + kier);
  renderKalendarz();
}
function etykietaOkresu(z) {
  if (z.miesiac)
    return z.od.toLocaleDateString("pl-PL", { month: "long", year: "numeric" });
  if (z.dni === 1)
    return z.od.toLocaleDateString("pl-PL", { weekday: "long", day: "numeric", month: "long" });
  const ost = new Date(z.od.getTime() + (z.dni - 1) * 86400000);
  const a = z.od.getMonth() === ost.getMonth()
    ? String(z.od.getDate())
    : z.od.toLocaleDateString("pl-PL", { day: "numeric", month: "short" });
  const b = ost.toLocaleDateString("pl-PL", { day: "numeric", month: "short" });
  return `${a} – ${b}`;
}

async function renderKalendarz() {
  const wrap = $("hyz-kalendarz");
  const z = zakresOkresu();
  wrap.innerHTML = `
    <div class="m-kalbar">
      <button class="m-kalmenu" id="kal-menu" aria-label="Widoki">&#9776;</button>
      <span class="m-kaletyk">${esc(etykietaOkresu(z))}</span>
      <button class="m-kalnav" data-k="-1" aria-label="Wstecz">&#8249;</button>
      <button class="m-kaldzis" id="kal-dzis">Dziś</button>
      <button class="m-kalnav" data-k="1" aria-label="Naprzód">&#8250;</button>
    </div>
    <div class="m-kaltresc" id="kal-tresc"></div>`;
  wrap.querySelectorAll(".m-kalnav").forEach((b) =>
    b.addEventListener("click", () => przesunOkres(Number(b.dataset.k))));
  $("kal-dzis").addEventListener("click", () => { kotwica = dzisWarszawa(); renderKalendarz(); });
  $("kal-menu").addEventListener("click", (e) => { e.stopPropagation(); otworzMenuKal(); });
  const box = $("kal-tresc");
  podepnijSwipe(box);
  if (z.miesiac) await renderMiesiacGrid(box, z.od);
  else await renderSiatka(box, z.od, z.dni);
  aktualizujSidebar();
}

function otworzMenuKal() {
  const istn = document.getElementById("kal-menu-panel");
  if (istn) { istn.remove(); return; }
  const chipyKat = KATEGORIE.map((k) =>
    `<button data-kat="${k}"><span class="m-kat-kropka" style="background:${KOLOR_KAT[k]}"></span>${!ukryteKat.has(k) ? "✓ " : ""}${esc(ETYK_KAT[k])}</button>`
  ).join("");
  const chipyPlem = Object.keys(PLEMIE_MAP || {}).map((id) =>
    `<button data-plemie="${id}"><span class="m-kat-kropka" style="background:${PLEMIE_MAP[id].kolor || "#1f9e8f"}"></span>${widocznePlemiona.has(id) ? "✓ " : ""}${esc(PLEMIE_MAP[id].nazwa)}</button>`
  ).join("");
  const panel = el(`<div class="m-kalmenu-panel" id="kal-menu-panel">
    <button data-w="dzis">Dziś</button>
    <button data-w="3dni">3 dni</button>
    <button data-w="tydzien">Tydzień</button>
    <button data-w="miesiac">Miesiąc</button>
    <div class="m-kalmenu-sep"></div>
    <button data-toggle="rocznice">${pokazRocznice ? "✓ " : ""}Rocznice i urodziny</button>
    <div class="m-kalmenu-sep"></div>
    ${chipyKat}
    ${chipyPlem ? `<div class="m-kalmenu-sep"></div>${chipyPlem}` : ""}
  </div>`);
  panel.querySelectorAll("button[data-w]").forEach((b) => {
    if (b.dataset.w === widokKal) b.classList.add("m-kalmenu--on");
    b.addEventListener("click", () => { widokKal = b.dataset.w; panel.remove(); renderKalendarz(); });
  });
  panel.querySelector("button[data-toggle]").addEventListener("click", () => {
    pokazRocznice = !pokazRocznice; panel.remove(); renderKalendarz();
  });
  panel.querySelectorAll("button[data-kat]").forEach((b) => {
    b.addEventListener("click", () => {
      const k = b.dataset.kat;
      if (ukryteKat.has(k)) ukryteKat.delete(k); else ukryteKat.add(k);
      panel.remove();
      renderKalendarz();
      wczytajDzien();
    });
  });
  panel.querySelectorAll("button[data-plemie]").forEach((b) => {
    b.addEventListener("click", () => {
      const id = b.dataset.plemie;
      if (widocznePlemiona.has(id)) widocznePlemiona.delete(id); else widocznePlemiona.add(id);
      panel.remove();
      renderKalendarz();
      wczytajDzien();
    });
  });
  $("hyz-kalendarz").querySelector(".m-kalbar").appendChild(panel);
  setTimeout(() => {
    document.addEventListener("click", function zamk(ev) {
      if (!panel.contains(ev.target)) { panel.remove(); document.removeEventListener("click", zamk); }
    });
  }, 0);
}

function podepnijSwipe(box) {
  let x0 = null, y0 = null;
  box.addEventListener("pointerdown", (e) => { x0 = e.clientX; y0 = e.clientY; });
  box.addEventListener("pointerup", (e) => {
    if (x0 == null) return;
    const dx = e.clientX - x0, dy = e.clientY - y0;
    x0 = null;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.4)
      przesunOkres(dx < 0 ? 1 : -1);
  });
}

function renderMiniMiesiac() {
  const wrap = $("m-mini-mies");
  if (!wrap) return;
  const dzis = czesciWarszawy(new Date());
  const k = kotwica;
  const rok = k.getFullYear(), mies = k.getMonth();
  const dniWMies = new Date(rok, mies + 1, 0).getDate();
  const pierwszyDow = (new Date(rok, mies, 1).getDay() + 6) % 7;
  const nazwa = new Date(rok, mies, 1).toLocaleDateString("pl-PL", { month: "long", year: "numeric" });
  const stolicaNazwy = nazwa.charAt(0).toUpperCase() + nazwa.slice(1);
  let html = `<div class="m-mini-mies__bar">
    <button data-mini="prev" aria-label="Poprzedni miesiąc">&#8249;</button>
    <span>${esc(stolicaNazwy)}</span>
    <button data-mini="next" aria-label="Następny miesiąc">&#8250;</button>
  </div>
  <div class="m-mini-mies__siatka">`;
  for (const d of ["Pn","Wt","Śr","Cz","Pt","So","Nd"]) html += `<div class="m-mini-mies__dow">${d}</div>`;
  for (let i = 0; i < pierwszyDow; i++) html += `<div></div>`;
  for (let d = 1; d <= dniWMies; d++) {
    const jestDzis = d === dzis.dzien && mies === dzis.mies - 1 && rok === dzis.rok;
    const jestAkt = !jestDzis && d === k.getDate() && mies === k.getMonth() && rok === k.getFullYear();
    const kl = jestDzis ? " m-mini-mies__dzien--dzis" : (jestAkt ? " m-mini-mies__dzien--akt" : "");
    html += `<div class="m-mini-mies__dzien${kl}" data-d="${d}">${d}</div>`;
  }
  html += `</div>`;
  wrap.innerHTML = html;
  wrap.querySelector('[data-mini="prev"]').addEventListener("click", () => {
    kotwica = new Date(rok, mies - 1, 1); renderKalendarz();
  });
  wrap.querySelector('[data-mini="next"]').addEventListener("click", () => {
    kotwica = new Date(rok, mies + 1, 1); renderKalendarz();
  });
  wrap.querySelectorAll(".m-mini-mies__dzien").forEach((c) =>
    c.addEventListener("click", () => {
      kotwica = new Date(rok, mies, Number(c.dataset.d));
      widokKal = "dzis";
      renderKalendarz();
    })
  );
}
