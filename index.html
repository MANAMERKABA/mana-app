    const fmtT = (iso) => { try { return fmtData(iso, { day: "numeric", month: "short" }) + " " + fmtGodz(iso); } catch (e) { return ""; } };
    const odswiezPo = () => { zamknij(); invalidujEvCache(); renderKalendarz(); if (PLEMIE_KAL) renderPlemieKalendarz(); const wE = $("m-widok-ekran"); if (wE && wE.style.display !== "none" && typeof wczytajDzien === "function" && TRAVELER) wczytajDzien(); };
    if (ev.grupa_pending) {
      const gp = ev.grupa_pending;
      const nowy = gp.data_czas ? fmtT(gp.data_czas) : "(nowy termin)";
      const moj = ev.data_czas ? fmtT(ev.data_czas) : "";
      bn.innerHTML = `<div style="background:#fff4e5;border:1px solid #f0c088;border-radius:10px;padding:10px 12px;margin-bottom:12px;">
        <div style="font-size:13px;color:#8a5a12;font-weight:700;margin-bottom:2px;">⚠ Grupa zmieniła termin</div>
        <div style="font-size:12.5px;color:#8a5a12;margin-bottom:9px;">Wspólne wydarzenie przeniesiono na <b>${escP(nowy)}</b>. Ty masz swój termin: <b>${escP(moj)}</b>. Co zrobić?</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="rj-przyjmij" style="border:none;background:var(--turkus,#1f9e8f);color:#fff;border-radius:9px;padding:8px 12px;font-size:13px;cursor:pointer;">Przyjmij grupowy</button>
          <button class="rj-zostaw" style="border:1px solid #f0c088;background:#fff;color:#8a5a12;border-radius:9px;padding:8px 12px;font-size:13px;cursor:pointer;">Zostaw mój</button>
        </div></div>`;
      bn.querySelector(".rj-przyjmij").addEventListener("click", async () => {
        const r = await supabase.rpc("event_grupa_rejoin", { p_id: ev.id });
        if (r.error || (r.data && r.data.ok === false)) { alert((r.data && r.data.error) || (r.error && r.error.message) || "Nie udało się."); return; }
        trzosToast("Przyjęto termin grupy ✓"); odswiezPo();
      });
      bn.querySelector(".rj-zostaw").addEventListener("click", async () => {
        const { error } = await supabase.from("events").update({ grupa_pending: null }).eq("id", ev.id);
        if (error) { alert(error.message); return; }
        trzosToast("Zostawiono Twój termin ✓"); odswiezPo();
      });
    } else if (ev.rozjazd) {
      bn.innerHTML = `<div style="background:#eef2f7;border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:12.5px;color:var(--ink-soft);flex:1;min-width:150px;">To Twój własny termin — różni się od wspólnego terminu grupy.</span>
        <button class="rj-przywroc" style="border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:9px;padding:7px 11px;font-size:12.5px;cursor:pointer;">↩ Przywróć do grupy</button>
      </div>`;
      bn.querySelector(".rj-przywroc").addEventListener("click", async () => {
        const r = await supabase.rpc("event_grupa_rejoin", { p_id: ev.id });
        if (r.error || (r.data && r.data.ok === false)) { alert((r.data && r.data.error) || (r.error && r.error.message) || "Nie udało się."); return; }
        trzosToast("Przywrócono termin grupy ✓"); odswiezPo();
      });
    }
  }

  const ktoSel = overlay.querySelector("#w-kto");
  const dlaBox = overlay.querySelector("#w-dla-box");
  const dlaSel = overlay.querySelector("#w-dla");
  let plemionaData = [];
  function aktualizujDla() {
    const pl = plemionaData.find((x) => x.id === ktoSel.value);
    if (!pl) { dlaBox.style.display = "none"; dlaSel.innerHTML = ""; return; }
    const jaZal = pl.moja_rola === "zalozyciel";
    const moge = pl.polityka_edycji === "rowni" || (pl.polityka_edycji === "zalozyciele" && jaZal);
    if (!moge) { dlaBox.style.display = "none"; dlaSel.innerHTML = ""; return; }
    let opts = `<option value="${TRAVELER.id}">Ja</option>`;
    if ((pl.czlonkowie || []).length > 1) opts += `<option value="__wszyscy__">👥 Wszyscy w plemieniu (propozycja)</option>`;
    (pl.czlonkowie || []).filter((c) => c.traveler_id !== TRAVELER.id).forEach((c) => { opts += `<option value="${c.traveler_id}">${esc(c.nick || "uczestnik")}</option>`; });
    dlaSel.innerHTML = opts;
    if (ev && ev.traveler_id) dlaSel.value = String(ev.traveler_id);
    dlaBox.style.display = "";
  }
  ktoSel.addEventListener("change", aktualizujDla);
  (async () => {
    const { data } = await supabase.rpc("moje_plemiona_full");
    plemionaData = (data || []).filter((p) => p.typ !== "rozmowa");
    plemionaData.forEach((p) => { const o = document.createElement("option"); o.value = p.id; o.textContent = p.nazwa; ktoSel.appendChild(o); });
    if (ev && ev.plemie_id) ktoSel.value = ev.plemie_id;
    else if (opcje.plemie_id) ktoSel.value = opcje.plemie_id;
    aktualizujDla();
    if (opcje.dla_traveler) dlaSel.value = String(opcje.dla_traveler);
  })();

  const caly = overlay.querySelector("#w-caly");
  const aktualizujCaly = () => {
    const ukryj = caly.checked;
    overlay.querySelector("#w-godz-box").style.display = ukryj ? "none" : "";
    overlay.querySelector("#w-trw-box").style.display = ukryj ? "none" : "";
    overlay.querySelector("#w-strefa-box").style.display = ukryj ? "none" : "";
    overlay.querySelector("#w-zakres-box").style.display = ukryj ? "" : "none";
  };
  caly.addEventListener("change", aktualizujCaly);
  aktualizujCaly();

  /* powtarzanie (cykliczność) — pokaż „powtarzaj do" gdy wybrane co innego niż jednorazowe */
  const powt = overlay.querySelector("#w-powt");
  if (ev && ev.powtarzalnosc) powt.value = ev.powtarzalnosc;
  const aktualizujPowt = () => { overlay.querySelector("#w-powt-do-box").style.display = (powt.value !== "jednorazowe") ? "" : "none"; };
  powt.addEventListener("change", aktualizujPowt);
  aktualizujPowt();

  /* kategoria — chipy z kolorami */
  const rysujChipy = () => {
    const wrap = overlay.querySelector("#w-kat-chips");
    wrap.innerHTML = "";
    for (const k of KATEGORIE) {
      const chip = el(`<button type="button" class="m-kat-chip${k===wybranaKat?" m-kat-chip--wybr":""}">`
        + `<span class="m-kat-chip__dot" style="background:${KOLOR_KAT[k]}"></span>${esc(ETYK_KAT[k])}</button>`);
      chip.addEventListener("click", () => { wybranaKat = k; rysujChipy(); });
      wrap.appendChild(chip);
    }
  };
  rysujChipy();

  /* strefa czasowa wydarzenia — przycisk, podpowiedź „u Ciebie" */
  function aktualizujStrefe() {
    const reg = wybranaStrefa.includes("/") ? wybranaStrefa.split("/")[0] : "";
    overlay.querySelector("#w-strefa-nazwa").textContent =
      miastoZeStrefy(wybranaStrefa) + (reg ? " · " + reg : "");
    const hint = overlay.querySelector("#w-strefa-hint");
    if (wybranaStrefa === TZ) { hint.style.display = "none"; hint.textContent = ""; return; }
    const dStr = overlay.querySelector("#w-data").value;
    const gStr = overlay.querySelector("#w-godz").value || "12:00";
    if (!dStr) { hint.style.display = "none"; return; }
    const instant = isoZeStrefy(dStr, gStr, wybranaStrefa);
    const u = czesciWarszawy(instant);
    hint.textContent = `U Ciebie (Warszawa): ${u.godzISO} · `
      + fmtData(instant, { weekday: "long", day: "numeric", month: "long" });
    hint.style.display = "";
  }
  overlay.querySelector("#w-strefa").addEventListener("click", () => {
    wybierzStrefe(wybranaStrefa, (s) => { wybranaStrefa = s; aktualizujStrefe(); });
  });
  overlay.querySelector("#w-data").addEventListener("input", aktualizujStrefe);
  overlay.querySelector("#w-godz").addEventListener("input", aktualizujStrefe);
  aktualizujStrefe();

  const _g = () => overlay.querySelector("#w-godz");
  const _k = () => overlay.querySelector("#w-koniec");
  const _t = () => overlay.querySelector("#w-trw");
  const minOd = (s) => { const [h, m] = s.split(":").map(Number); return h * 60 + m; };
  const hhmm = (t) => { t = ((t % 1440) + 1440) % 1440; return `${dwa(Math.floor(t / 60))}:${dwa(t % 60)}`; };
  function durHint() {
    const hint = overlay.querySelector("#w-dur-hint");
    const g = _g().value, e = _k().value;
    const noc = g && e && (minOd(e) - minOd(g) <= 0);
    hint.textContent = noc ? "kończy się następnego dnia (przez północ)" : "";
    hint.style.display = noc ? "" : "none";
  }
  function zTrwania() { // start + czas trwania -> godzina zakończenia
    const g = _g().value; const trw = parseInt(_t().value, 10);
    if (!g || !trw || trw <= 0) return;
    _k().value = hhmm(minOd(g) + trw); durHint();
  }
  function zKonca() { // godzina zakończenia - start -> czas trwania
    const g = _g().value, e = _k().value;
    if (!g || !e) return;
    let m = minOd(e) - minOd(g); if (m <= 0) m += 1440;
    _t().value = m; durHint();
  }
  _t().addEventListener("input", zTrwania);
  _k().addEventListener("input", zKonca);
  _g().addEventListener("input", zTrwania); // zmiana startu trzyma czas trwania, przesuwa koniec
  durHint();

  function sprawdzPrzeszlosc() {
    const warn = overlay.querySelector("#w-przeszlosc"); if (!warn) return;
    const dStr = overlay.querySelector("#w-data").value;
    if (!dStr) { warn.style.display = "none"; return; }
    let past;
    if (caly.checked) past = dStr < dataKalISO(new Date());
    else past = new Date(isoZeStrefy(dStr, overlay.querySelector("#w-godz").value || "00:00", wybranaStrefa)).getTime() < Date.now() - 60000;
    warn.style.display = past ? "" : "none";
  }
  overlay.querySelector("#w-data").addEventListener("input", sprawdzPrzeszlosc);
  overlay.querySelector("#w-godz").addEventListener("input", sprawdzPrzeszlosc);
  caly.addEventListener("change", sprawdzPrzeszlosc);
  sprawdzPrzeszlosc();

  overlay.querySelector("#w-zapisz").addEventListener("click", async () => {
    const tytul = overlay.querySelector("#w-tytul").value.trim();
    if (!tytul) { overlay.querySelector("#w-tytul").focus(); return; }
    const dataStr = overlay.querySelector("#w-data").value;
    if (!dataStr) { alert("Podaj datę."); return; }
    const calyD = caly.checked;
    let dataCzas, koniec = null;
    const strefaWyd = calyD ? TZ : wybranaStrefa;
    if (calyD) {
      dataCzas = isoZeStrefy(dataStr, "00:00", TZ);
      let endStr = overlay.querySelector("#w-do-dnia").value || dataStr;
      if (endStr < dataStr) endStr = dataStr;
      // koniec = początek dnia PO ostatnim dniu (eksluzywnie)
      koniec = isoZeStrefy(nastepnyDzienISO(endStr), "00:00", TZ);
    } else {
      const g = overlay.querySelector("#w-godz").value || "12:00";
      dataCzas = isoZeStrefy(dataStr, g, wybranaStrefa);
      const gEnd = overlay.querySelector("#w-koniec").value || "";
      if (gEnd) {
        let koniecInstant = new Date(isoZeStrefy(dataStr, gEnd, wybranaStrefa));
        if (koniecInstant <= new Date(dataCzas)) koniecInstant = new Date(koniecInstant.getTime() + 86400000); // przez północ → następny dzień
        koniec = koniecInstant.toISOString();
      } else {
        koniec = new Date(new Date(dataCzas).getTime() + 3600000).toISOString();
      }
    }
    const startMs = new Date(dataCzas).getTime();
    const przeszly = calyD ? (dataStr < dataKalISO(new Date())) : (startMs < Date.now() - 60000);
    if (!ev && przeszly) {
      const kiedyTxt = fmtData(dataCzas, { weekday: "long", day: "numeric", month: "long" })
        + (calyD ? "" : ", " + (overlay.querySelector("#w-godz").value || ""));
      if (!confirm(`Uwaga: ${kiedyTxt} to termin w przeszłości. Zapisać mimo to?`)) return;
    }
    const powtVal = overlay.querySelector("#w-powt").value;
    const powtDoStr = overlay.querySelector("#w-powt-do").value;
    const uprzedzRaw = overlay.querySelector("#w-uprzedz").value;
    const uprzedz = (uprzedzRaw !== "" && Number(uprzedzRaw) >= 0) ? Math.floor(Number(uprzedzRaw)) : null;
    const rekord = {
      tytul, data_czas: dataCzas, koniec, caly_dzien: calyD, strefa: strefaWyd,
      kategoria: wybranaKat,
      plemie_id: ktoSel.value || null,
      powtarzalnosc: powtVal,
      powtarzanie_do: (powtVal !== "jednorazowe" && powtDoStr) ? isoZeStrefy(powtDoStr, "00:00", TZ) : null,
      uprzedz_dni: uprzedz,
      opis: overlay.querySelector("#w-opis").value.trim() || null,
      lokalizacja: overlay.querySelector("#w-lok").value.trim() || null,
    };
    const dlaRaw = (dlaBox.style.display !== "none" && dlaSel.value) ? dlaSel.value : String(TRAVELER.id);
    let error;
    if (ev) {
      if (ev.grupa_id) {
        const zakres = await pytajZakresEdycji();
        if (!zakres) return;
        if (zakres === "grupa") {
          const patch = { tytul, data_czas: dataCzas, koniec, caly_dzien: calyD, opis: rekord.opis, lokalizacja: rekord.lokalizacja };
          const rG = await supabase.rpc("event_grupa_update", { p_id: ev.id, p_patch: patch, p_zakres: "grupa" });
          if (rG.error) { error = rG.error; }
          else if (rG.data && rG.data.ok === false) { alert(rG.data.error || "Nie udało się zmienić całej grupy."); return; }
          else { error = null; }
        } else {
          ({ error } = await supabase.from("events").update({ ...rekord, rozjazd: true }).eq("id", ev.id));
        }
      } else if (dlaRaw === "__wszyscy__") {
        // PROMOCJA osobistego wydarzenia na grupowe: nadaj grupa_id + utwórz kopie dla pozostałych członków
        const pl = plemionaData.find((x) => x.id === ktoSel.value);
        const czl = (pl && pl.czlonkowie) || [];
        const gid = (typeof crypto !== "undefined" && crypto.randomUUID) ? crypto.randomUUID() : null;
        const { error: e1 } = await supabase.from("events").update({ ...rekord, grupa_id: gid }).eq("id", ev.id);
        const inni = czl.filter((c) => c.traveler_id !== ev.traveler_id);
        let e2 = null;
        if (inni.length) {
          const rows = inni.map((c) => ({ ...rekord, grupa_id: gid, traveler_id: c.traveler_id, typ: "wydarzenie", utworzony_przez: TRAVELER.id, status: (c.traveler_id === TRAVELER.id || c.zarzadzany) ? "planowane" : "proponowane" }));
          ({ error: e2 } = await supabase.from("events").insert(rows));
        }
        error = e1 || e2;
      } else {
        ({ error } = await supabase.from("events").update(rekord).eq("id", ev.id));
      }
    } else if (dlaRaw === "__wszyscy__") {
      // PROPOZYCJA dla całego plemienia — wpis u KAŻDEGO członka; twórca i dzieci bez loginu od razu przyjęte
      const pl = plemionaData.find((x) => x.id === ktoSel.value);
      const czl = (pl && pl.czlonkowie) || [];
      const gid = (czl.length > 1 && typeof crypto !== "undefined" && crypto.randomUUID) ? crypto.randomUUID() : null;
      const rows = czl.map((c) => {
        const auto = c.traveler_id === TRAVELER.id || c.zarzadzany;
        return { ...rekord, grupa_id: gid, traveler_id: c.traveler_id, typ: "wydarzenie", utworzony_przez: TRAVELER.id, status: auto ? "planowane" : "proponowane" };
      });
      ({ error } = await supabase.from("events").insert(rows));
    } else {
      ({ error } = await supabase.from("events").insert({
        ...rekord, traveler_id: Number(dlaRaw), typ: "wydarzenie", utworzony_przez: TRAVELER.id, status: "planowane",
      }));
    }
    if (error) { alert("Nie udało się zapisać: " + error.message); return; }
    zamknij();
    invalidujEvCache(); renderKalendarz();
    if (PLEMIE_KAL) renderPlemieKalendarz();
    { const wE = $("m-widok-ekran"); if (wE && wE.style.display !== "none" && typeof wczytajDzien === "function" && TRAVELER) wczytajDzien(); }
  });
  if (ev) overlay.querySelector("#w-usun").addEventListener("click", async () => {
    const seria = ev.powtarzalnosc && ev.powtarzalnosc !== "jednorazowe";
    if (!confirm(seria ? "To wydarzenie się powtarza — usunąć CAŁĄ serię?" : "Usunąć to wydarzenie?")) return;
    const { error } = await supabase.from("events").delete().eq("id", ev.id);
    if (error) { alert("Nie udało się usunąć: " + error.message); return; }
    zamknij();
    invalidujEvCache(); renderKalendarz();
    if (PLEMIE_KAL) renderPlemieKalendarz();
    { const wE = $("m-widok-ekran"); if (wE && wE.style.display !== "none" && typeof wczytajDzien === "function" && TRAVELER) wczytajDzien(); }
  });
}

/* Okno wyboru zakresu edycji wspólnego wydarzenia: cała grupa vs tylko mój wpis.
   Zwraca Promise<'grupa' | 'moj' | null(anuluj)>. */
function pytajZakresEdycji() {
  return new Promise((resolve) => {
    const ov = el(`<div class="m-overlay" style="align-items:center;z-index:10000;">
      <div style="background:var(--surface);max-width:420px;width:92%;border-radius:16px;padding:18px 18px 16px;box-shadow:0 12px 40px rgba(0,0,0,.25);">
        <div style="font-size:15px;font-weight:700;margin-bottom:6px;">To wspólne wydarzenie</div>
        <div style="font-size:13px;color:var(--ink-soft);margin-bottom:14px;">Ta zmiana dotyczy też innych osób w plemieniu. Zapisać u wszystkich czy tylko u Ciebie?</div>
        <button class="ze-wsz" style="width:100%;border:none;background:var(--turkus,#1f9e8f);color:#fff;border-radius:12px;padding:12px;font-size:15px;cursor:pointer;margin-bottom:8px;">U wszystkich (całe plemię)</button>
        <button class="ze-moj" style="width:100%;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:12px;padding:12px;font-size:15px;cursor:pointer;margin-bottom:8px;">Tylko u mnie</button>
        <button class="ze-x" style="width:100%;border:none;background:none;color:var(--ink-soft);border-radius:12px;padding:8px;font-size:14px;cursor:pointer;">Anuluj</button>
      </div></div>`);
    document.body.appendChild(ov);
    const done = (v) => { ov.remove(); resolve(v); };
    ov.addEventListener("click", (e) => { if (e.target === ov) done(null); });
    ov.querySelector(".ze-wsz").addEventListener("click", () => done("grupa"));
    ov.querySelector(".ze-moj").addEventListener("click", () => done("moj"));
    ov.querySelector(".ze-x").addEventListener("click", () => done(null));
  });
}

/* ====================================================================
   HORYZONT — zadania (lista, przeciąganie pointer-events, V, Zrobione)
   ==================================================================== */
/* PLEMIE_MAP (plemie_id -> {nazwa,kolor}) zadeklarowane w sekcji kalendarza; tu tylko odświeżamy */
async function wczytajZadaniaHoryzont() {
  // WSZYSTKIE moje zadania (osobiste + plemienne przypisane mnie + moje wspólne)
  const { data: moje = [] } = await supabase
    .from("events").select("*")
    .eq("traveler_id", TRAVELER.id).eq("typ", "zadanie")
    .order("pozycja", { ascending: true, nullsFirst: false });

  // plemiona + zadania KAŻDEGO plemienia (wszystkich członków) via RPC — do grup z podglądem
  const rP = await supabase.rpc("moje_plemiona_full");
  const plemiona = rP.data || [];
  PLEMIE_MAP = {};
  plemiona.forEach((p) => { PLEMIE_MAP[p.id] = { nazwa: p.nazwa, kolor: p.kolor }; });
  const perPlemie = {};
  await Promise.all(plemiona.map(async (p) => {
    const r = await supabase.rpc("zadania_plemienia", { p_plemie: p.id });
    perPlemie[p.id] = r.data || [];
  }));

  // WYDARZENIA AKTYWNE (z wyprzedzeniem) — w otwartym oknie wskakują jako zadania do odhaczenia
  const { data: wydAkt = [] } = await supabase.from("events").select("*")
    .eq("traveler_id", TRAVELER.id).eq("typ", "wydarzenie")
    .not("uprzedz_dni", "is", null).neq("status", "zrobione")
    .or("powtarzalnosc.is.null,powtarzalnosc.eq.jednorazowe");
  const terazMs = Date.now();
  let aktywneWyd = (wydAkt || []).filter((e) => (new Date(e.data_czas).getTime() - (e.uprzedz_dni || 0) * 86400000) <= terazMs);
  if (zapytanieSzukaj) aktywneWyd = aktywneWyd.filter((z) => pasujeDoSzukania(z, zapytanieSzukaj));

  // INBOX: moje zadania czekające na przyjęcie (zlecenia)
  const propozycje = (moje || []).filter((z) => z.status === "proponowane" && !z.parent_id);
  // MOJE ZADANIA = czysto osobiste (bez plemienia); plemienne idą do grup plemion; działania (parent_id) tylko w dzienniku
  let mojeBez = (moje || []).filter((z) => !z.plemie_id && !z.parent_id && z.status !== "zrobione" && z.status !== "proponowane");
  let mojeBezZrob = (moje || []).filter((z) => !z.plemie_id && !z.parent_id && z.status === "zrobione").slice(0, 30);
  if (zapytanieSzukaj) {
    mojeBez = mojeBez.filter((z) => pasujeDoSzukania(z, zapytanieSzukaj));
    mojeBezZrob = mojeBezZrob.filter((z) => pasujeDoSzukania(z, zapytanieSzukaj));
  }

  renderPropozycjeZadan(propozycje);
  renderWydarzeniaAktywne(aktywneWyd);
  renderZadaniaAktywne(mojeBez, plemiona.length > 0);
  renderPlemieGrupy(plemiona, perPlemie);
  renderZadaniaZrobione(mojeBezZrob);
  policzPropozycje();
}

async function akceptujZadanie(z) {
  const { data: ost = [] } = await supabase.from("events").select("pozycja").eq("traveler_id", TRAVELER.id).eq("typ", "zadanie").eq("status", "planowane").order("pozycja", { ascending: false, nullsFirst: false }).limit(1);

  const { error } = await supabase.from("events").update({ status: "planowane", pozycja: nowaPoz }).eq("id", z.id).eq("traveler_id", TRAVELER.id);

async function odrzucZadanie(z) {

}

/* WSPÓLNE zadania plemion — jedna pozycja u wszystkich; kto odhaczy, widzą wszyscy (kto/kiedy) */
/* GRUPY PLEMION w zakładce Zadania — per plemię: widoczne (wspólne + przypisane mnie),
   ▾ Pozostałe (zadania innych — podgląd na rozwinięcie), ▾ Zrobione (z kto/kiedy). */
function renderPlemieGrupy(plemiona, perPlemie) {
  const box = $("hyz-zad-wspolne");
  if (!box) return;
  box.innerHTML = "";
  const me = TRAVELER && TRAVELER.id;
  for (const p of (plemiona || [])) {
    let tasks = (perPlemie[p.id] || []).filter((z) => z.kategoria !== "zakupy" && !z.parent_id); // zakupy mają osobną zakładkę; działania tylko w dzienniku
    if (zapytanieSzukaj) tasks = tasks.filter((z) => pasujeDoSzukania(z, zapytanieSzukaj));
    const kolor = p.kolor || "#1f9e8f";
    const aktywne = tasks.filter((z) => z.status !== "zrobione");
    const zrob = tasks.filter((z) => z.status === "zrobione");
    // widoczne: wspólne + przypisane mnie (moje proponowane są w skrzynce, nie tu)
    const widoczne = aktywne.filter((z) => z.wspolne || (z.traveler_id === me && z.status !== "proponowane"));
    // pozostałe: zadania innych osób (w tym ich propozycje czekające na przyjęcie)
    const reszta = aktywne.filter((z) => !z.wspolne && z.traveler_id !== me);
    if (!widoczne.length && !reszta.length && !zrob.length) continue;

    box.appendChild(el(`<div style="display:flex;align-items:center;gap:7px;margin:12px 16px 5px;font-size:12px;font-weight:700;color:var(--ink-soft);">
      <span style="width:11px;height:11px;border-radius:50%;background:${kolor};flex:none;"></span>${escP(p.nazwa)}</div>`));

    for (const z of widoczne) box.appendChild(itemPlemieMoje(z, kolor));
    if (!widoczne.length) box.appendChild(el(`<div style="font-size:12.5px;color:var(--ink-soft);margin:0 16px 4px;">Brak Twoich zadań tutaj.</div>`));

    if (reszta.length) box.appendChild(sekcjaRozwijalna(`Pozostałe (${reszta.length})`, kolor, reszta.map((z) => itemPlemieInni(z))));
    if (zrob.length) box.appendChild(sekcjaRozwijalna(`Zrobione (${zrob.length})`, kolor, zrob.map((z) => itemPlemieZrobione(z))));
  }
}
/* widoczny element plemienny (wspólny lub przypisany mnie) — checkbox + klik = edycja */
function itemPlemieMoje(z, kolor) {
  const term = z.data_czas ? (escP(fmtData(z.data_czas, { day: "numeric", month: "short" })) + " · " + escP(fmtGodz(z.data_czas))) : "";

  const w = el(`<div style="display:flex;align-items:flex-start;gap:9px;background:var(--surface);border:1px solid var(--line);border-left:3px solid ${kolor};border-radius:11px;padding:9px 11px;margin:0 16px 6px;">

/* sekcja rozwijalna (domyślnie zwinięta) */
function sekcjaRozwijalna(etykieta, kolor, elementy) {
  const wrap = el(`<div style="margin:0 16px 8px;"></div>`);

async function renderZakupy() {
  const box = $("hyz-zakupy");

    <textarea id="zk-tekst" placeholder="Dodaj do listy — możesz wkleić CAŁĄ listę, jedno w linii" rows="3" style="width:100%;box-sizing:border-box;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;margin-bottom:6px;"></textarea>
    <button id="zk-dodaj" style="${BT}">🛒 Dodaj do listy</button>
    <div id="zk-out" style="font-size:12.5px;margin-top:5px;"></div>
  </div>`);
  box.appendChild(add);
  add.querySelector("#zk-dodaj").addEventListener("click", async () => {
    const pid = add.querySelector("#zk-plemie").value;
    const tytuly = add.querySelector("#zk-tekst").value.split("\n").map((s) => s.trim()).filter(Boolean);
    if (!tytuly.length) { alert("Wpisz co dodać."); return; }
    const rows = tytuly.map((tytul) => ({ traveler_id: TRAVELER.id, typ: "zadanie", tytul, status: "planowane", priorytet: "normalny", plemie_id: pid, utworzony_przez: TRAVELER.id, wspolne: true, kategoria: "zakupy" }));

  const grupy = {};
  pozycje.forEach((z) => { (grupy[z.plemie_id] = grupy[z.plemie_id] || []).push(z); });
  for (const p of plemiona) {
    const lista = grupy[p.id]; if (!lista || !lista.length) continue;
    const kolor = p.kolor || "#1f9e8f";
    box.appendChild(el(`<div style="display:flex;align-items:center;gap:7px;margin:10px 16px 4px;font-size:12px;font-weight:700;color:var(--ink-soft);"><span style="width:11px;height:11px;border-radius:50%;background:${kolor};flex:none;"></span>🛒 ${escP(p.nazwa)}</div>`));
    lista.sort((a, b) => (a.status === "zrobione") - (b.status === "zrobione"));
    for (const z of lista) {
      const kupione = z.status === "zrobione";
      const atryb = (kupione && z.zrobione_kiedy) ? `kupił(a): ${escP(z.zrobione_przez_nick || "ktoś")} · ${escP(fmtData(z.zrobione_kiedy, { day: "numeric", month: "short" }))}` : "";
      const w = el(`<div style="display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-left:3px solid ${kolor};border-radius:11px;padding:9px 11px;margin:0 16px 6px;${kupione ? "opacity:.6;" : ""}">

        <div style="flex:1;min-width:0;">
          <div style="font-size:14.5px;${kupione ? "text-decoration:line-through;" : ""}">${esc(z.tytul)}</div>

      </div>`);
      w.querySelector(".zk-box").addEventListener("click", async () => {
        const { error } = await supabase.rpc("przelacz_wspolne", { p_event: z.id, p_zrobione: !kupione });
        if (error) { alert("Nie zapisano: " + error.message); return; }
        renderZakupy();
      });
      w.querySelector(".zk-usun").addEventListener("click", async () => {
        if (!confirm(`Usunąć „${z.tytul}" z listy?`)) return;
        const { error } = await supabase.from("events").delete().eq("id", z.id);
        if (error) { alert("Nie usunięto: " + error.message); return; }
        renderZakupy();
      });
      box.appendChild(w);
    }
  }
}

/* --- przeciąganie zadań — pointer events (działa palcem i myszą) --- */
function elementPonizej(lista, y) {
  const rzedy = [...lista.querySelectorAll(".m-zad-d:not(.m-zad-d--ciagniety)")];
  let wynik = { offset: -Infinity, el: null };
  for (const r of rzedy) {
    const box = r.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > wynik.offset) wynik = { offset, el: r };
  }
  return wynik.el;
}
function podepnijPrzeciaganie(row, lista) {
  const uchwyt = row.querySelector(".m-uchwyt");
  uchwyt.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    row.classList.add("m-zad-d--ciagniety");
    const onMove = (ev) => {
      const pod = elementPonizej(lista, ev.clientY);
      if (pod == null) lista.appendChild(row);
      else if (pod !== row) lista.insertBefore(row, pod);
    };
    const onUp = async () => {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      row.classList.remove("m-zad-d--ciagniety");
      await zapiszPozycje(row, lista);
    };
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
  });
}
async function zapiszPozycje(row, lista) {
  const rzedy = [...lista.querySelectorAll(".m-zad-d")];
  const i = rzedy.indexOf(row);
  const poprz = rzedy[i - 1], nast = rzedy[i + 1];
  const pP = poprz && poprz.dataset.poz !== "" ? Number(poprz.dataset.poz) : null;
  const pN = nast && nast.dataset.poz !== "" ? Number(nast.dataset.poz) : null;
  let nowa;
  if (pP == null && pN == null) nowa = 1000;
  else if (pP == null) nowa = pN - 1000;
  else if (pN == null) nowa = pP + 1000;
  else nowa = (pP + pN) / 2;
  row.dataset.poz = nowa;
  const { error } = await supabase.from("events").update({ pozycja: nowa }).eq("id", row.dataset.id);
  if (error) alert("Nie udało się zapisać kolejności: " + error.message);
}

/* --- okno edycji zadania --- */
function oknoZadania(z) {
  let terminVal = "";
  if (z.data_czas) {
    const cz = czesciWarszawy(z.data_czas);
    terminVal = `${cz.dataISO}T${cz.godzISO}`;
  }
  const PRIO = ["niski", "normalny", "wysoki", "pilny"];
  const opcjePrio = PRIO.map((p) =>
    `<option value="${p}"${p === z.priorytet ? " selected" : ""}>${p}</option>`).join("");
  const overlay = el(`<div class="m-overlay"><div class="m-modal">
    <div class="m-modal__head">
      <span class="m-modal__tytul">Zadanie</span>
      <button class="m-modal__x" aria-label="Zamknij">&#10005;</button>
    </div>
    <div class="m-form">
      <label>Tytuł</label>
      <input type="text" id="z-tytul" maxlength="200" value="${esc(z.tytul)}">
      <div class="m-form__row">
        <div><label>Priorytet</label><select id="z-prio">${opcjePrio}</select></div>
        <div><label>Termin (opcjonalny)</label><input type="datetime-local" id="z-termin" value="${terminVal}"></div>
      </div>
      <label>Opis</label>
      <textarea id="z-opis">${esc(z.opis || "")}</textarea>
      <label style="margin-top:8px;">📓 Działania / dziennik${z.plemie_id ? ` <span style="font-weight:400;color:#1a7158;font-size:11px;">— widzi plemię</span>` : ""}</label>
      <div id="z-dzialania" style="font-size:13px;color:var(--ink-soft);">Wczytuję…</div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-top:6px;background:#f7f5ef;border-radius:10px;padding:8px;">
        <input type="text" id="z-dz-tytul" maxlength="200" placeholder="Działanie (np. telefon do architekta)" style="padding:8px;border:1px solid var(--line);border-radius:7px;font-size:13px;">
        <input type="datetime-local" id="z-dz-termin" style="padding:8px;border:1px solid var(--line);border-radius:7px;font-size:13px;">
        <textarea id="z-dz-notatka" placeholder="Co ustaliłeś / notatka" style="padding:8px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit;min-height:44px;"></textarea>
        <button type="button" id="z-dz-add" class="m-btn m-btn--zapisz" style="align-self:flex-start;">+ Dodaj działanie</button>
      </div>
    </div>
    <div class="m-modal__akcje">
      <button class="m-btn m-btn--usun" id="z-usun">Usuń</button>
      <button class="m-btn" id="z-na-wyd" style="background:#efece3;">→ Wydarzenie</button>
      <button class="m-btn m-btn--zapisz" id="z-zapisz">Zapisz</button>
    </div>
  </div></div>`);
  document.body.appendChild(overlay);
  const zamknij = () => overlay.remove();
  overlay.addEventListener("click", (e) => { if (e.target === overlay) zamknij(); });
  overlay.querySelector(".m-modal__x").addEventListener("click", zamknij);

  // DZIENNIK DZIAŁAŃ — działania = dzieci (parent_id), chronologicznie; dziedziczą plemię (Patrycja czyta)
  const dzBox = overlay.querySelector("#z-dzialania");
  async function wczytajDzialania() {
    const { data: dzieci = [], error } = await supabase.from("events").select("*").eq("parent_id", z.id).order("data_czas", { ascending: true, nullsFirst: true }).order("created_at", { ascending: true });
    if (error) { dzBox.innerHTML = `<div style="color:#c4513a;">Błąd: ${esc(error.message)}</div>`; return; }
    if (!dzieci.length) { dzBox.innerHTML = `<div style="color:var(--ink-soft);font-size:12px;padding:4px 0;">Brak działań. Każdy telefon/ustalenie dodaj poniżej — złoży się z tego dziennik.</div>`; return; }
    const autorzy = [...new Set(dzieci.map((d) => d.utworzony_przez || d.traveler_id).filter(Boolean))];
    const nickMap = {};
    if (autorzy.length) { const { data: tt = [] } = await supabase.from("travels").select("id, nick").in("id", autorzy); (tt || []).forEach((t) => { nickMap[t.id] = t.nick; }); }
    dzBox.innerHTML = "";
    dzieci.forEach((d) => {
      const done = d.status === "zrobione";
      const kiedy = d.data_czas ? fmtData(d.data_czas, { day: "numeric", month: "short", year: "numeric" }) + (d.caly_dzien ? "" : " · " + fmtGodz(d.data_czas)) : (d.created_at ? "dodano " + fmtData(d.created_at, { day: "numeric", month: "short" }) : "");
      const kto = nickMap[d.utworzony_przez || d.traveler_id] || ((d.traveler_id === (TRAVELER && TRAVELER.id)) ? "Ja" : "");
      const row = el(`<div style="display:flex;gap:8px;align-items:flex-start;border-top:1px solid var(--line);padding:7px 0;">
        <button class="dz-box" aria-label="Odhacz" style="flex:none;width:20px;height:20px;border-radius:5px;border:2px solid ${done ? "#1a7158" : "var(--line)"};background:${done ? "#1a7158" : "transparent"};color:#fff;font-size:12px;line-height:16px;cursor:pointer;">${done ? "✓" : ""}</button>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13.5px;${done ? "text-decoration:line-through;color:var(--ink-soft);" : ""}">${esc(d.tytul)}</div>
          <div style="font-size:11px;color:var(--ink-soft);margin-top:1px;">${esc(kiedy)}${kto ? " · " + esc(kto) : ""}${done && d.zrobione_kiedy ? " · ✓ " + fmtData(d.zrobione_kiedy, { day: "numeric", month: "short" }) : ""}</div>
          ${d.opis ? `<div style="font-size:12.5px;margin-top:3px;white-space:pre-wrap;color:var(--ink);">${esc(d.opis)}</div>` : ""}
        </div></div>`);
      row.querySelector(".dz-box").addEventListener("click", async () => {
        const nowy = done ? "planowane" : "zrobione";
        const patch = { status: nowy, zrobione_kiedy: nowy === "zrobione" ? new Date().toISOString() : null, zrobione_przez: nowy === "zrobione" ? TRAVELER.id : null };
        const { error: e2 } = await supabase.from("events").update(patch).eq("id", d.id);
        if (e2) { alert("Nie zapisano: " + e2.message); return; }
        wczytajDzialania();
      });
      dzBox.appendChild(row);
    });
  }
  wczytajDzialania();
  overlay.querySelector("#z-dz-add").addEventListener("click", async () => {
    const tytul = overlay.querySelector("#z-dz-tytul").value.trim();
    if (!tytul) { overlay.querySelector("#z-dz-tytul").focus(); return; }
    const terminStr = overlay.querySelector("#z-dz-termin").value;
    let terminISO = null;
    if (terminStr) { const [dCz, gCz] = terminStr.split("T"); terminISO = isoZWarszawy(dCz, gCz || "09:00"); }
    const rekord = { traveler_id: TRAVELER.id, typ: "zadanie", tytul, data_czas: terminISO, opis: overlay.querySelector("#z-dz-notatka").value.trim() || null, parent_id: z.id, plemie_id: z.plemie_id || null, org_id: z.org_id || null, kategoria: z.kategoria || null, status: "planowane", utworzony_przez: TRAVELER.id, wspolne: !!z.plemie_id };
    const { error } = await supabase.from("events").insert(rekord);
    if (error) { alert("Nie dodano działania: " + error.message); return; }
    overlay.querySelector("#z-dz-tytul").value = ""; overlay.querySelector("#z-dz-termin").value = ""; overlay.querySelector("#z-dz-notatka").value = "";
    wczytajDzialania();
  });

  // zmień zadanie → wydarzenie (ląduje na kalendarzu); wymaga terminu
  overlay.querySelector("#z-na-wyd").addEventListener("click", async () => {
    const tytul = overlay.querySelector("#z-tytul").value.trim();
    if (!tytul) { overlay.querySelector("#z-tytul").focus(); return; }
    const terminStr = overlay.querySelector("#z-termin").value;
    if (!terminStr) { alert("Aby zmienić na wydarzenie, ustaw najpierw termin (datę i godzinę)."); overlay.querySelector("#z-termin").focus(); return; }
    const [dCz, gCz] = terminStr.split("T");
    const terminISO = isoZWarszawy(dCz, gCz || "09:00");
    const rekord = { tytul, typ: "wydarzenie", status: "planowane", data_czas: terminISO, strefa: TZ, wspolne: false,
      opis: overlay.querySelector("#z-opis").value.trim() || null };
    const { error } = await supabase.from("events").update(rekord).eq("id", z.id);
    if (error) { alert("Nie udało się zmienić na wydarzenie: " + error.message); return; }
    zamknij();
    wczytajZadaniaHoryzont();
    if (typeof renderKalendarz === "function") renderKalendarz();
  });

  overlay.querySelector("#z-zapisz").addEventListener("click", async () => {
    const tytul = overlay.querySelector("#z-tytul").value.trim();
    if (!tytul) { overlay.querySelector("#z-tytul").focus(); return; }
    const terminStr = overlay.querySelector("#z-termin").value;
    let terminISO = null;
    if (terminStr) {
      const [dCz, gCz] = terminStr.split("T");
      terminISO = isoZWarszawy(dCz, gCz || "00:00");
    }
    const rekord = {
      tytul,
      priorytet: overlay.querySelector("#z-prio").value,
      data_czas: terminISO,
      opis: overlay.querySelector("#z-opis").value.trim() || null,
    };
    const { error } = await supabase.from("events").update(rekord).eq("id", z.id);
    if (error) { alert("Nie udało się zapisać: " + error.message); return; }
    zamknij();
    wczytajZadaniaHoryzont();
  });
  overlay.querySelector("#z-usun").addEventListener("click", async () => {
    if (!confirm("Usunąć to zadanie?")) return;
    const { error } = await supabase.from("events").delete().eq("id", z.id);
    if (error) { alert("Nie udało się usunąć: " + error.message); return; }
    zamknij();
    wczytajZadaniaHoryzont();
  });
}

/* --- szybkie dodanie zadania --- */
async function dodajZadanie() {
  const input = $("hyz-nowe");
  const tytul = input.value.trim();
  if (!tytul) return;
  input.value = "";
  const { data: ost = [] } = await supabase
    .from("events").select("pozycja")
    .eq("traveler_id", TRAVELER.id).eq("typ", "zadanie")
    .order("pozycja", { ascending: false, nullsFirst: false }).limit(1);
  const nowaPoz = ((ost || [])[0]?.pozycja ?? 0) + 1000;
  const { error } = await supabase.from("events").insert({
    traveler_id: TRAVELER.id, typ: "zadanie", tytul,
    status: "planowane", priorytet: "normalny", pozycja: nowaPoz,
  });
  if (error) { alert("Nie udało się dodać zadania: " + error.message); return; }
  await wczytajZadaniaHoryzont();
}
$("hyz-dodaj").addEventListener("click", dodajZadanie);
$("hyz-nowe").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); dodajZadanie(); }
});

start();
</script>
